<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход | STAVOK.NET</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Unbounded:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================================================
           1. ГЛОБАЛЬНЫЕ СТИЛИ (Тот же стиль, что и в регистрации)
           ======================================================================== */
        :root {
            --color-bg: #030303;
            --color-card-bg: rgba(20, 20, 20, 0.75);
            --color-input-bg: rgba(255, 255, 255, 0.07);
            --color-input-border: rgba(255, 255, 255, 0.15);
            --color-input-focus: rgba(255, 255, 255, 0.5);
            
            --color-text-primary: #FFFFFF;
            --color-text-secondary: #9CA3AF;
            
            --color-accent: #FFFFFF;
            --color-success: #10B981;
            --color-error: #EF4444;
            
            --font-main: 'Inter', sans-serif;
            --font-display: 'Unbounded', sans-serif;
            
            --shadow-card: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%; min-height: 100vh;
            background-color: var(--color-bg); color: var(--color-text-primary);
            font-family: var(--font-main); overflow-x: hidden; position: relative;
            display: flex; justify-content: center; align-items: center;
        }

        a { text-decoration: none; color: inherit; transition: 0.2s; }
        button, input { border: none; background: none; font-family: inherit; }

        /* ФОН */
        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }
        .ambient-light {
            position: fixed; width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: -2; pointer-events: none; filter: blur(80px);
            animation: pulseLight 8s infinite alternate ease-in-out;
        }
        @keyframes pulseLight {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        /* КАРТОЧКА */
        .auth-container { width: 100%; max-width: 460px; padding: 20px; z-index: 10; perspective: 1000px; }
        .auth-card {
            background: var(--color-card-bg); border: 1px solid var(--color-input-border);
            border-radius: 30px; padding: 48px 40px;
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            box-shadow: var(--shadow-card); position: relative; overflow: hidden;
            animation: cardEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0; transform: translateY(30px) rotateX(5deg);
        }
        @keyframes cardEntrance { to { opacity: 1; transform: translateY(0) rotateX(0); } }
        
        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            opacity: 0.5;
        }

        /* ЛОГОТИП (ИСПРАВЛЕННЫЙ СТИЛЬ) */
        .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .logo-wrap { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }

        .logo-cube {
            width: 48px; height: 48px; background: #FFFFFF; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            transform: skewX(-12deg); /* Наклон куба */
            box-shadow: 0 0 25px rgba(255,255,255,0.25); position: relative; overflow: hidden;
        }
        .logo-cube::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-20deg); animation: shine 4s infinite;
        }
        @keyframes shine { 0%, 80% { left: -100%; } 100% { left: 200%; } }

        .logo-char {
            color: #000000; font-family: var(--font-display); font-weight: 900;
            font-size: 26px; font-style: italic; /* S - курсив */
            line-height: 1; padding-right: 4px;
        }

        .logo-text {
            font-family: var(--font-display); font-size: 26px; font-weight: 800;
            color: #FFFFFF; text-transform: uppercase; letter-spacing: -1px;
            font-style: normal; /* Текст - прямой */
        }
        .header-desc { font-size: 14px; color: var(--color-text-secondary); font-weight: 400; }

        /* ИНПУТЫ */
        .form-group { margin-bottom: 20px; position: relative; }
        .input-wrapper { position: relative; width: 100%; }

        .form-input {
            width: 100%; height: 60px; background: var(--color-input-bg);
            border: 1px solid var(--color-input-border); border-radius: 16px;
            padding: 0 50px 0 20px; color: white; font-size: 16px;
            font-family: var(--font-main); transition: all 0.3s ease;
        }
        .form-input:focus {
            background: rgba(255,255,255,0.1); border-color: var(--color-input-focus);
            box-shadow: 0 0 0 4px rgba(255,255,255,0.05);
        }
        .input-icon-right {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            color: var(--color-text-secondary); pointer-events: none; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .input-icon-right svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .form-input:focus ~ .input-icon-right { color: var(--color-text-primary); }
        .toggle-password { pointer-events: auto; cursor: pointer; }
        .toggle-password:hover { color: white; }

        /* КНОПКА */
        .btn-main {
            width: 100%; height: 64px; background: #FFFFFF; color: #000000;
            border-radius: 16px; font-family: var(--font-display); font-weight: 800;
            font-size: 16px; text-transform: uppercase; cursor: pointer;
            position: relative; overflow: hidden; transition: all 0.3s ease;
            transform: skewX(-5deg); /* Наклон кнопки */
            margin-top: 10px;
        }
        .btn-main span { display: block; transform: skewX(5deg); /* Выравнивание текста */ }
        .btn-main:hover { transform: skewX(-5deg) scale(1.02); box-shadow: 0 10px 40px rgba(255,255,255,0.25); }
        .btn-main:active { transform: skewX(-5deg) scale(0.98); }
        .btn-main:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        
        .loader {
            display: none; width: 24px; height: 24px; border: 3px solid #000;
            border-bottom-color: transparent; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ПОДВАЛ */
        .footer { margin-top: 32px; text-align: center; font-size: 14px; color: var(--color-text-secondary); }
        .footer a { color: var(--color-text-primary); font-weight: 600; margin-left: 5px; text-decoration: underline; }

        /* TOAST */
        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 5000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast {
            background: rgba(10, 10, 10, 0.95); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 16px 24px; border-radius: 50px; font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0; transform: translateY(-20px) scale(0.9); transition: all 0.4s;
        }
        .toast.visible { opacity: 1; transform: translateY(0) scale(1); }
        .toast.success { border-color: var(--color-success); } .toast.success svg { color: var(--color-success); }
        .toast.error { border-color: var(--color-error); } .toast.error svg { color: var(--color-error); }

    </style>
</head>
<body>

    <div class="ambient-light"></div>
    <canvas id="canvas-bg"></canvas>
    <div class="toast-container" id="toastContainer"></div>

    <div class="auth-container">
        <div class="auth-card">
            
            <div class="header">
                <div class="logo-wrap">
                    <div class="logo-cube"><span class="logo-char">S</span></div>
                    <span class="logo-text">Stavok.net</span>
                </div>
                <p class="header-desc">Вход в личный кабинет</p>
            </div>

            <form id="loginForm" novalidate>
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-input" placeholder="Email адрес" autocomplete="email" name="email">
                        <div class="input-icon-right">
                            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Пароль" autocomplete="current-password">
                        <div class="input-icon-right toggle-password" id="togglePassBtn">
                            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-main" id="submitBtn">
                    <span id="btnText">Войти в аккаунт</span>
                    <div class="loader" id="btnLoader"></div>
                </button>

            </form>

            <div class="footer">
                Нет аккаунта? <a href="reg.html">Зарегистрироваться</a>
            </div>
        </div>
    </div>

    <script>
        /**
         * STAVOK.NET LOGIN LOGIC
         * Полная копия стиля регистрации, но с логикой входа.
         */

        const SUPABASE_CONFIG = {
            url: 'https://cmoeirxugwapvvcdkwjs.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE'
        };

        // Приветственные фразы при входе
        const WELCOME_MESSAGES = [
            "С возвращением, чемпион!",
            "Рады видеть тебя снова!",
            "Твой аккаунт готов к работе.",
            "Время новых побед!",
            "Вход выполнен успешно."
        ];

        document.addEventListener('DOMContentLoaded', () => { app.init(); });

        const app = {
            supabase: null,
            
            init: function() {
                this.initSupabase();
                this.initVisuals();
                this.bindEvents();
            },

            initSupabase: function() {
                if (window.supabase) this.supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);
                else this.showToast("Ошибка: Сервер недоступен", "error");
            },

            bindEvents: function() {
                // Обработка формы входа
                const form = document.getElementById('loginForm');
                if (form) form.addEventListener('submit', (e) => this.handleLogin(e));

                // Глазик пароля
                const toggleBtn = document.getElementById('togglePassBtn');
                if (toggleBtn) toggleBtn.addEventListener('click', () => {
                    const passInput = document.getElementById('password');
                    const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passInput.setAttribute('type', type);
                    toggleBtn.style.opacity = type === 'text' ? '1' : '0.7';
                });
            },

            handleLogin: async function(e) {
                e.preventDefault(); // Запрет перезагрузки
                if (!this.supabase) return this.showToast("Система не загружена", "error");

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email || !password) return this.showToast("Введите Email и пароль", "error");

                this.setLoading(true);

                try {
                    // АВТОРИЗАЦИЯ ЧЕРЕЗ SUPABASE
                    const { data, error } = await this.supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (error) throw error;

                    if (data.user) {
                        const randomMsg = WELCOME_MESSAGES[Math.floor(Math.random() * WELCOME_MESSAGES.length)];
                        this.showToast(randomMsg, "success");
                        
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                    }

                } catch (err) {
                    console.error("Login Error:", err);
                    let msg = "Неверный Email или пароль";
                    // Supabase часто возвращает "Invalid login credentials"
                    if (err.message.includes("Invalid login")) msg = "Неверный логин или пароль";
                    if (err.message.includes("Email not confirmed")) msg = "Email не подтвержден";
                    
                    this.showToast(msg, "error");
                    this.setLoading(false);
                }
            },

            setLoading: function(isLoading) {
                const btn = document.getElementById('submitBtn');
                const text = document.getElementById('btnText');
                const loader = document.getElementById('btnLoader');
                if (isLoading) { btn.disabled = true; text.style.display = 'none'; loader.style.display = 'block'; }
                else { btn.disabled = false; text.style.display = 'block'; loader.style.display = 'none'; }
            },

            showToast: function(message, type = 'success') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                let icon = type === 'error' 
                    ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>'
                    : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
                toast.innerHTML = `${icon}<span>${message}</span>`;
                container.appendChild(toast);
                requestAnimationFrame(() => toast.classList.add('visible'));
                setTimeout(() => { toast.classList.remove('visible'); setTimeout(() => toast.remove(), 400); }, 3000);
            },

            initVisuals: function() {
                const canvas = document.getElementById('canvas-bg');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let w, h, particles = [];
                const resize = () => { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; };
                window.addEventListener('resize', () => { resize(); createParticles(); });

                const createParticles = () => {
                    particles = [];
                    const count = Math.min(80, (w * h) / 12000);
                    for (let i = 0; i < count; i++) {
                        particles.push({
                            x: Math.random() * w, y: Math.random() * h,
                            vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
                            size: Math.random() * 2 + 1, alpha: Math.random() * 0.5 + 0.1
                        });
                    }
                };

                const animate = () => {
                    ctx.clearRect(0, 0, w, h);
                    particles.forEach((p, index) => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0 || p.x > w) p.vx *= -1;
                        if (p.y < 0 || p.y > h) p.vy *= -1;
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`; ctx.fill();
                        for (let j = index + 1; j < particles.length; j++) {
                            const p2 = particles[j];
                            const dist = Math.sqrt((p.x - p2.x)**2 + (p.y - p2.y)**2);
                            if (dist < 100) {
                                ctx.beginPath(); ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 * (1 - dist / 100)})`;
                                ctx.lineWidth = 0.5; ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                            }
                        }
                    });
                    requestAnimationFrame(animate);
                };
                resize(); createParticles(); animate();
            }
        };
    </script>
</body>
</html>
