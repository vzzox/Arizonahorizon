<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход | STAVOK.NET</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Unbounded:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================================================
           1. CORE VARIABLES & RESET
           ======================================================================== */
        :root {
            /* Palette */
            --bg-deep: #050505;
            --bg-glass: rgba(20, 20, 20, 0.6);
            --bg-glass-strong: rgba(10, 10, 10, 0.85);
            --bg-input: rgba(255, 255, 255, 0.03);
            
            --text-main: #FFFFFF;
            --text-secondary: #AAAAAA;
            --text-disabled: #555555;
            
            --accent-brand: #FFFFFF;
            --accent-glow: rgba(255, 255, 255, 0.15);
            --accent-error: #FF3333;
            --accent-success: #00FF94;
            --accent-warn: #FFCC00;
            
            --border-weak: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.2);
            
            /* Typography */
            --font-display: 'Unbounded', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            /* Effects */
            --blur-strength: 30px;
            --ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --ease-smooth: cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow: hidden; /* Prevent scroll on login page */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* ========================================================================
           2. ADVANCED BACKGROUND FX
           ======================================================================== */
        .fx-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        }

        /* Noise Texture */
        .fx-noise {
            z-index: -5;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E");
        }

        /* Grid Pattern */
        .fx-grid {
            z-index: -4;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
        }

        /* Floating Orbs */
        .fx-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -3;
            animation: orbFloat 12s infinite alternate ease-in-out;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%);
            top: -100px; left: -100px;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.04), transparent 70%);
            bottom: -50px; right: -50px;
            animation-delay: -5s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* Interactive Canvas */
        canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; opacity: 0.4;
        }

        /* ========================================================================
           3. LOGIN CARD CONTAINER
           ======================================================================== */
        .container {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1500px;
            z-index: 10;
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            background: var(--bg-glass);
            border: 1px solid var(--border-weak);
            border-top: 1px solid var(--border-strong);
            border-radius: 32px;
            padding: 48px 40px;
            position: relative;
            backdrop-filter: blur(var(--blur-strength));
            -webkit-backdrop-filter: blur(var(--blur-strength));
            box-shadow: 
                0 40px 100px -20px rgba(0,0,0,0.9),
                inset 0 0 0 1px rgba(255,255,255,0.02);
            transform-style: preserve-3d;
            animation: cardEnter 0.8s var(--ease-elastic) forwards;
            opacity: 0;
            overflow: hidden;
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(60px) rotateX(10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        /* Card Shine Effect */
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 150%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            transform: skewX(-25deg);
            animation: shine 8s infinite;
            pointer-events: none;
        }
        @keyframes shine { 0%, 80% { left: -150%; } 100% { left: 200%; } }

        /* ========================================================================
           4. HEADER & LOGO
           ======================================================================== */
        .card-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            margin-bottom: 16px;
            transform: skewX(-10deg);
            transition: transform 0.3s var(--ease-smooth);
        }
        .logo-wrapper:hover { transform: skewX(-10deg) scale(1.05); }

        .logo-icon {
            width: 42px; height: 42px;
            background: white; color: black;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display);
            font-weight: 900; font-size: 24px; font-style: italic;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 26px; font-weight: 800; font-style: italic;
            color: white; text-transform: uppercase; letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 15px; font-weight: 400;
        }

        /* ========================================================================
           5. FORM INPUTS
           ======================================================================== */
        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-field {
            width: 100%; height: 58px;
            background: var(--bg-input);
            border: 1px solid var(--border-weak);
            border-radius: 16px;
            padding: 0 16px 0 50px; /* Space for icon */
            color: white; font-family: var(--font-body); font-size: 16px;
            transition: all 0.3s var(--ease-smooth);
        }

        .input-field:focus {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent-brand);
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
            padding-left: 55px;
        }

        /* Icon inside input */
        .input-icon-box {
            position: absolute; left: 16px; top: 19px;
            color: var(--text-disabled);
            transition: 0.3s; pointer-events: none;
        }
        .input-field:focus ~ .input-icon-box { color: white; transform: scale(1.1); }

        /* Floating Validation Icon */
        .status-icon {
            position: absolute; right: 16px; top: 19px;
            opacity: 0; transition: 0.3s; pointer-events: none;
        }
        .input-group.error .input-field { border-color: var(--accent-error); }
        .input-group.error .status-icon { opacity: 1; color: var(--accent-error); }
        .input-group.success .input-field { border-color: var(--accent-success); }

        /* ========================================================================
           6. FORM EXTRAS (Remember Me / Forgot Password)
           ======================================================================== */
        .form-extras {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        /* Checkbox */
        .checkbox-label {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; color: var(--text-secondary);
            user-select: none; transition: 0.3s;
        }
        .checkbox-label:hover { color: white; }

        .custom-checkbox {
            width: 18px; height: 18px;
            border: 1px solid var(--border-weak);
            border-radius: 5px; background: var(--bg-input);
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .checkbox-label input { display: none; }
        .checkbox-label input:checked + .custom-checkbox {
            background: white; border-color: white;
        }
        .custom-checkbox svg {
            width: 12px; height: 12px; stroke: black; stroke-width: 3;
            stroke-dasharray: 20; stroke-dashoffset: 20; transition: 0.2s;
        }
        .checkbox-label input:checked + .custom-checkbox svg { stroke-dashoffset: 0; }

        /* Forgot Link */
        .forgot-link {
            color: var(--text-secondary); text-decoration: none;
            transition: 0.3s;
        }
        .forgot-link:hover { color: white; text-decoration: underline; }

        /* ========================================================================
           7. SUBMIT BUTTON
           ======================================================================== */
        .btn-submit {
            width: 100%; height: 60px;
            background: white; color: black;
            border: none; border-radius: 14px;
            font-family: var(--font-display);
            font-weight: 800; font-style: italic; text-transform: uppercase; font-size: 16px;
            cursor: pointer; transition: all 0.3s var(--ease-smooth);
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            transform: skewX(-5deg) scale(1.02);
            box-shadow: 0 10px 40px rgba(255,255,255,0.25);
        }

        .btn-submit:active { transform: scale(0.98); }
        
        .btn-submit:disabled {
            background: #333; color: #666;
            cursor: not-allowed; transform: none; box-shadow: none;
        }

        /* Spinner */
        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(0,0,0,0.1); border-top-color: black;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            display: none;
        }
        .btn-submit.loading .spinner { display: block; }
        .btn-submit.loading span { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========================================================================
           8. FOOTER
           ======================================================================== */
        .card-footer {
            margin-top: 32px; text-align: center;
            font-size: 14px; color: var(--text-secondary);
        }
        .link-reg {
            color: white; text-decoration: none; font-weight: 600;
            margin-left: 5px; position: relative;
        }
        .link-reg::after {
            content: ''; position: absolute; bottom: -2px; left: 0; width: 0%; height: 1px;
            background: white; transition: 0.3s;
        }
        .link-reg:hover::after { width: 100%; }

        /* ========================================================================
           9. UI COMPONENTS (TOAST & MODAL)
           ======================================================================== */
        /* Toast */
        .toast-container {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            z-index: 2000; width: auto; pointer-events: none;
        }
        
        .toast {
            background: #111; border: 1px solid #333;
            padding: 16px 24px; border-radius: 50px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin-bottom: 10px; opacity: 0; transform: translateY(-20px);
            transition: 0.4s var(--ease-elastic);
        }
        .toast.visible { opacity: 1; transform: translateY(0); }
        
        .toast-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .toast.error .toast-icon { color: var(--accent-error); background: rgba(255, 51, 51, 0.1); }
        .toast.success .toast-icon { color: var(--accent-success); background: rgba(0, 255, 148, 0.1); }
        
        .toast-text { color: white; font-weight: 500; font-size: 14px; }

        /* Modal (Reset Password) */
        .modal-wrap {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            z-index: 3000; opacity: 0; pointer-events: none; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-wrap.active { opacity: 1; pointer-events: all; }

        .modal-card {
            background: var(--bg-glass-strong); border: 1px solid #333;
            width: 100%; max-width: 420px; padding: 30px; border-radius: 24px;
            transform: scale(0.9); transition: 0.3s var(--ease-elastic);
            text-align: center;
        }
        .modal-wrap.active .modal-card { transform: scale(1); }

        .modal-title { font-family: var(--font-display); font-size: 20px; margin-bottom: 10px; }
        .modal-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
        
        .modal-input {
            width: 100%; height: 50px; background: #111; border: 1px solid #333;
            border-radius: 12px; color: white; padding: 0 16px; margin-bottom: 20px;
        }
        
        .modal-actions { display: flex; gap: 10px; }
        .btn-modal {
            flex: 1; height: 48px; border: none; border-radius: 10px;
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-cancel { background: #222; color: #aaa; }
        .btn-cancel:hover { background: #333; color: white; }
        .btn-confirm { background: white; color: black; }
        .btn-confirm:hover { background: #eee; }

        /* Responsive */
        @media (max-width: 600px) {
            .auth-card { padding: 30px 24px; }
            .logo-text { font-size: 20px; }
            .btn-submit { height: 52px; }
        }

    </style>
</head>
<body>

    <div class="fx-layer fx-noise"></div>
    <div class="fx-layer fx-grid"></div>
    <div class="fx-layer fx-orb orb-1"></div>
    <div class="fx-layer fx-orb orb-2"></div>
    <canvas id="bgCanvas"></canvas>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <div class="auth-card">
            
            <div class="card-header">
                <a href="index.html" class="logo-wrapper">
                    <div class="logo-icon">S</div>
                    <div class="logo-text">STAVOK.NET</div>
                </a>
                <p class="subtitle">Вход в панель управления</p>
            </div>

            <form id="loginForm" novalidate>
                
                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder="Email адрес" autocomplete="email" required>
                    <div class="input-icon-box">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    </div>
                    <div class="status-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    </div>
                </div>

                <div class="input-group">
                    <input type="password" id="password" class="input-field" placeholder="Пароль" autocomplete="current-password" required>
                    <div class="input-icon-box">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </div>
                    <div style="position: absolute; right: 16px; top: 18px; cursor: pointer; color: #666;" onclick="togglePass()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </div>
                </div>

                <div class="form-extras">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <div class="custom-checkbox">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                        <span>Запомнить</span>
                    </label>
                    
                    <a href="#" class="forgot-link" onclick="openResetModal(); return false;">Забыли пароль?</a>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span>Войти в аккаунт</span>
                    <div class="spinner"></div>
                </button>

            </form>

            <div class="card-footer">
                Нет аккаунта? <a href="reg.html" class="link-reg">Регистрация</a>
            </div>

        </div>
    </div>

    <div class="modal-wrap" id="resetModal">
        <div class="modal-card">
            <h3 class="modal-title">Сброс пароля</h3>
            <p class="modal-desc">Введите ваш Email, чтобы получить ссылку для восстановления доступа.</p>
            <input type="email" id="resetEmail" class="modal-input" placeholder="example@mail.com">
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeResetModal()">Отмена</button>
                <button class="btn-modal btn-confirm" onclick="sendResetLink()" id="resetBtn">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        // ==============================================================
        // 1. INIT SUPABASE
        // ==============================================================
        const SUPABASE_URL = 'https://cmoeirxugwapvvcdkwjs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==============================================================
        // 2. CHECK SESSION (AUTO-REDIRECT)
        // ==============================================================
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                console.log("User already logged in.");
                window.location.href = 'feed.html'; // REDIRECT
            }
        }
        checkAuth();

        // Restore Email if "Remember Me" was used
        const savedEmail = localStorage.getItem('stavok_email');
        if (savedEmail) {
            document.getElementById('email').value = savedEmail;
            document.getElementById('rememberMe').checked = true;
        }

        // ==============================================================
        // 3. UI UTILITIES
        // ==============================================================
        function togglePass() {
            const el = document.getElementById('password');
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        function showToast(msg, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const iconHtml = type === 'error' 
                ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>'
                : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>';

            toast.innerHTML = `<div class="toast-icon">${iconHtml}</div><div class="toast-text">${msg}</div>`;
            container.appendChild(toast);

            requestAnimationFrame(() => toast.classList.add('visible'));
            setTimeout(() => {
                toast.classList.remove('visible');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // ==============================================================
        // 4. LOGIN LOGIC
        // ==============================================================
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;

            if (!email || !password) return showToast('Введите Email и пароль');

            // UI Loading
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                // Supabase Login
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                // Handle Remember Me
                if (remember) localStorage.setItem('stavok_email', email);
                else localStorage.removeItem('stavok_email');

                showToast('Вход выполнен! Загрузка...', 'success');
                
                // Redirect
                setTimeout(() => {
                    window.location.href = 'feed.html';
                }, 1000);

            } catch (err) {
                console.error(err);
                let msg = 'Ошибка входа';
                if (err.message.includes('Invalid login')) msg = 'Неверный Email или пароль';
                if (err.message.includes('Email not confirmed')) msg = 'Почта не подтверждена';
                
                showToast(msg);
                
                // Error animation
                const group = document.querySelector('.input-group');
                group.classList.add('error');
                setTimeout(() => group.classList.remove('error'), 500);
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        // ==============================================================
        // 5. PASSWORD RESET LOGIC
        // ==============================================================
        function openResetModal() {
            document.getElementById('resetModal').classList.add('active');
            // Auto fill email if typed
            const typedEmail = document.getElementById('email').value;
            if(typedEmail) document.getElementById('resetEmail').value = typedEmail;
        }

        function closeResetModal() {
            document.getElementById('resetModal').classList.remove('active');
        }

        async function sendResetLink() {
            const email = document.getElementById('resetEmail').value.trim();
            const btn = document.getElementById('resetBtn');

            if (!email) return showToast('Введите Email');
            
            btn.disabled = true;
            btn.innerText = '...';

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/update-password.html',
                });
                
                if (error) throw error;
                
                showToast('Ссылка отправлена на почту', 'success');
                closeResetModal();

            } catch (err) {
                showToast(err.message.includes('Limit') ? 'Слишком часто. Жди.' : 'Ошибка отправки');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Отправить';
            }
        }

        // ==============================================================
        // 6. CANVAS BACKGROUND ANIMATION
        // ==============================================================
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let mouse = { x: null, y: null };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 2;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > width) this.vx *= -1;
                if(this.y < 0 || this.y > height) this.vy *= -1;
                
                // Interaction
                if (mouse.x) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 100) {
                        this.x -= dx * 0.02;
                        this.y -= dy * 0.02;
                    }
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 60; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Draw connections
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for(let i=0; i<particles.length; i++) {
                for(let j=i; j<particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 100) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { resize(); initParticles(); });
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        
        resize(); initParticles(); animate();

    </script>
</body>
</html>
