<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>STAVOK.NET | Профиль Элиты</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Unbounded:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* --- COLOR MATRIX --- */
            --bg-deep: #000000;
            --bg-glass: rgba(20, 20, 20, 0.70);
            --bg-glass-strong: rgba(30, 30, 30, 0.85);
            
            /* NEON SIGNALS */
            --neon-green: #00FF94;
            --neon-red: #FF2E2E;
            --neon-gold: #FFD700;
            --neon-blue: #00C2FF;
            --neon-purple: #BD00FF;
            
            /* UI ELEMENTS */
            --border-weak: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.15);
            --text-main: #FFFFFF;
            --text-sec: #999999;
            
            /* FONTS */
            --font-h: 'Unbounded', sans-serif;
            --font-b: 'Inter', sans-serif;
            
            /* METRICS */
            --nav-height: 80px;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            
            /* ANIMATION */
            --ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- GLOBAL RESET --- */
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            outline: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-b);
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 140px;
            /* Advanced Noise + Mesh */
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E"),
                radial-gradient(circle at 50% 0%, rgba(0, 255, 148, 0.08), transparent 50%);
        }

        /* --- UTILS --- */
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-weak);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }
        
        .flex-center { display: flex; align-items: center; justify-content: center; }
        
        /* --- HEADER (FIXED & ROBUST) --- */
        .header-wrapper {
            position: sticky; top: 0; z-index: 100;
            padding: calc(10px + var(--safe-top)) 15px 10px;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none; /* Let clicks pass through empty space */
        }

        .header-content {
            pointer-events: auto;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-weak);
            border-radius: 50px;
            padding: 8px 8px 8px 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .back-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-weak);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .back-btn:active { background: #fff; color: #000; }

        .header-title {
            font-family: var(--font-h); font-weight: 800; font-size: 14px;
            letter-spacing: 1px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .logout-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255, 46, 46, 0.1); border: 1px solid rgba(255, 46, 46, 0.3);
            display: flex; align-items: center; justify-content: center;
            color: var(--neon-red); cursor: pointer; transition: 0.2s;
        }
        .logout-btn:active { background: var(--neon-red); color: #000; }

        /* --- HERO SECTION --- */
        .hero {
            padding: 20px; display: flex; flex-direction: column; align-items: center;
            text-align: center; margin-top: 10px;
        }

        /* Avatar System */
        .avatar-container {
            position: relative; width: 130px; height: 130px; margin-bottom: 20px;
        }
        
        .avatar-ring {
            width: 100%; height: 100%; border-radius: 50%;
            background: linear-gradient(135deg, #1a1a1a, #000);
            padding: 4px; /* Border width */
            box-shadow: 0 0 30px rgba(0, 255, 148, 0.1);
        }
        
        .avatar-img {
            width: 100%; height: 100%; border-radius: 50%;
            background: #111; object-fit: cover;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-h); font-weight: 800; font-size: 40px; color: #fff;
            overflow: hidden;
        }
        
        .avatar-edit-btn {
            position: absolute; bottom: 5px; right: 5px;
            width: 38px; height: 38px; background: #fff; color: #000;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; border: 4px solid #000; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,255,255,0.3);
            transition: transform 0.2s var(--ease-elastic);
        }
        .avatar-edit-btn:active { transform: scale(0.9); }

        /* User Info */
        .user-name {
            font-family: var(--font-h); font-size: 26px; font-weight: 800;
            margin-bottom: 8px; color: #fff;
        }
        
        .role-pill {
            display: inline-block; padding: 4px 12px; border-radius: 8px;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            font-family: var(--font-h); letter-spacing: 1px;
        }
        .role-pill.admin { background: #fff; color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .role-pill.user { border: 1px solid var(--border-weak); color: var(--text-sec); }

        .bio-pill {
            margin-top: 15px; padding: 12px 20px; border-radius: 20px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-weak);
            font-size: 13px; color: var(--text-sec); max-width: 80%;
            cursor: pointer; transition: 0.2s;
        }
        .bio-pill:hover { border-color: rgba(255,255,255,0.2); color: #fff; }

        /* --- STATS DASHBOARD --- */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
            padding: 0 20px; margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-glass); border: 1px solid var(--border-weak);
            border-radius: 20px; padding: 16px 10px; text-align: center;
            display: flex; flex-direction: column; gap: 5px;
            position: relative; overflow: hidden;
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }
        
        .stat-val { font-family: var(--font-h); font-size: 16px; font-weight: 800; color: #fff; }
        .stat-val.money { color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green-glow); }
        .stat-lbl { font-size: 9px; color: var(--text-sec); text-transform: uppercase; font-weight: 700; }

        /* --- TABS SYSTEM --- */
        .tabs-sticky {
            position: sticky; top: 85px; z-index: 90;
            padding: 0 20px; margin-bottom: 20px;
        }
        .tabs-bar {
            background: rgba(10,10,10,0.9); backdrop-filter: blur(20px);
            border: 1px solid var(--border-weak); border-radius: 16px;
            padding: 5px; display: flex; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .tab-btn {
            flex: 1; text-align: center; padding: 12px; border-radius: 12px;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            color: var(--text-sec); cursor: pointer; transition: 0.3s var(--ease-smooth);
        }
        .tab-btn.active { background: rgba(255,255,255,0.1); color: #fff; }

        /* --- CONTENT AREAS --- */
        .content-wrapper { padding: 0 20px; max-width: 600px; margin: 0 auto; min-height: 400px; }
        .view-section { display: none; animation: slideUp 0.4s var(--ease-smooth); }
        .view-section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* HISTORY LIST */
        .hist-list { display: flex; flex-direction: column; gap: 12px; }
        .h-row {
            background: var(--bg-glass); border: 1px solid var(--border-weak);
            border-radius: 18px; padding: 16px; display: flex; justify-content: space-between; align-items: center;
        }
        .h-left { display: flex; align-items: center; gap: 12px; }
        .h-icon {
            width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.03);
            display: flex; align-items: center; justify-content: center; font-size: 14px;
            border: 1px solid var(--border-weak);
        }
        .h-meta h4 { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
        .h-meta p { font-size: 10px; color: var(--text-sec); }
        .h-right { text-align: right; }
        .h-sum { font-family: var(--font-h); font-size: 13px; font-weight: 700; }
        .h-badge { font-size: 9px; font-weight: 800; text-transform: uppercase; }

        /* SHOP & INV GRID */
        .item-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .shop-card {
            background: var(--bg-glass); border: 1px solid var(--border-weak);
            border-radius: 18px; padding: 20px 15px; text-align: center;
            position: relative; overflow: hidden;
        }
        .shop-icon { font-size: 32px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }
        .shop-name { font-size: 12px; font-weight: 700; color: #fff; font-family: var(--font-h); margin-bottom: 5px; }
        .shop-price { font-size: 10px; color: var(--neon-gold); background: rgba(255,215,0,0.1); padding: 4px 8px; border-radius: 10px; display: inline-block; font-weight: 700; }
        .shop-btn {
            width: 100%; margin-top: 15px; padding: 10px; border-radius: 10px;
            background: #fff; color: #000; font-family: var(--font-h); font-weight: 800;
            font-size: 10px; text-transform: uppercase; border: none; cursor: pointer;
        }
        .shop-btn.owned { background: #333; color: #777; cursor: default; }

        /* SETTINGS LIST */
        .set-list { display: flex; flex-direction: column; gap: 10px; }
        .set-row {
            background: var(--bg-glass); border: 1px solid var(--border-weak);
            border-radius: 18px; padding: 18px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .set-row:active { background: rgba(255,255,255,0.05); }
        .set-label { display: flex; align-items: center; gap: 12px; font-size: 13px; font-weight: 600; }
        .set-icon { width: 20px; text-align: center; color: var(--text-sec); }

        /* --- BOTTOM NAV --- */
        .nav-float {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 75px;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px);
            border-radius: 60px; border: 1px solid var(--border-weak);
            display: flex; justify-content: space-evenly; align-items: center; z-index: 900;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            text-decoration: none; color: rgba(255,255,255,0.3); width: 60px; transition: 0.3s;
        }
        .nav-item i { font-size: 22px; transition: 0.3s; }
        .nav-item span {
            font-size: 9px; font-family: var(--font-h); font-weight: 700;
            text-transform: uppercase; opacity: 0; transform: translateY(10px); transition: 0.3s;
        }
        .nav-item.active { color: #fff; }
        .nav-item.active i { transform: translateY(-4px); text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .nav-item.active span { opacity: 1; transform: translateY(0); }

        /* --- MODALS --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-card {
            width: 100%; max-width: 400px; background: #0A0A0A;
            border: 1px solid var(--border-weak); border-radius: 30px;
            padding: 30px; box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            transform: translateY(20px); animation: slideUpModal 0.3s forwards;
        }
        @keyframes slideUpModal { to { transform: translateY(0); } }

        .modal-title { font-family: var(--font-h); font-size: 18px; margin-bottom: 20px; color: #fff; text-align: center; }
        
        .inp-area {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-weak);
            padding: 15px; border-radius: 14px; color: #fff; margin-bottom: 15px;
            font-family: var(--font-b); font-size: 14px; resize: none; height: 120px;
        }
        .inp-area:focus { border-color: #fff; background: rgba(255,255,255,0.08); }

        .btn-confirm {
            width: 100%; padding: 16px; background: #fff; color: #000;
            border-radius: 14px; font-weight: 800; border: none;
            cursor: pointer; text-transform: uppercase; font-family: var(--font-h);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-cancel {
            width: 100%; padding: 12px; background: transparent; color: #666;
            border: none; font-size: 12px; cursor: pointer; margin-top: 10px;
        }

        /* --- TOAST --- */
        #toast {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.95); color: #000; padding: 12px 24px;
            border-radius: 40px; font-family: var(--font-h); font-size: 12px; font-weight: 700;
            z-index: 5000; opacity: 0; pointer-events: none; transition: 0.3s;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* LOADING SPINNER */
        .spinner {
            width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.1);
            border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; display: none;
        }
        .btn-confirm.loading .spinner { display: block; }
        .btn-confirm.loading span { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="toast">Уведомление</div>

    <header class="top-nav">
        <div class="nav-btn" onclick="window.location.href='feed.html'"><i class="fa-solid fa-arrow-left"></i></div>
        <div class="header-title">STAVOK ID</div>
        <div class="nav-btn logout" onclick="App.auth.logout()"><i class="fa-solid fa-power-off"></i></div>
    </header>

    <section class="hero">
        <div class="avatar-container">
            <div class="avatar-ring">
                <div class="avatar-img" id="pAvatar">?</div>
            </div>
            <label class="avatar-edit-btn">
                <i class="fa-solid fa-camera"></i>
                <input type="file" id="avaUpload" style="display:none;" accept="image/*" onchange="App.profile.updateAvatar()">
            </label>
        </div>
        
        <div class="user-name" id="pName">...</div>
        <div class="role-pill user" id="pRole">USER</div>
        
        <div class="bio-pill" id="pBio" onclick="App.ui.openModal('bioModal')">
            Нажмите, чтобы добавить био...
        </div>
    </section>

    <section class="stats-grid">
        <div class="stat-card">
            <span class="stat-val money" id="pBal">0.00</span>
            <span class="stat-lbl">Баланс (x2)</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" id="pBets">0</span>
            <span class="stat-lbl">Ставки</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" id="pWin" style="color:var(--neon-blue)">0%</span>
            <span class="stat-lbl">Победы</span>
        </div>
    </section>

    <div class="tabs-sticky">
        <div class="tabs-bar">
            <div class="tab-btn active" onclick="App.ui.switchTab('hist', this)">История</div>
            <div class="tab-btn" onclick="App.ui.switchTab('shop', this)">Магазин</div>
            <div class="tab-btn" onclick="App.ui.switchTab('inv', this)">Инвентарь</div>
            <div class="tab-btn" onclick="App.ui.switchTab('set', this)">Настройки</div>
        </div>
    </div>

    <div class="content-wrapper">
        
        <div id="view-hist" class="view-section active">
            <div class="hist-list" id="histList">
                <div style="text-align:center; color:#555; padding:20px;">Загрузка...</div>
            </div>
        </div>

        <div id="view-shop" class="view-section">
            <div class="item-grid" id="shopList">
                </div>
        </div>

        <div id="view-inv" class="view-section">
            <div class="item-grid" id="invList">
                <div style="grid-column:1/-1; text-align:center; color:#555; padding:20px;">Пусто</div>
            </div>
        </div>

        <div id="view-set" class="view-section">
            <div class="set-list">
                <div class="set-row" onclick="window.open('https://t.me/vzzox')">
                    <div class="set-label"><i class="fa-brands fa-telegram set-icon"></i> Поддержка</div>
                    <i class="fa-solid fa-arrow-up-right-from-square" style="color:#666"></i>
                </div>
                <div class="set-row">
                    <div class="set-label"><i class="fa-solid fa-bell set-icon"></i> Уведомления</div>
                    <div style="font-size:10px; color:var(--neon-green)">ВКЛ</div>
                </div>
            </div>
        </div>

    </div>

    <nav class="nav-dock">
        <a href="news.html" class="nav-item"><i class="fa-solid fa-bolt"></i><span>News</span></a>
        <a href="feed.html" class="nav-item"><i class="fa-solid fa-layer-group"></i><span>Feed</span></a>
        <a href="profile.html" class="nav-item active"><i class="fa-solid fa-user-astronaut"></i><span>Profile</span></a>
    </nav>

    <div class="overlay" id="bioModal">
        <div class="modal-card">
            <div class="modal-title">О себе</div>
            <textarea id="bioInput" class="inp-area" placeholder="Напишите пару слов..."></textarea>
            <button class="btn-confirm" id="bioSaveBtn" onclick="App.profile.saveBio()">
                <span>Сохранить</span><div class="spinner"></div>
            </button>
            <button class="btn-cancel" onclick="App.ui.closeModal()">Отмена</button>
        </div>
    </div>

    <div class="overlay" id="shopModal">
        <div class="modal-card">
            <div class="modal-title">Купить предмет?</div>
            <div style="text-align:center; margin-bottom:20px;">
                <div id="buyName" style="font-size:20px; font-weight:800; color:#fff; margin-bottom:5px;">...</div>
                <div id="buyPrice" style="font-size:16px; color:var(--neon-gold); font-weight:700;">...</div>
            </div>
            <button class="btn-confirm" id="shopBuyBtn" onclick="App.shop.buy()">
                <span>Купить</span><div class="spinner"></div>
            </button>
            <button class="btn-cancel" onclick="App.ui.closeModal()">Отмена</button>
        </div>
    </div>

    <script>
        const CFG = {
            url: 'https://cmoeirxugwapvvcdkwjs.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE'
        };

        const App = {
            sb: null, user: null, profile: null,
            tempItem: null,

            init: async function() {
                try {
                    this.sb = window.supabase.createClient(CFG.url, CFG.key);
                    const { data: { session } } = await this.sb.auth.getSession();
                    if(!session) return window.location.href = 'login.html';
                    this.user = session.user;

                    await this.profile.load();
                    this.history.load();
                    this.shop.load();
                    this.inv.load();
                    this.realtime();

                } catch(e) { console.error(e); }
            },

            auth: {
                logout: async () => {
                    await App.sb.auth.signOut();
                    window.location.href = 'login.html';
                }
            },

            profile: {
                load: async function() {
                    let { data } = await App.sb.from('users').select('*').eq('id', App.user.id).single();
                    if(!data) {
                        const np = { id: App.user.id, username: App.user.email.split('@')[0], email: App.user.email, role: 'user', balance: 0 };
                        await App.sb.from('users').insert([np]);
                        data = np;
                    }
                    App.profile = data;
                    this.render(data);
                },

                render: function(p) {
                    document.getElementById('pName').innerText = p.username;
                    document.getElementById('pBal').innerText = parseFloat(p.balance).toFixed(2);
                    document.getElementById('pBio').innerText = p.bio || 'Нажмите, чтобы добавить био...';
                    
                    const ava = document.getElementById('pAvatar');
                    if(p.avatar_url && p.avatar_url.length > 10) {
                        ava.innerHTML = `<img src="${p.avatar_url}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
                    } else {
                        ava.innerText = p.username[0].toUpperCase();
                    }

                    const r = document.getElementById('pRole');
                    r.innerText = p.role;
                    r.className = `role-pill ${p.role}`;
                },

                saveBio: async function() {
                    const btn = document.getElementById('bioSaveBtn');
                    const txt = document.getElementById('bioInput').value;
                    
                    btn.classList.add('loading');
                    const { error } = await App.sb.from('users').update({ bio: txt }).eq('id', App.user.id);
                    btn.classList.remove('loading');

                    if(!error) {
                        App.ui.closeModal();
                        App.ui.toast('Био сохранено');
                    } else {
                        alert('Ошибка сохранения: ' + error.message);
                    }
                },

                updateAvatar: function() {
                    const input = document.getElementById('avaUpload');
                    if(input.files && input.files[0]) {
                        App.ui.toast('Загрузка...');
                        const reader = new FileReader();
                        reader.onload = async function(e) {
                            // COMPRESS IMAGE TO 150px
                            const img = new Image();
                            img.src = e.target.result;
                            img.onload = async function() {
                                const canvas = document.createElement('canvas');
                                const ctx = canvas.getContext('2d');
                                const size = 150;
                                canvas.width = size;
                                canvas.height = size;
                                ctx.drawImage(img, 0, 0, size, size);
                                const base64 = canvas.toDataURL('image/jpeg', 0.7); // 70% quality

                                // SAVE TO DB
                                const { error } = await App.sb.from('users').update({ avatar_url: base64 }).eq('id', App.user.id);
                                if(!error) App.ui.toast('Фото обновлено');
                                else alert('Ошибка загрузки фото: ' + error.message);
                            };
                        };
                        reader.readAsDataURL(input.files[0]);
                    }
                }
            },

            history: {
                load: async function() {
                    const list = document.getElementById('histList');
                    // Check if table exists (graceful fail)
                    const { data, error } = await App.sb.from('bets').select('*').eq('user_id', App.user.id).order('created_at', {ascending:false});
                    
                    if(error || !data || data.length === 0) {
                        list.innerHTML = '<div style="text-align:center; padding:20px; color:#555;">История пуста</div>';
                        return;
                    }

                    document.getElementById('pBets').innerText = data.length;
                    const wins = data.filter(x => x.status === 'win').length;
                    const wr = data.length > 0 ? Math.round((wins / data.length) * 100) : 0;
                    document.getElementById('pWin').innerText = wr + '%';

                    list.innerHTML = '';
                    data.forEach(b => {
                        let st = b.status || 'pending';
                        let col = st==='win'?'#00FF94':(st==='loss'?'#FF2E2E':'#FFD700');
                        list.innerHTML += `
                        <div class="h-row">
                            <div class="h-left">
                                <div class="h-icon" style="color:${col}"><i class="fa-solid fa-gamepad"></i></div>
                                <div class="h-meta"><h4>${b.outcome}</h4><p>x${b.coefficient}</p></div>
                            </div>
                            <div class="h-right">
                                <div class="h-sum" style="color:${col}">${parseFloat(b.amount).toFixed(2)}</div>
                                <div class="h-badge" style="color:${col}">${st}</div>
                            </div>
                        </div>`;
                    });
                }
            },

            shop: {
                load: async function() {
                    const el = document.getElementById('shopList');
                    const { data } = await App.sb.from('shop_items').select('*');
                    if(data) {
                        el.innerHTML = '';
                        data.forEach(i => {
                            el.innerHTML += `
                            <div class="shop-card">
                                <div class="shop-icon">${i.icon}</div>
                                <div class="shop-name">${i.name}</div>
                                <div class="shop-price">${i.price} x2</div>
                                <button class="shop-btn" onclick="App.shop.open('${i.id}', '${i.name}', ${i.price})">Купить</button>
                            </div>`;
                        });
                    }
                },
                open: (id, n, p) => {
                    App.tempItem = { id, p };
                    document.getElementById('buyName').innerText = n;
                    document.getElementById('buyPrice').innerText = p + ' x2';
                    App.ui.openModal('shopModal');
                },
                buy: async function() {
                    const btn = document.getElementById('shopBuyBtn');
                    const { id, p } = App.tempItem;
                    
                    if(App.profile.balance < p) return App.ui.toast('Недостаточно средств');

                    btn.classList.add('loading');
                    // Transaction
                    const newB = App.profile.balance - p;
                    await App.sb.from('users').update({ balance: newB }).eq('id', App.user.id);
                    await App.sb.from('inventory').insert([{ user_id: App.user.id, item_id: id }]);
                    
                    btn.classList.remove('loading');
                    App.ui.closeModal();
                    App.ui.toast('Успешно!');
                    App.inv.load();
                }
            },

            inv: {
                load: async function() {
                    const el = document.getElementById('invList');
                    const { data } = await App.sb.from('inventory').select('*, shop_items(name, icon)').eq('user_id', App.user.id);
                    if(data && data.length > 0) {
                        el.innerHTML = '';
                        data.forEach(i => {
                            el.innerHTML += `
                            <div class="shop-card" style="border-color:var(--neon-blue)">
                                <div class="shop-icon">${i.shop_items.icon}</div>
                                <div class="shop-name">${i.shop_items.name}</div>
                                <button class="shop-btn owned">Куплено</button>
                            </div>`;
                        });
                    }
                }
            },

            ui: {
                switchTab: (id, el) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    el.classList.add('active');
                    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
                    document.getElementById('view-'+id).classList.add('active');
                },
                openModal: (id) => {
                    if(id === 'bioModal') document.getElementById('bioInput').value = App.profile.bio || '';
                    document.getElementById(id).style.display = 'flex';
                },
                closeModal: () => document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none'),
                toast: (m) => {
                    const t = document.getElementById('toast');
                    t.innerText = m; t.classList.add('show');
                    setTimeout(() => t.classList.remove('show'), 2000);
                }
            },

            realtime: function() {
                this.sb.channel('prof')
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${this.user.id}` }, 
                    p => App.profile.render(p.new))
                    .subscribe();
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
