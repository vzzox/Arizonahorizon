<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>STAVOK.NET | Профиль</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Unbounded:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* --- COLOR PALETTE --- */
            --bg-void: #000000;
            --bg-noise: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCI+CjxyZWN0IHdpZHRoPSI1MCIgaGVpZ2h0PSI1MCIgZmlsbD0iIzAyMDIwMiI+PC9yZWN0Pgo8ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPgo8ZyBmaWxsPSIjMWExYTFhIiBmaWxsLW9wYWNpdHk9IjAuMDUiPgo8cGF0aCBkPSJNMCAwaDUwdjUwSDB6Ii8+CjwvZz4KPC9nPgo8L3N2Zz4=');
            
            /* Glass Layers */
            --glass-base: rgba(18, 18, 18, 0.60);
            --glass-mid: rgba(30, 30, 30, 0.70);
            --glass-high: rgba(40, 40, 40, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-light: rgba(255, 255, 255, 0.15);
            
            /* Neon Accents */
            --neon-green: #00FF94;
            --neon-green-glow: rgba(0, 255, 148, 0.4);
            --neon-red: #FF2E2E;
            --neon-gold: #FFD700;
            --neon-blue: #00C2FF;
            --neon-purple: #BD00FF;
            
            /* Text */
            --text-main: #FFFFFF;
            --text-sec: #AAAAAA;
            --text-mut: #666666;
            
            /* Fonts */
            --font-h: 'Unbounded', sans-serif;
            --font-b: 'Inter', sans-serif;
            
            /* Metrics */
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --nav-height: 90px;
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        /* --- GLOBAL RESET --- */
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box; outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-void);
            background-image: var(--bg-noise), radial-gradient(circle at 50% 0%, rgba(0, 194, 255, 0.05), transparent 60%);
            color: var(--text-main); font-family: var(--font-b);
            overflow-x: hidden; min-height: 100vh;
            padding-bottom: 140px; /* Space for Nav */
        }

        /* --- CANVAS FX --- */
        #profile-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 400px;
            z-index: -1; opacity: 0.6; mask-image: linear-gradient(to bottom, black 0%, transparent 100%);
        }

        /* --- GLASS COMPONENTS --- */
        .glass-panel {
            background: var(--glass-base);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }

        /* --- HEADER ACTIONS --- */
        .top-bar {
            position: sticky; top: 0; z-index: 100;
            padding: calc(15px + var(--safe-top)) 20px 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.8), transparent);
        }
        
        .top-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--glass-mid); border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .top-btn:active { transform: scale(0.9); background: var(--glass-high); }
        .top-btn.danger { color: var(--neon-red); border-color: rgba(255, 46, 46, 0.3); }

        /* --- PROFILE HERO SECTION --- */
        .hero {
            padding: 20px; display: flex; flex-direction: column; align-items: center;
            text-align: center; position: relative; z-index: 1;
        }

        /* Avatar Container */
        .avatar-wrap {
            position: relative; width: 110px; height: 110px; margin-bottom: 20px;
        }
        
        .avatar {
            width: 100%; height: 100%; border-radius: 50%;
            background: linear-gradient(135deg, #222, #111);
            border: 2px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-h); font-weight: 800; font-size: 32px; color: #fff;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Edit Badge */
        .edit-badge {
            position: absolute; bottom: 0; right: 0;
            width: 32px; height: 32px; background: var(--neon-blue);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #000; border: 3px solid var(--bg-void); cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 194, 255, 0.4);
            transition: 0.2s;
        }
        .edit-badge:active { transform: scale(0.9); }

        /* User Info */
        .username { font-family: var(--font-h); font-size: 24px; font-weight: 800; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .role-badge { font-size: 10px; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; vertical-align: middle; }
        .role-badge.admin { background: #fff; color: #000; font-weight: 800; }
        .role-badge.user { background: #333; color: #aaa; border: 1px solid #444; }

        .bio { font-size: 13px; color: var(--text-sec); max-width: 300px; line-height: 1.5; margin-bottom: 20px; }

        /* Level Bar */
        .xp-container { width: 100%; max-width: 200px; margin-bottom: 20px; }
        .xp-text { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-mut); margin-bottom: 5px; text-transform: uppercase; font-weight: 700; }
        .xp-track { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .xp-fill { height: 100%; background: var(--neon-green); width: 45%; box-shadow: 0 0 10px var(--neon-green-glow); }

        /* --- STATS GRID --- */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
            width: 100%; max-width: 500px; margin: 0 auto 30px; padding: 0 20px;
        }
        
        .stat-card {
            background: var(--glass-base); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 15px 10px; text-align: center;
            display: flex; flex-direction: column; gap: 5px;
        }
        
        .stat-val { font-family: var(--font-h); font-size: 16px; font-weight: 800; color: #fff; }
        .stat-val.money { color: var(--neon-green); }
        .stat-lbl { font-size: 10px; color: var(--text-mut); text-transform: uppercase; font-weight: 600; }

        /* --- TABS SYSTEM --- */
        .tabs-wrap {
            padding: 0 20px; margin-bottom: 20px;
            position: sticky; top: 80px; z-index: 90; 
        }
        .tabs {
            background: rgba(10,10,10,0.9); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 5px; display: flex;
        }
        .tab {
            flex: 1; text-align: center; padding: 12px; font-size: 12px;
            font-weight: 600; color: var(--text-sec); cursor: pointer;
            border-radius: 12px; transition: 0.3s;
        }
        .tab.active { background: rgba(255,255,255,0.1); color: #fff; font-weight: 800; }

        /* --- CONTENT SECTIONS --- */
        .content-area { padding: 0 20px; max-width: 600px; margin: 0 auto; min-height: 300px; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HISTORY LIST */
        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .h-item {
            background: var(--glass-base); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 16px; display: flex; justify-content: space-between; align-items: center;
        }
        .h-left { display: flex; gap: 12px; align-items: center; }
        .h-icon {
            width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }
        .h-info h4 { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
        .h-info p { font-size: 11px; color: var(--text-mut); }
        
        .h-right { text-align: right; }
        .h-amount { font-family: var(--font-h); font-size: 13px; font-weight: 700; }
        .h-amount.loss { color: var(--text-sec); }
        .h-amount.win { color: var(--neon-green); text-shadow: 0 0 10px rgba(0,255,148,0.3); }
        .h-status { font-size: 9px; text-transform: uppercase; font-weight: 700; margin-top: 2px; display: block; }
        .h-status.pending { color: var(--neon-gold); }
        .h-status.win { color: var(--neon-green); }
        .h-status.loss { color: var(--neon-red); }

        /* INVENTORY GRID */
        .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .inv-item {
            background: var(--glass-base); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 15px; text-align: center; aspect-ratio: 1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.2s; position: relative;
        }
        .inv-item:active { transform: scale(0.95); border-color: var(--neon-blue); }
        .inv-img { font-size: 28px; margin-bottom: 8px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
        .inv-name { font-size: 10px; color: var(--text-sec); font-weight: 600; }
        .inv-count { 
            position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.1); 
            font-size: 9px; padding: 2px 6px; border-radius: 4px; color: #fff;
        }

        /* SETTINGS LIST */
        .set-list { display: flex; flex-direction: column; gap: 10px; }
        .set-item {
            background: var(--glass-base); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 18px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }
        .set-item:active { background: rgba(255,255,255,0.05); }
        .set-left { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 600; }
        .set-icon { color: var(--text-sec); }
        .set-arrow { color: var(--text-mut); font-size: 12px; }

        /* --- SKELETON LOADER --- */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .sk-text { height: 14px; width: 60%; margin-bottom: 6px; }
        .sk-card { height: 70px; border-radius: 16px; }

        /* --- BOTTOM NAV --- */
        .nav-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 75px;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px);
            border-radius: 60px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-evenly; align-items: center; z-index: 900;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; text-decoration: none; color: rgba(255,255,255,0.3); width: 60px; transition: 0.3s; }
        .nav-item i { font-size: 22px; transition: 0.3s; }
        .nav-item span { font-size: 9px; font-family: var(--font-h); font-weight: 700; text-transform: uppercase; opacity: 0; transform: translateY(10px); transition: 0.3s; }
        .nav-item.active { color: #fff; }
        .nav-item.active i { transform: translateY(-4px); text-shadow: 0 0 20px rgba(255,255,255,0.6); }
        .nav-item.active span { opacity: 1; transform: translateY(0); }

        /* --- MODALS --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal {
            width: 100%; max-width: 400px; background: #0A0A0A; border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 25px; box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            transform: translateY(20px); animation: slideUp 0.3s forwards;
        }
        @keyframes slideUp { to { transform: translateY(0); } }
        
        .m-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .m-title { font-family: var(--font-h); font-size: 18px; color: #fff; }
        .inp {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 14px; color: #fff; margin-bottom: 12px;
            font-family: var(--font-b); font-size: 14px;
        }
        .btn-main {
            width: 100%; padding: 16px; background: #fff; color: #000;
            border-radius: 14px; font-weight: 800; border: none;
            cursor: pointer; text-transform: uppercase; margin-top: 10px; font-family: var(--font-h);
        }

        /* --- TOAST --- */
        #toast {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.95); color: #000; padding: 12px 24px;
            border-radius: 40px; font-family: var(--font-h); font-size: 12px; font-weight: 700;
            z-index: 5000; opacity: 0; transition: 0.3s; pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    </style>
</head>
<body>

    <canvas id="profile-canvas"></canvas>
    <div id="toast">Обновлено</div>

    <div class="top-bar">
        <a href="feed.html" class="top-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div style="font-family:var(--font-h); font-weight:800;">PROFILE</div>
        <div class="top-btn danger" onclick="App.auth.logout()"><i class="fa-solid fa-power-off"></i></div>
    </div>

    <div class="hero">
        <div class="avatar-wrap">
            <div class="avatar" id="pAvatar">?</div>
            <label class="edit-badge" for="fileAvatar">
                <i class="fa-solid fa-pen"></i>
                <input type="file" id="fileAvatar" style="display:none;" accept="image/*" onchange="App.profile.uploadAvatar()">
            </label>
        </div>
        
        <div class="username">
            <span id="pName">Loading...</span>
            <span class="role-badge user" id="pRole">USER</span>
        </div>
        
        <p class="bio" id="pBio" onclick="App.ui.openModal('bioModal')">Нажмите, чтобы добавить био...</p>

        <div class="xp-container">
            <div class="xp-text">
                <span>Lvl 5</span>
                <span>450 / 1000 XP</span>
            </div>
            <div class="xp-track"><div class="xp-fill"></div></div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-val money" id="pBal">0.00</span>
            <span class="stat-lbl">Баланс (x2)</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" id="pBets">0</span>
            <span class="stat-lbl">Ставок</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" style="color:var(--neon-blue)">42%</span>
            <span class="stat-lbl">Win Rate</span>
        </div>
    </div>

    <div class="tabs-wrap">
        <div class="tabs">
            <div class="tab active" onclick="App.ui.switchTab('history', this)">История</div>
            <div class="tab" onclick="App.ui.switchTab('inventory', this)">Инвентарь</div>
            <div class="tab" onclick="App.ui.switchTab('settings', this)">Настройки</div>
        </div>
    </div>

    <div class="content-area">
        
        <div id="tab-history" class="section active">
            <div class="history-list" id="historyList">
                <div class="h-item skeleton"><div class="sk-card" style="width:100%"></div></div>
                <div class="h-item skeleton"><div class="sk-card" style="width:100%"></div></div>
            </div>
        </div>

        <div id="tab-inventory" class="section">
            <div class="inv-grid">
                <div class="inv-item">
                    <div class="inv-img">🏆</div>
                    <div class="inv-name">Early Access</div>
                </div>
                <div class="inv-item">
                    <div class="inv-img">🧢</div>
                    <div class="inv-name">Cap</div>
                    <div class="inv-count">x2</div>
                </div>
                <div class="inv-item" style="opacity:0.5; border-style:dashed;">
                    <div class="inv-img">🔒</div>
                    <div class="inv-name">Locked</div>
                </div>
            </div>
        </div>

        <div id="tab-settings" class="section">
            <div class="set-list">
                <div class="set-item" onclick="App.ui.toast('В разработке')">
                    <div class="set-left"><i class="fa-regular fa-bell set-icon"></i> Уведомления</div>
                    <i class="fa-solid fa-chevron-right set-arrow"></i>
                </div>
                <div class="set-item" onclick="App.ui.toast('В разработке')">
                    <div class="set-left"><i class="fa-solid fa-shield-halved set-icon"></i> Безопасность</div>
                    <i class="fa-solid fa-chevron-right set-arrow"></i>
                </div>
                <div class="set-item" onclick="window.open('https://t.me/stavoksupport')">
                    <div class="set-left"><i class="fa-solid fa-headset set-icon"></i> Поддержка</div>
                    <i class="fa-solid fa-arrow-up-right-from-square set-arrow"></i>
                </div>
            </div>
        </div>

    </div>

    <nav class="nav-dock">
        <a href="news.html" class="nav-item"><i class="fa-solid fa-bolt"></i><span>News</span></a>
        <a href="feed.html" class="nav-item"><i class="fa-solid fa-layer-group"></i><span>Feed</span></a>
        <a href="profile.html" class="nav-item active"><i class="fa-solid fa-user-astronaut"></i><span>Profile</span></a>
    </nav>

    <div class="overlay" id="bioModal">
        <div class="modal">
            <div class="m-head">
                <h3 class="m-title">Изменить Био</h3>
                <i class="fa-solid fa-xmark" style="color:#666; cursor:pointer;" onclick="App.ui.closeModal()"></i>
            </div>
            <textarea id="bioInput" class="inp" style="height:100px; resize:none;" placeholder="Напишите о себе..."></textarea>
            <button class="btn-main" onclick="App.profile.saveBio()">Сохранить</button>
        </div>
    </div>

    <script>
        const CFG = {
            url: 'https://cmoeirxugwapvvcdkwjs.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE'
        };

        const App = {
            sb: null, user: null, profile: null,

            init: async function() {
                try {
                    this.fx.start();
                    this.sb = window.supabase.createClient(CFG.url, CFG.key);
                    const { data: { session } } = await this.sb.auth.getSession();
                    if(!session) return window.location.href = 'login.html';
                    this.user = session.user;

                    await this.profile.load();
                    await this.history.load();
                    this.realtime();

                } catch(e) { console.error(e); }
            },

            auth: {
                logout: async () => {
                    await App.sb.auth.signOut();
                    window.location.href = 'login.html';
                }
            },

            profile: {
                load: async function() {
                    let { data } = await App.sb.from('users').select('*').eq('id', App.user.id).single();
                    if(!data) {
                        // Auto-create if missing
                        const np = { id: App.user.id, username: App.user.email.split('@')[0], email: App.user.email, role: 'user', balance: 0 };
                        await App.sb.from('users').insert([np]);
                        data = np;
                    }
                    App.profile = data;
                    this.render(data);
                },

                render: function(p) {
                    document.getElementById('pName').innerText = p.username;
                    document.getElementById('pBal').innerText = parseFloat(p.balance).toFixed(2);
                    document.getElementById('pBio').innerText = p.bio || 'Нажмите, чтобы добавить статус...';
                    
                    // Avatar
                    const ava = document.getElementById('pAvatar');
                    if(p.avatar_url) {
                        ava.innerHTML = `<img src="${p.avatar_url}" alt="ava">`;
                    } else {
                        ava.innerText = p.username[0].toUpperCase();
                    }

                    // Role
                    const badge = document.getElementById('pRole');
                    badge.innerText = p.role;
                    badge.className = `role-badge ${p.role}`;
                },

                saveBio: async function() {
                    const txt = document.getElementById('bioInput').value;
                    if(!txt) return;
                    await App.sb.from('users').update({ bio: txt }).eq('id', App.user.id);
                    App.ui.closeModal();
                    App.ui.toast('Био обновлено');
                },

                uploadAvatar: async function() {
                    const file = document.getElementById('fileAvatar').files[0];
                    if(!file) return;

                    // Convert to Base64 (Simple method)
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        const base64 = e.target.result;
                        await App.sb.from('users').update({ avatar_url: base64 }).eq('id', App.user.id);
                        App.ui.toast('Аватар обновлен');
                    };
                    reader.readAsDataURL(file);
                }
            },

            history: {
                load: async function() {
                    const el = document.getElementById('historyList');
                    // Check if bets table exists via try/catch query
                    try {
                        const { data, error } = await App.sb
                            .from('bets')
                            .select('*')
                            .eq('user_id', App.user.id)
                            .order('created_at', { ascending: false });

                        el.innerHTML = '';
                        
                        if(error || !data || data.length === 0) {
                            el.innerHTML = '<div style="text-align:center; color:#555; padding:20px;">История пуста</div>';
                            return;
                        }

                        // Bets Count
                        document.getElementById('pBets').innerText = data.length;

                        data.forEach(bet => {
                            const statusColor = bet.status === 'win' ? 'win' : (bet.status === 'loss' ? 'loss' : 'pending');
                            const icon = bet.status === 'win' ? 'check' : (bet.status === 'loss' ? 'xmark' : 'clock');
                            
                            const html = `
                            <div class="h-item">
                                <div class="h-left">
                                    <div class="h-icon" style="color:var(--neon-${statusColor === 'win' ? 'green' : (statusColor === 'loss' ? 'red' : 'gold')})">
                                        <i class="fa-solid fa-${icon}"></i>
                                    </div>
                                    <div class="h-info">
                                        <h4>${bet.outcome || 'Ставка'}</h4>
                                        <p>Коэф: x${bet.coefficient}</p>
                                    </div>
                                </div>
                                <div class="h-right">
                                    <div class="h-amount ${statusColor}">${parseFloat(bet.amount).toFixed(2)}</div>
                                    <span class="h-status ${statusColor}">${bet.status}</span>
                                </div>
                            </div>`;
                            el.innerHTML += html;
                        });

                    } catch(e) {
                        el.innerHTML = '<div style="text-align:center; color:#555;">История недоступна</div>';
                    }
                }
            },

            ui: {
                switchTab: (name, btn) => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                    
                    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                    document.getElementById(`tab-${name}`).classList.add('active');
                },
                openModal: (id) => {
                    // Pre-fill bio
                    if(id === 'bioModal') document.getElementById('bioInput').value = App.profile.bio || '';
                    document.getElementById(id).style.display = 'flex';
                },
                closeModal: () => document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none'),
                toast: (m) => {
                    const t = document.getElementById('toast');
                    t.innerText = m; t.classList.add('show');
                    setTimeout(() => t.classList.remove('show'), 2000);
                }
            },

            realtime: function() {
                this.sb.channel('profile')
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${this.user.id}` }, 
                    p => { App.profile.render(p.new); })
                    .subscribe();
            },

            fx: {
                start: function() {
                    const c = document.getElementById('profile-canvas');
                    const ctx = c.getContext('2d');
                    let w, h, orbs = [];
                    const resize = () => { w = window.innerWidth; h = 400; c.width = w; c.height = h; };
                    window.addEventListener('resize', resize); resize();

                    for(let i=0; i<5; i++) {
                        orbs.push({
                            x: Math.random()*w, y: Math.random()*h, r: Math.random()*100+50,
                            dx: (Math.random()-0.5)*0.3, dy: (Math.random()-0.5)*0.3,
                            col: i%2==0 ? 'rgba(0,255,148,0.05)' : 'rgba(0,194,255,0.05)'
                        });
                    }

                    function anim() {
                        ctx.clearRect(0,0,w,h);
                        orbs.forEach(p => {
                            p.x+=p.dx; p.y+=p.dy;
                            if(p.x<-p.r || p.x>w+p.r) p.dx*=-1;
                            if(p.y<-p.r || p.y>h+p.r) p.dy*=-1;
                            const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
                            g.addColorStop(0, p.col); g.addColorStop(1, 'transparent');
                            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                        });
                        requestAnimationFrame(anim);
                    }
                    anim();
                }
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
