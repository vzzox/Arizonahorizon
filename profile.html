<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>STAVOK.NET | Профиль</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-void: #000000;
            --glass-base: rgba(20, 20, 20, 0.70);
            --glass-border: rgba(255, 255, 255, 0.12);
            --neon-green: #00FF94;
            --neon-red: #FF2E2E;
            --neon-gold: #FFD700;
            --neon-blue: #00C2FF;
            --text-main: #FFFFFF;
            --text-sec: #999;
            --font-h: 'Unbounded', sans-serif;
            --font-b: 'Inter', sans-serif;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-void);
            color: var(--text-main); font-family: var(--font-b);
            overflow-x: hidden; min-height: 100vh;
            padding-bottom: 140px;
            /* Advanced Mesh Background */
            background-image: 
                radial-gradient(circle at 80% 10%, rgba(0, 255, 148, 0.04), transparent 40%),
                radial-gradient(circle at 20% 90%, rgba(0, 194, 255, 0.04), transparent 40%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 50px 50px, 50px 50px;
        }

        /* --- UTILS --- */
        .glass {
            background: var(--glass-base); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
        }

        /* --- HEADER --- */
        .top-nav {
            position: sticky; top: 0; z-index: 100;
            padding: calc(15px + var(--safe-top)) 20px 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.9), transparent);
        }
        
        .nav-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--glass-base); border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 18px; cursor: pointer; transition: 0.2s;
        }
        .nav-btn:active { transform: scale(0.9); border-color: #fff; }
        .nav-btn.logout { color: var(--neon-red); border-color: rgba(255,46,46,0.3); }

        /* --- HERO --- */
        .hero {
            padding: 10px 20px 30px; display: flex; flex-direction: column; align-items: center;
            text-align: center; position: relative;
        }

        .avatar-box {
            position: relative; width: 120px; height: 120px; margin-bottom: 20px;
        }
        .avatar {
            width: 100%; height: 100%; border-radius: 50%;
            background: linear-gradient(135deg, #222, #000);
            border: 2px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-h); font-weight: 800; font-size: 40px; color: #fff;
            overflow: hidden; box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .edit-ava {
            position: absolute; bottom: 0; right: 0;
            width: 36px; height: 36px; background: var(--text-main);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #000; border: 4px solid var(--bg-void); cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2); transition: 0.2s;
        }
        .edit-ava:active { transform: scale(0.9); }

        .u-name { font-family: var(--font-h); font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .u-role { font-size: 10px; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; vertical-align: middle; }
        .u-role.admin { background: #fff; color: #000; font-weight: 800; }
        .u-role.user { border: 1px solid #444; color: #888; }

        .bio-card {
            margin-top: 15px; padding: 12px 20px; border-radius: 20px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            max-width: 320px; cursor: pointer; transition: 0.2s;
        }
        .bio-card:active { background: rgba(255,255,255,0.06); }
        .bio-text { font-size: 13px; color: var(--text-sec); line-height: 1.5; }

        /* --- STATS --- */
        .stats {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
            width: 100%; max-width: 500px; margin: 0 auto 30px; padding: 0 20px;
        }
        .stat {
            background: var(--glass-base); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 18px 10px; text-align: center;
            display: flex; flex-direction: column; gap: 6px;
        }
        .s-val { font-family: var(--font-h); font-size: 15px; font-weight: 800; color: #fff; }
        .s-val.money { color: var(--neon-green); text-shadow: 0 0 15px rgba(0,255,148,0.3); }
        .s-lbl { font-size: 9px; color: var(--text-sec); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }

        /* --- TABS --- */
        .tabs-container { padding: 0 20px; margin-bottom: 25px; position: sticky; top: 80px; z-index: 90; }
        .tabs {
            background: rgba(15,15,15,0.9); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 6px; display: flex;
        }
        .tab {
            flex: 1; text-align: center; padding: 12px; font-size: 11px; text-transform: uppercase;
            font-weight: 600; color: #666; cursor: pointer; border-radius: 14px; transition: 0.3s;
        }
        .tab.active { background: rgba(255,255,255,0.1); color: #fff; font-weight: 800; }

        /* --- SECTIONS --- */
        .content { padding: 0 20px; max-width: 600px; margin: 0 auto; min-height: 300px; }
        .page { display: none; animation: slideUp 0.4s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* HISTORY */
        .hist-list { display: flex; flex-direction: column; gap: 15px; }
        .h-item {
            background: var(--glass-base); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 18px; display: flex; justify-content: space-between; align-items: center;
        }
        .h-left { display: flex; gap: 15px; align-items: center; }
        .h-icon {
            width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.03);
            display: flex; align-items: center; justify-content: center; font-size: 16px;
            border: 1px solid var(--glass-border);
        }
        .h-info h4 { font-size: 13px; font-weight: 700; margin-bottom: 4px; font-family: var(--font-h); }
        .h-info p { font-size: 11px; color: var(--text-sec); }
        .h-val { font-family: var(--font-h); font-size: 14px; font-weight: 700; text-align: right; }
        .h-stat { font-size: 9px; text-transform: uppercase; font-weight: 800; display: block; text-align: right; margin-top: 4px; }

        /* SHOP & INV */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card {
            background: var(--glass-base); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; text-align: center;
            display: flex; flex-direction: column; align-items: center;
            transition: 0.2s; position: relative; overflow: hidden;
        }
        .card:active { transform: scale(0.97); border-color: rgba(255,255,255,0.3); }
        .c-icon { font-size: 32px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .c-name { font-size: 12px; color: #fff; font-weight: 700; margin-bottom: 5px; font-family: var(--font-h); }
        .c-price { font-size: 11px; color: var(--neon-gold); font-weight: 600; background: rgba(255,215,0,0.1); padding: 4px 10px; border-radius: 20px; }
        .c-btn {
            margin-top: 15px; width: 100%; padding: 10px; border-radius: 12px;
            background: #fff; color: #000; font-size: 10px; font-weight: 800; text-transform: uppercase;
            cursor: pointer; border: none; font-family: var(--font-h);
        }
        .c-btn.owned { background: #222; color: #555; }

        /* SUPPORT */
        .sup-list { display: flex; flex-direction: column; gap: 12px; }
        .sup-item {
            background: var(--glass-base); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .sup-item:active { background: rgba(255,255,255,0.05); }

        /* --- BOTTOM NAV --- */
        .nav-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 75px;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px);
            border-radius: 60px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-evenly; align-items: center; z-index: 900;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .n-item { display: flex; flex-direction: column; align-items: center; gap: 5px; text-decoration: none; color: rgba(255,255,255,0.3); width: 60px; transition: 0.3s; }
        .n-item i { font-size: 22px; transition: 0.3s; }
        .n-item span { font-size: 9px; font-family: var(--font-h); font-weight: 700; text-transform: uppercase; opacity: 0; transform: translateY(10px); transition: 0.3s; }
        .n-item.active { color: #fff; }
        .n-item.active i { transform: translateY(-4px); text-shadow: 0 0 20px rgba(255,255,255,0.6); }
        .n-item.active span { opacity: 1; transform: translateY(0); }

        /* --- MODALS --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal { width: 100%; max-width: 400px; background: #0A0A0A; border: 1px solid var(--glass-border); border-radius: 30px; padding: 25px; box-shadow: 0 40px 80px rgba(0,0,0,0.8); }
        .inp { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 15px; border-radius: 14px; color: #fff; margin-bottom: 12px; font-family: var(--font-b); font-size: 14px; }
        .btn-main { width: 100%; padding: 16px; background: #fff; color: #000; border-radius: 14px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-family: var(--font-h); }

        /* TOAST */
        #toast { position: fixed; top: 120px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #fff; color: #000; padding: 10px 24px; border-radius: 40px; font-family: var(--font-h); font-size: 12px; font-weight: 700; z-index: 5000; opacity: 0; transition: 0.3s; pointer-events: none; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="toast">Готово</div>

    <div class="top-bar">
        <a href="feed.html" class="nav-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div style="font-family:var(--font-h); font-weight:800; letter-spacing:1px;">PROFILE</div>
        <div class="nav-btn logout" onclick="App.auth.logout()"><i class="fa-solid fa-power-off"></i></div>
    </div>

    <div class="hero">
        <div class="avatar-box">
            <div class="avatar" id="pAvatar">?</div>
            <label class="edit-ava">
                <i class="fa-solid fa-camera"></i>
                <input type="file" id="avaFile" style="display:none" accept="image/*" onchange="App.profile.uploadAvatar()">
            </label>
        </div>
        <div class="u-name">
            <span id="pName">...</span>
            <span class="u-role user" id="pRole">USER</span>
        </div>
        <div class="bio-card" onclick="App.ui.openModal('bioModal')">
            <span class="bio-text" id="pBio">Добавить био...</span>
            <i class="fa-solid fa-pen" style="font-size:10px; color:#666; margin-left:5px;"></i>
        </div>
    </div>

    <div class="stats">
        <div class="stat">
            <span class="s-val money" id="pBal">0.00</span>
            <span class="s-lbl">Баланс (x2)</span>
        </div>
        <div class="stat">
            <span class="s-val" id="pBets">0</span>
            <span class="s-lbl">Ставок</span>
        </div>
        <div class="stat">
            <span class="s-val" id="pWinRate" style="color:var(--neon-blue)">0%</span>
            <span class="s-lbl">Победы</span>
        </div>
    </div>

    <div class="tabs-container">
        <div class="tabs">
            <div class="tab active" onclick="App.ui.tab('history', this)">История</div>
            <div class="tab" onclick="App.ui.tab('shop', this)">Магазин</div>
            <div class="tab" onclick="App.ui.tab('inv', this)">Инвентарь</div>
            <div class="tab" onclick="App.ui.tab('sets', this)">Меню</div>
        </div>
    </div>

    <div class="content">
        <div id="tab-history" class="page active">
            <div class="hist-list" id="histList"></div>
        </div>

        <div id="tab-shop" class="page">
            <div class="grid" id="shopGrid"></div>
        </div>

        <div id="tab-inv" class="page">
            <div class="grid" id="invGrid">
                <div style="grid-column:1/-1; text-align:center; color:#555;">Пусто</div>
            </div>
        </div>

        <div id="tab-sets" class="page">
            <div class="sup-list">
                <div class="sup-item" onclick="window.open('https://t.me/vzzox')">
                    <div style="display:flex; align-items:center; gap:15px; font-weight:600;">
                        <i class="fa-brands fa-telegram" style="color:var(--neon-blue)"></i> Поддержка
                    </div>
                    <i class="fa-solid fa-arrow-up-right-from-square" style="color:#666"></i>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav-dock">
        <a href="news.html" class="n-item"><i class="fa-solid fa-bolt"></i><span>News</span></a>
        <a href="feed.html" class="n-item"><i class="fa-solid fa-layer-group"></i><span>Feed</span></a>
        <a href="profile.html" class="n-item active"><i class="fa-solid fa-user-astronaut"></i><span>Profile</span></a>
    </nav>

    <div class="overlay" id="bioModal">
        <div class="modal">
            <h3 style="font-family:var(--font-h); color:#fff; margin-bottom:20px;">О себе</h3>
            <textarea id="bioText" class="inp" style="height:100px; resize:none;" placeholder="Напишите что-нибудь..."></textarea>
            <button class="btn-main" onclick="App.profile.saveBio()">Сохранить</button>
            <p onclick="App.ui.closeModal()" style="text-align:center; color:#666; font-size:12px; margin-top:15px; cursor:pointer;">Отмена</p>
        </div>
    </div>

    <div class="overlay" id="shopModal">
        <div class="modal">
            <h3 style="text-align:center; font-family:var(--font-h); color:#fff;">Купить?</h3>
            <div style="text-align:center; margin:20px 0;">
                <div id="buyName" style="font-size:20px; font-weight:700;">Item</div>
                <div id="buyPrice" style="color:var(--neon-gold); margin-top:5px; font-family:var(--font-h);">500 x2</div>
            </div>
            <button class="btn-main" style="background:var(--neon-gold); color:#000;" onclick="App.shop.confirm()">Купить</button>
            <p onclick="App.ui.closeModal()" style="text-align:center; color:#666; font-size:12px; margin-top:15px; cursor:pointer;">Отмена</p>
        </div>
    </div>

    <script>
        const CFG = {
            url: 'https://cmoeirxugwapvvcdkwjs.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE'
        };

        const App = {
            sb: null, user: null, profile: null, item: null,

            init: async function() {
                try {
                    this.sb = window.supabase.createClient(CFG.url, CFG.key);
                    const { data: { session } } = await this.sb.auth.getSession();
                    if(!session) return window.location.href = 'login.html';
                    this.user = session.user;

                    await this.profile.load();
                    this.history.load();
                    this.shop.load();
                    this.inv.load();
                    this.realtime();

                } catch(e) { console.error(e); }
            },

            auth: {
                logout: async () => {
                    await App.sb.auth.signOut();
                    window.location.href = 'login.html';
                }
            },

            profile: {
                load: async function() {
                    let { data } = await App.sb.from('users').select('*').eq('id', App.user.id).single();
                    if(!data) {
                        const np = { id: App.user.id, username: App.user.email.split('@')[0], email: App.user.email, role: 'user', balance: 0 };
                        await App.sb.from('users').insert([np]);
                        data = np;
                    }
                    App.profile = data;
                    this.render(data);
                },
                render: function(p) {
                    document.getElementById('pName').innerText = p.username;
                    document.getElementById('pBal').innerText = parseFloat(p.balance).toFixed(2);
                    document.getElementById('pBio').innerText = p.bio || 'Добавить био...';
                    
                    const ava = document.getElementById('pAvatar');
                    if(p.avatar_url) ava.innerHTML = `<img src="${p.avatar_url}">`;
                    else ava.innerText = p.username[0].toUpperCase();

                    const r = document.getElementById('pRole');
                    r.innerText = p.role;
                    r.className = `u-role ${p.role}`;
                },
                saveBio: async function() {
                    const t = document.getElementById('bioText').value;
                    if(!t) return;
                    await App.sb.from('users').update({ bio: t }).eq('id', App.user.id);
                    App.ui.closeModal();
                    App.ui.toast('Сохранено');
                },
                uploadAvatar: async function() {
                    const f = document.getElementById('avaFile').files[0];
                    if(!f) return;
                    
                    // Compress Image
                    const reader = new FileReader();
                    reader.readAsDataURL(f);
                    reader.onload = e => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const c = document.createElement('canvas');
                            const sc = 150/img.width;
                            c.width = 150; c.height = img.height*sc;
                            const ctx = c.getContext('2d');
                            ctx.drawImage(img,0,0,c.width,c.height);
                            const b64 = c.toDataURL('image/jpeg', 0.6);
                            App.sb.from('users').update({ avatar_url: b64 }).eq('id', App.user.id).then(()=>{
                                App.ui.toast('Аватар обновлен');
                            });
                        }
                    }
                }
            },

            history: {
                load: async function() {
                    const el = document.getElementById('histList');
                    const { data } = await App.sb.from('bets').select('*').eq('user_id', App.user.id).order('created_at',{ascending:false});
                    
                    if(!data || !data.length) {
                        el.innerHTML = '<div style="text-align:center; color:#555;">Пусто</div>';
                        document.getElementById('pWinRate').innerText = '0%';
                        return;
                    }

                    document.getElementById('pBets').innerText = data.length;
                    const wins = data.filter(b => b.status === 'win').length;
                    const wr = Math.round((wins/data.length)*100);
                    document.getElementById('pWinRate').innerText = wr + '%';

                    el.innerHTML = '';
                    data.forEach(b => {
                        let col = b.status==='win'?'var(--neon-green)':(b.status==='loss'?'var(--neon-red)':'var(--neon-gold)');
                        let ico = b.status==='win'?'check':(b.status==='loss'?'xmark':'clock');
                        
                        el.innerHTML += `
                        <div class="h-item">
                            <div class="h-left">
                                <div class="h-icon" style="color:${col}"><i class="fa-solid fa-${ico}"></i></div>
                                <div class="h-info"><h4>${b.outcome||'Ставка'}</h4><p>Коэф: x${b.coefficient}</p></div>
                            </div>
                            <div class="h-right">
                                <div class="h-val" style="color:${col}">${parseFloat(b.amount).toFixed(2)}</div>
                                <span class="h-stat" style="color:${col}">${b.status}</span>
                            </div>
                        </div>`;
                    });
                }
            },

            shop: {
                load: async function() {
                    const el = document.getElementById('shopGrid');
                    const { data } = await App.sb.from('shop_items').select('*');
                    if(data) {
                        el.innerHTML = '';
                        data.forEach(i => {
                            el.innerHTML += `
                            <div class="card">
                                <div class="c-icon">${i.icon}</div>
                                <div class="c-name">${i.name}</div>
                                <div class="c-price">${i.price} x2</div>
                                <button class="c-btn" onclick="App.shop.open('${i.id}','${i.name}',${i.price})">Купить</button>
                            </div>`;
                        });
                    }
                },
                open: (id, n, p) => {
                    App.item = { id, p };
                    document.getElementById('buyName').innerText = n;
                    document.getElementById('buyPrice').innerText = p + ' x2';
                    App.ui.openModal('shopModal');
                },
                confirm: async () => {
                    const { id, p } = App.item;
                    if(App.profile.balance < p) return App.ui.toast('Мало денег');
                    
                    await App.sb.from('users').update({ balance: App.profile.balance - p }).eq('id', App.user.id);
                    await App.sb.from('inventory').insert([{ user_id: App.user.id, item_id: id }]);
                    
                    App.ui.closeModal();
                    App.ui.toast('Куплено!');
                    App.inv.load();
                }
            },

            inv: {
                load: async function() {
                    const el = document.getElementById('invGrid');
                    const { data } = await App.sb.from('inventory').select('*, shop_items(name, icon)').eq('user_id', App.user.id);
                    if(data && data.length) {
                        el.innerHTML = '';
                        data.forEach(i => {
                            el.innerHTML += `
                            <div class="card" style="border-color:var(--neon-blue)">
                                <div class="c-icon">${i.shop_items.icon}</div>
                                <div class="c-name">${i.shop_items.name}</div>
                                <button class="c-btn owned">Куплено</button>
                            </div>`;
                        });
                    }
                }
            },

            ui: {
                tab: (n, btn) => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById('tab-'+n).classList.add('active');
                },
                openModal: (id) => {
                    if(id==='bioModal') document.getElementById('bioText').value = App.profile.bio || '';
                    document.getElementById(id).style.display = 'flex';
                },
                closeModal: () => document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none'),
                toast: (m) => {
                    const t = document.getElementById('toast');
                    t.innerText = m; t.classList.add('show');
                    setTimeout(() => t.classList.remove('show'), 2000);
                }
            },

            realtime: function() {
                this.sb.channel('prof')
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${this.user.id}` }, 
                    p => App.profile.render(p.new))
                    .subscribe();
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
