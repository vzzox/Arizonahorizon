<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Календарь — тёмный миним (мобильный)</title>
<style>
/* ===========================
   Mobile-first dark minimal
   greyscale gradients, glass, canvas effects
   =========================== */
:root{
  --bg-900: #070708;
  --bg-800: #0b0b0c;
  --bg-700: #111214;
  --card: rgba(255,255,255,0.03);
  --muted: rgba(255,255,255,0.5);
  --accent: linear-gradient(90deg,#6e7176,#2b2e31);
  --glass: rgba(255,255,255,0.02);
  --radius: 12px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* base */
html,body{height:100%;margin:0;background:var(--bg-900);color:#e6e6e6;}
*{box-sizing:border-box}
.app {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:14px;
  position:relative;
  overflow:hidden;
}

/* canvas background wrapper */
.bg-wrap{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  display:block;
}
.canvas {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* header (compact) */
.header {
  z-index:2;
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:space-between;
}
.brand {
  display:flex;
  gap:10px;
  align-items:center;
}
.logo {
  width:44px;height:44px;border-radius:10px;
  background:linear-gradient(180deg,#141516,#0f1011);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:#cfcfcf;font-size:18px;
  border:1px solid rgba(255,255,255,0.03);
}
.title {font-weight:700;font-size:15px;}
.subtitle {font-size:12px;color:var(--muted)}

/* controls row */
.controls {
  display:flex;
  gap:8px;
  align-items:center;
  z-index:2;
}
.icon-btn {
  background:transparent;border:0;padding:8px;border-radius:10px;color:inherit;
  display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
  backdrop-filter: blur(4px);
}
.icon-btn:active{transform:translateY(1px)}

/* month title */
.month {
  text-align:center;
  margin-top:4px;
  z-index:2;
}
.month h2{margin:0;font-size:16px;font-weight:700}
.weekdays {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-top:6px;
  z-index:2;
}
.weekdays div { text-align:center;font-size:12px;color:var(--muted);padding:8px 0; }

/* calendar grid */
.grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  margin-top:8px;
  z-index:2;
}
.cell {
  background: linear-gradient(180deg, rgba(255,255,255,0.012), rgba(255,255,255,0.008));
  border-radius:10px;
  padding:8px;
  min-height:74px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.02);
  transition: transform .12s ease, box-shadow .12s ease;
}
.cell:active{transform:translateY(1px)}
.cell.other { opacity:0.45; }
.cell .date {
  font-weight:700;
  font-size:16px;
  color:#f5f5f5;
}
.badges {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.badge {
  background:rgba(255,255,255,0.03);
  padding:6px 8px;
  border-radius:999px;
  font-size:12px;
  color:var(--muted);
  max-width:100%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* bottom sheet modal (mobile) */
.sheet-backdrop{
  position:fixed;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(0,0,0,0.65));
  display:none;align-items:flex-end;justify-content:center;z-index:40;
}
.sheet {
  width:100%;
  max-width:720px;
  border-top-left-radius:18px;border-top-right-radius:18px;
  background: linear-gradient(180deg,#0c0c0d,#070708);
  padding:14px;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.7);
  transform:translateY(0);
}
.sheet .handle {width:48px;height:5px;background:rgba(255,255,255,0.04);border-radius:999px;margin:6px auto}
.sheet h3{margin:8px 0 6px 0;font-size:16px}
.row {display:flex;gap:8px;align-items:center}
.input, textarea, select {
  background:transparent;border:1px solid rgba(255,255,255,0.04);padding:10px;border-radius:10px;color:#ddd;width:100%;
  font-size:14px;outline:none;
}
.small {font-size:12px;color:var(--muted)}

/* notes list */
.note {
  background:rgba(255,255,255,0.02);
  border-radius:10px;padding:10px;margin:8px 0;display:flex;justify-content:space-between;gap:8px;
}
.note .left {max-width:80%}
.note .title{font-weight:700}
.note .meta{font-size:13px;color:var(--muted)}

/* preview area */
.preview {
  margin-top:10px;
  background:rgba(255,255,255,0.02);
  border-radius:10px;padding:10px;max-height:220px;overflow:auto;font-size:14px;color:var(--muted)
}

/* footer controls row */
.footer-controls{display:flex;gap:8px;margin-top:8px}
.btn {
  background:transparent;border:1px solid rgba(255,255,255,0.06);padding:10px;border-radius:10px;color:#ddd;cursor:pointer;font-weight:700;
}
.btn.primary {
  background:linear-gradient(90deg,#1f2022,#2b2d2f);border:1px solid rgba(255,255,255,0.04);
}

/* responsive tweaks */
@media(min-width:720px){
  .app{padding:24px}
  .grid .cell{min-height:96px}
}

/* subtle focus */
.cell:focus { outline:2px solid rgba(255,255,255,0.03); outline-offset:2px; }
.icon { opacity:0.9; font-size:16px; }
</style>
</head>
<body>
<div class="bg-wrap">
  <canvas id="bgCanvas" class="canvas"></canvas>
</div>

<div class="app" role="application" aria-label="Тёмный минимальный календарь">
  <div class="header">
    <div class="brand">
      <div class="logo">K</div>
      <div>
        <div class="title">Календарь</div>
        <div class="subtitle">тёмный · миним · mobile</div>
      </div>
    </div>

    <div class="controls" aria-hidden="false">
      <button class="icon-btn" id="prev" title="Пред. месяц">◀</button>
      <button class="icon-btn" id="today" title="Сегодня">●</button>
      <button class="icon-btn" id="next" title="След. месяц">▶</button>
    </div>
  </div>

  <div class="month">
    <h2 id="monthLabel">Месяц Год</h2>
    <div class="weekdays" aria-hidden="true">
      <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
    </div>
  </div>

  <div id="grid" class="grid" aria-live="polite" role="grid"></div>

  <!-- quick controls -->
  <div style="z-index:2;display:flex;gap:8px;align-items:center;justify-content:space-between;">
    <div style="display:flex;gap:8px;flex:1">
      <input id="routine" class="input" placeholder="Опиши распорядок (напр. утренняя рутина с тренировкой)" aria-label="Описание распорядка" />
      <button class="btn primary" id="gen">ИИ</button>
    </div>
    <div style="width:8px"></div>
    <button class="btn" id="export" title="Экспорт JSON">⬇</button>
  </div>
</div>

<!-- bottom sheet modal -->
<div class="sheet-backdrop" id="sheet" aria-hidden="true">
  <div class="sheet" role="dialog" aria-modal="true" aria-label="Редактор заметок">
    <div class="handle" role="img" aria-hidden="true"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h3 id="sheetTitle">Заметки — <span id="sheetDate">—</span></h3>
      <div class="row">
        <button class="icon-btn" id="closeSheet" aria-label="Закрыть">✖</button>
      </div>
    </div>

    <div id="notesArea">
      <div class="small">Существующие заметки</div>
      <div id="notesList" style="margin-top:8px"></div>

      <hr style="border:none;height:1px;background:rgba(255,255,255,0.02);margin:12px 0" />

      <div class="small">Добавить заметку</div>
      <div class="row" style="margin-top:8px">
        <input id="noteTime" class="input" type="time" value="09:00" style="width:120px" />
        <input id="noteTitle" class="input" placeholder="Заголовок" />
      </div>
      <textarea id="noteDesc" class="input" rows="3" placeholder="Описание..." style="margin-top:8px"></textarea>

      <div class="footer-controls">
        <button class="btn primary" id="addNote">Добавить</button>
        <button class="btn" id="applyRoutine">Вставить распорядок</button>
        <button class="btn" id="clearAll">Очистить всё</button>
      </div>

      <div class="preview" id="previewArea" aria-live="polite" style="margin-top:10px">
        Сгенерированный распорядок появится здесь
      </div>
    </div>
  </div>
</div>

<script>
/* ===========================
   Simple calendar + notes
   Mobile-first, localStorage
   =========================== */
const LS = 'minical_v2';
let notesStore = loadNotes();

// state
const state = {
  current: new Date(),
  selected: null,
  lastGenerated: null,
};

/* util */
const $ = (s, el=document) => el.querySelector(s);
const $$ = (s, el=document) => Array.from(el.querySelectorAll(s));
const uid = (n=8) => Math.random().toString(36).slice(2,2+n);
const toYMD = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const fromYMD = s => { const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); };
const nice = s => { if(!s) return '—'; return fromYMD(s).toLocaleDateString('ru-RU',{weekday:'long', day:'numeric', month:'long', year:'numeric'}); };

/* storage */
function loadNotes(){
  try { const raw = localStorage.getItem(LS); return raw ? JSON.parse(raw) : {}; }
  catch(e){ console.warn('loadNotes failed',e); return {}; }
}
function saveNotes(){ localStorage.setItem(LS, JSON.stringify(notesStore)); }

/* calendar render */
function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
function endOfMonth(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0); }

function render(){
  const grid = $('#grid');
  grid.innerHTML = '';
  const cur = state.current;
  const start = startOfMonth(cur);
  const end = endOfMonth(cur);
  // monday-first index 0..6
  const pad = (start.getDay() + 6) % 7;
  const total = pad + end.getDate();
  const cells = Math.ceil(total/7)*7;
  const first = new Date(start.getFullYear(), start.getMonth(), 1 - pad);
  for(let i=0;i<cells;i++){
    const d = new Date(first.getFullYear(), first.getMonth(), first.getDate()+i);
    const ymd = toYMD(d);
    const isOther = d.getMonth() !== cur.getMonth();
    const cell = document.createElement('button');
    cell.className = 'cell' + (isOther ? ' other':'');
    cell.type = 'button';
    cell.setAttribute('aria-label', d.toLocaleDateString());
    cell.innerHTML = `<div><div class="date">${d.getDate()}</div></div><div class="badges"></div>`;
    // badges
    const badges = cell.querySelector('.badges');
    const arr = notesStore[ymd] || [];
    arr.slice(0,3).forEach(n=>{
      const b = document.createElement('div');
      b.className = 'badge';
      b.title = (n.time ? n.time + ' ' : '') + (n.title||'');
      b.textContent = (n.time ? n.time + ' ' : '') + (n.title||'Заметка');
      badges.appendChild(b);
    });
    if(arr.length>3){
      const extra = document.createElement('div');
      extra.className = 'badge';
      extra.textContent = `+${arr.length-3}`;
      badges.appendChild(extra);
    }
    cell.addEventListener('click', ()=> openSheet(ymd));
    grid.appendChild(cell);
  }
  // month label
  const label = state.current.toLocaleDateString('ru-RU',{month:'long', year:'numeric'});
  $('#monthLabel').textContent = label.charAt(0).toUpperCase() + label.slice(1);
}

/* sheet modal */
const sheet = $('#sheet');
function openSheet(ymd){
  state.selected = ymd;
  $('#sheetDate').textContent = nice(ymd);
  refreshNotesList();
  sheet.style.display = 'flex';
  sheet.setAttribute('aria-hidden','false');
  document.body.style.overflow = 'hidden';
}
function closeSheet(){
  sheet.style.display = 'none';
  sheet.setAttribute('aria-hidden','true');
  document.body.style.overflow = '';
}

function refreshNotesList(){
  const out = $('#notesList');
  out.innerHTML = '';
  const arr = notesStore[state.selected] || [];
  if(arr.length === 0) {
    out.innerHTML = `<div class="small" style="opacity:.6">Нет заметок</div>`;
    return;
  }
  // sort by time
  arr.sort((a,b)=> (a.time||'').localeCompare(b.time||'') || a.created - b.created);
  arr.forEach(n=>{
    const node = document.createElement('div');
    node.className = 'note';
    node.innerHTML = `<div class="left"><div class="title">${escape(n.title)}</div><div class="meta">${n.time ? n.time + ' • ' : ''}${escape(n.desc)}</div></div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">
        <button class="btn edit" data-id="${n.id}">✎</button>
        <button class="btn del" data-id="${n.id}">🗑</button>
      </div>`;
    out.appendChild(node);
  });
  // handlers
  $$('.edit', out).forEach(b=> b.addEventListener('click', (e)=>{
    const id = b.dataset.id;
    editNote(id);
  }));
  $$('.del', out).forEach(b=> b.addEventListener('click', (e)=>{
    const id = b.dataset.id;
    if(confirm('Удалить заметку?')) {
      notesStore[state.selected] = (notesStore[state.selected]||[]).filter(x=>x.id !== id);
      saveNotes();
      refreshNotesList(); render();
    }
  }));
}

/* add note */
function addNote(){
  const time = $('#noteTime').value || '';
  const title = $('#noteTitle').value.trim() || 'Без названия';
  const desc = $('#noteDesc').value.trim() || '';
  if(!state.selected){ alert('Выберите дату.'); return; }
  const note = { id: uid(8), time, title, desc, created: Date.now() };
  if(!notesStore[state.selected]) notesStore[state.selected] = [];
  notesStore[state.selected].push(note);
  saveNotes();
  $('#noteTime').value = '09:00';
  $('#noteTitle').value = '';
  $('#noteDesc').value = '';
  refreshNotesList();
  render();
}

/* edit note (simple inline load) */
function editNote(id){
  const arr = notesStore[state.selected] || [];
  const n = arr.find(x=>x.id === id);
  if(!n) return;
  $('#noteTime').value = n.time || '09:00';
  $('#noteTitle').value = n.title || '';
  $('#noteDesc').value = n.desc || '';
  // modify add button to save
  const saveBtn = $('#addNote');
  const prev = saveBtn.textContent;
  saveBtn.textContent = 'Сохранить';
  saveBtn.removeEventListener('click', addNoteHandlerWrapper);
  saveBtn.addEventListener('click', function saver(){
    n.time = $('#noteTime').value;
    n.title = $('#noteTitle').value.trim() || 'Без названия';
    n.desc = $('#noteDesc').value.trim() || '';
    saveNotes();
    refreshNotesList(); render();
    // restore
    $('#noteTime').value = '09:00';
    $('#noteTitle').value = '';
    $('#noteDesc').value = '';
    saveBtn.textContent = prev;
    saveBtn.removeEventListener('click', saver);
    saveBtn.addEventListener('click', addNoteHandlerWrapper);
  });
}

/* clear all */
function clearAll(){
  if(!confirm('Удалить все заметки локально?')) return;
  notesStore = {};
  saveNotes();
  refreshNotesList(); render();
}

/* export */
function exportJson(){
  const data = JSON.stringify(notesStore, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'minical_notes.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

/* simple escape for text */
function escape(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* generator (local "ИИ") */
const templates = {
  morning: [
    {dur:15,title:'Пробуждение',desc:'Выпить воды, легкая растяжка'},
    {dur:30,title:'Тренировка',desc:'Короткая зарядка / домашняя тренировка'},
    {dur:25,title:'Душ и подготовка',desc:'Душ, одежда, 5 минут планирования дня'}
  ],
  work: [
    {dur:90,title:'Глубокая работа',desc:'Одна приоритетная задача, без отвлекающих факторов'},
    {dur:15,title:'Перерыв',desc:'Прогулка или разминка'},
    {dur:60,title:'Второй блок работы',desc:'Задачи средней важности'}
  ],
  evening: [
    {dur:45,title:'Отдых',desc:'Прогулка, чтение или подкаст'},
    {dur:30,title:'Подготовка ко сну',desc:'Отключаем экраны, расслабление'}
  ],
  quick: [
    {dur:10,title:'Кофе/чай',desc:'Мини-ритуал для бодрости'},
    {dur:10,title:'Планировка',desc:'3 главные задачи на день'}
  ]
};
const KEYWORDS = [
  {words:['утр','утрен','утром'],'tag':'morning'},
  {words:['работа','продукт','фокус','учеб','учёб'],'tag':'work'},
  {words:['вечер','сон','ночь'],'tag':'evening'},
  {words:['быстр','легк','коротк'],'tag':'quick'},
  {words:['трен','спорт','тренировка','фитнес'],'tag':'morning'}
];

function analyze(prompt){
  const p = (prompt||'').toLowerCase();
  const found = new Set();
  KEYWORDS.forEach(k=>{
    for(const w of k.words) if(p.includes(w)) { found.add(k.tag); break; }
  });
  if(found.size===0){ found.add('morning'); found.add('work'); found.add('evening'); }
  return Array.from(found);
}
function buildBlocks(tags, startHour=7){
  let cur = startHour*60;
  const out = [];
  const order = ['morning','quick','work','evening'];
  order.forEach(k=>{
    if(tags.includes(k)){
      const tpl = templates[k] || [];
      tpl.forEach(b=>{
        const hh = Math.floor(cur/60), mm = cur%60;
        const start = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
        out.push({...b, start});
        cur += b.dur + 6; // small buffer
      });
    }
  });
  return out;
}
function renderGenerated(blocks, prompt){
  if(!blocks || blocks.length===0) return 'Пустой распорядок';
  const wrap = document.createElement('div');
  const header = document.createElement('div');
  header.style.color='rgba(255,255,255,0.6)';
  header.style.fontSize='13px';
  header.style.marginBottom='8px';
  header.textContent = `По запросу: ${prompt||'авто'}`;
  wrap.appendChild(header);
  blocks.forEach(b=>{
    const row = document.createElement('div');
    row.style.display='flex';
    row.style.justifyContent='space-between';
    row.style.marginBottom='8px';
    row.innerHTML = `<div style="font-weight:700">${b.start} · ${escape(b.title)}</div><div style="color:var(--muted)">${b.dur} мин</div>
      <div style="color:var(--muted);font-size:13px;margin-top:4px">${escape(b.desc)}</div>`;
    wrap.appendChild(row);
  });
  return wrap.innerHTML;
}

function generateRoutine(){
  const prompt = $('#routine').value.trim();
  const tags = analyze(prompt);
  const blocks = buildBlocks(tags, 7);
  $('#previewArea').innerHTML = renderGenerated(blocks, prompt);
  state.lastGenerated = {blocks, prompt};
}

/* apply to selected date */
function applyRoutineToDate(){
  if(!state.selected) { alert('Открой дату (тап по дню)'); return; }
  if(!state.lastGenerated || !state.lastGenerated.blocks) { alert('Сначала сгенерируй распорядок (ИИ)'); return; }
  if(!notesStore[state.selected]) notesStore[state.selected] = [];
  state.lastGenerated.blocks.forEach(b=>{
    notesStore[state.selected].push({id: uid(8), time: b.start, title: b.title, desc: b.desc, created: Date.now()});
  });
  saveNotes();
  refreshNotesList(); render();
  alert('Распорядок добавлен в выбранную дату.');
}

/* handlers wiring */
function addNoteHandlerWrapper(e){ addNote(); }
document.addEventListener('DOMContentLoaded', ()=>{
  render();
  $('#prev').addEventListener('click', ()=>{ state.current = new Date(state.current.getFullYear(), state.current.getMonth()-1, 1); render(); });
  $('#next').addEventListener('click', ()=>{ state.current = new Date(state.current.getFullYear(), state.current.getMonth()+1, 1); render(); });
  $('#today').addEventListener('click', ()=>{ state.current = new Date(); render(); });
  $('#closeSheet').addEventListener('click', closeSheet);
  $('#addNote').addEventListener('click', addNoteHandlerWrapper);
  $('#clearAll').addEventListener('click', clearAll);
  $('#export').addEventListener('click', exportJson);
  $('#gen').addEventListener('click', generateRoutine);
  $('#applyRoutine').addEventListener('click', applyRoutineToDate);

  // keyboard: g to generate (desktop)
  document.addEventListener('keydown', (e)=>{ if((e.ctrlKey||e.metaKey) && e.key === 'g'){ e.preventDefault(); generateRoutine(); } });
  // close sheet on backdrop click
  $('#sheet').addEventListener('click', (ev)=>{ if(ev.target === $('#sheet')) closeSheet(); });
});

/* ===========================
   Canvas background: subtle animated noise + soft radial gradients
   =========================== */
(function bgCanvasInit(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let w=0,h=0, t0=0, noise=[];

  function resize(){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    w = canvas.width = Math.ceil(window.innerWidth * dpr);
    h = canvas.height = Math.ceil(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(dpr,dpr);
    // regenerate noise layers
    noise = [];
    for(let i=0;i<3;i++){
      noise.push({x: Math.random()*1000, y:Math.random()*1000, s: 0.2 + i*0.2, speed: 0.0008 + i*0.0006});
    }
  }
  function draw(time){
    if(!t0) t0 = time;
    const t = (time - t0) * 0.001;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // base radial vignette
    const g = ctx.createLinearGradient(0,0,w, h);
    g.addColorStop(0, 'rgba(20,20,21,0.12)');
    g.addColorStop(0.5, 'rgba(8,8,9,0.06)');
    g.addColorStop(1, 'rgba(0,0,0,0.18)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // soft moving grayscale blobs
    for(let i=0;i<3;i++){
      const nx = Math.sin(t * (0.2 + i*0.1) + noise[i].x) * 0.3 + 0.5;
      const ny = Math.cos(t * (0.15 + i*0.08) + noise[i].y) * 0.25 + 0.5;
      const rad = Math.min(window.innerWidth, window.innerHeight) * (0.45 - i*0.1);
      const grad = ctx.createRadialGradient(nx*window.innerWidth, ny*window.innerHeight, rad*0.05, nx*window.innerWidth, ny*window.innerHeight, rad);
      const alpha = 0.06 + i*0.03;
      const tone = 40 + i*15;
      grad.addColorStop(0, `rgba(${tone},${tone},${tone},${alpha})`);
      grad.addColorStop(1, `rgba(4,4,5,0)`);
      ctx.globalCompositeOperation = i===0 ? 'source-over' : 'lighter';
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    // subtle animated grain
    const imgData = ctx.createImageData( Math.min(200, Math.floor(window.innerWidth/4)), Math.min(200, Math.floor(window.innerHeight/4)) );
    for(let i=0;i<imgData.data.length;i+=4){
      const v = 220 + Math.floor(Math.sin((i + t*1000)*0.01) * 12 * Math.sin(i*0.001));
      imgData.data[i] = imgData.data[i+1] = imgData.data[i+2] = v;
      imgData.data[i+3] = 8; // low alpha
    }
    ctx.globalCompositeOperation = 'overlay';
    ctx.putImageData(imgData, Math.random()*10 - 5, Math.random()*10 - 5);

    ctx.globalCompositeOperation = 'source-over';
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();

/* autosave on unload */
window.addEventListener('beforeunload', ()=> saveNotes());
</script>
