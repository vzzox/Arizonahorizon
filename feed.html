<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>STAVOK.NET | Titanium</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Unbounded:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #000000;
            --glass: rgba(20, 20, 20, 0.75);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00FF94;
            --gold: #FFD700;
            --danger: #FF3B30;
            --text: #FFFFFF;
            --font-h: 'Unbounded', sans-serif;
            --font-b: 'Inter', sans-serif;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg); color: var(--text); font-family: var(--font-b);
            overflow-x: hidden; padding-bottom: 120px;
            background-image: radial-gradient(circle at 50% 0%, rgba(0,255,148,0.05), transparent 40%);
        }

        /* LIQUID GLASS */
        .glass {
            background: var(--glass); backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px); border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* HEADER */
        .header {
            position: sticky; top: 15px; z-index: 100; margin: 0 15px;
            border-radius: 50px; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo-box {
            display: flex; align-items: center; gap: 10px; text-decoration: none;
        }
        .sq {
            width: 36px; height: 36px; background: #fff; color: #000; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-h); font-weight: 900; font-style: italic; font-size: 18px;
            transform: skewX(-10deg);
        }
        .txt { font-family: var(--font-h); font-weight: 800; font-size: 14px; color: #fff; font-style: italic; }

        .profile-pill {
            background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            padding: 5px 5px 5px 15px; border-radius: 40px; display: flex; align-items: center; gap: 10px;
        }
        .bal { font-family: var(--font-h); font-size: 11px; color: var(--accent); }
        .ava {
            width: 32px; height: 32px; border-radius: 50%; background: #222;
            border: 1px solid #fff; display: flex; align-items: center; justify-content: center;
            font-family: var(--font-h); font-weight: 700; font-size: 12px;
        }

        /* ADMIN BANNER */
        .banner {
            margin: 15px 15px 0; background: linear-gradient(90deg, rgba(255,215,0,0.1), transparent);
            border: 1px solid rgba(255,215,0,0.3); border-radius: 20px; padding: 15px;
            display: none; align-items: center; gap: 15px; position: relative;
        }
        .b-icon { font-size: 20px; color: var(--gold); animation: pulse 2s infinite; }
        .b-text h4 { font-family: var(--font-h); font-size: 12px; margin-bottom: 2px; }
        .b-text p { font-size: 10px; color: #aaa; }
        .b-edit { position: absolute; right: 10px; top: 10px; font-size: 10px; color: #fff; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 50%; cursor: pointer; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* FEED */
        .feed { padding: 20px 15px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        .post { border-radius: 24px; padding: 20px; position: relative; }
        .p-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .p-u { display: flex; gap: 10px; align-items: center; }
        .p-a { width: 40px; height: 40px; border-radius: 12px; background: #333; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 1px solid var(--border); }
        .p-i h4 { font-size: 13px; font-weight: 700; margin-bottom: 2px; font-family: var(--font-h); }
        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #fff; color: #000; font-weight: 800; margin-left: 5px; }
        
        .p-admin-opts { position: absolute; top: 15px; right: 15px; display: flex; gap: 5px; opacity: 0; transition: 0.3s; }
        .post:hover .p-admin-opts { opacity: 1; }
        .ao-btn { width: 24px; height: 24px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; border: 1px solid #555; }
        .ao-btn:hover { background: #fff; color: #000; }

        .p-body { font-size: 14px; color: #ddd; line-height: 1.5; white-space: pre-wrap; }
        .p-img { width: 100%; border-radius: 16px; margin-top: 10px; border: 1px solid var(--border); }

        /* MATCH WIDGET */
        .match { background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent); border: 1px solid var(--border); border-radius: 20px; padding: 15px; margin-top: 15px; position: relative; }
        .m-live { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: var(--danger); font-size: 9px; font-weight: 800; border: 1px solid var(--danger); padding: 2px 8px; border-radius: 10px; }
        .m-teams { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; margin-bottom: 20px; }
        .mt { text-align: center; width: 35%; font-family: var(--font-h); font-size: 12px; font-weight: 700; }
        .ms { font-size: 24px; font-weight: 900; color: #fff; font-family: var(--font-h); }
        .m-time { font-size: 10px; color: var(--accent); display: block; text-align: center; }
        
        .m-bets { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
        .btn-bet { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; }
        .btn-bet:active { background: var(--accent); color: #000; }
        .bk { display: block; font-weight: 700; font-family: var(--font-h); }
        .bl { font-size: 9px; text-transform: uppercase; color: #888; }

        /* NAV */
        .nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 70px; background: #111;
            border-radius: 50px; border: 1px solid var(--border); display: flex; justify-content: space-evenly; align-items: center; z-index: 900;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .ni { display: flex; flex-direction: column; align-items: center; color: #555; text-decoration: none; width: 60px; }
        .ni i { font-size: 20px; margin-bottom: 3px; }
        .ni span { font-size: 9px; font-weight: 700; font-family: var(--font-h); text-transform: uppercase; }
        .ni.active { color: #fff; }

        /* FAB */
        .fab {
            position: fixed; bottom: 120px; right: 20px; width: 60px; height: 60px;
            background: #fff; color: #000; border-radius: 18px; display: none;
            align-items: center; justify-content: center; font-size: 24px; z-index: 800;
            cursor: pointer; box-shadow: 0 0 20px rgba(255,255,255,0.2); transition: 0.3s;
        }
        .fab:hover { transform: rotate(90deg); }

        /* MODALS */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal { width: 100%; max-width: 400px; background: #0A0A0A; border: 1px solid var(--border); border-radius: 30px; padding: 25px; }
        .m-t { font-family: var(--font-h); font-size: 18px; margin-bottom: 20px; color: #fff; }
        .inp { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 10px; font-family: var(--font-b); }
        .btn { width: 100%; padding: 15px; background: #fff; color: #000; border-radius: 12px; font-weight: 800; border: none; font-family: var(--font-h); text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        
        /* ADMIN CONTROLS */
        .adm-box { border-top: 1px solid var(--border); padding-top: 15px; margin-top: 15px; display: none; }
        .adm-lbl { color: var(--gold); font-size: 10px; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 8px; }

        /* TOAST */
        #toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #fff; color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 700; opacity: 0; transition: 0.3s; z-index: 5000; font-family: var(--font-h); font-size: 12px; pointer-events: none; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="toast">Действие выполнено</div>

    <header class="header glass">
        <a href="feed.html" class="logo-box">
            <div class="sq">S</div>
            <div class="txt">STAVOK</div>
        </a>
        <div class="profile-pill" onclick="window.location.href='profile.html'">
            <span class="bal" id="headBal">...</span>
            <div class="ava" id="headAva">?</div>
        </div>
    </header>

    <div class="banner" id="adminBanner">
        <i class="fa-solid fa-bolt b-icon"></i>
        <div class="b-text">
            <h4 id="bnrTitle">BONUS X2</h4>
            <p id="bnrText">Only today</p>
        </div>
        <div class="b-edit" id="bnrEdit" style="display:none;" onclick="App.admin.editBanner()"><i class="fa-solid fa-pen"></i></div>
    </div>

    <main class="feed">
        <div id="pinnedStream"></div>
        <div id="feedStream">
            <div style="text-align:center; margin-top:50px;"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
        </div>
    </main>

    <div class="fab" id="adminFab" onclick="App.ui.openModal('createModal')">
        <i class="fa-solid fa-plus"></i>
    </div>

    <nav class="nav">
        <a href="news.html" class="ni"><i class="fa-solid fa-bolt"></i><span>News</span></a>
        <a href="feed.html" class="ni active"><i class="fa-solid fa-layer-group"></i><span>Feed</span></a>
        <a href="profile.html" class="ni"><i class="fa-solid fa-user-astronaut"></i><span>Profile</span></a>
    </nav>

    <div class="overlay" id="createModal">
        <div class="modal">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 class="m-t">Создать пост</h3>
                <i class="fa-solid fa-xmark" style="color:#666; cursor:pointer;" onclick="App.ui.closeModal()"></i>
            </div>
            
            <input type="text" id="pTitle" class="inp" placeholder="Заголовок">
            <textarea id="pContent" class="inp" style="height:100px; resize:none;" placeholder="Текст..."></textarea>
            
            <div class="adm-box" id="adminFields">
                <span class="adm-lbl">ИНСТРУМЕНТЫ АДМИНА</span>
                <select id="pType" class="inp" style="background:#222; cursor:pointer;">
                    <option value="text">Обычный пост</option>
                    <option value="match">Матч (Ставки)</option>
                    <option value="ad">Реклама</option>
                </select>
                <div id="matchInp" style="display:none; gap:5px;">
                    <input type="text" id="mT1" class="inp" placeholder="Команда 1">
                    <input type="text" id="mT2" class="inp" placeholder="Команда 2">
                </div>
            </div>

            <button class="btn" onclick="App.posts.create()">Опубликовать</button>
        </div>
    </div>

    <div class="overlay" id="editMatchModal">
        <div class="modal">
            <h3 class="m-t">Управление матчем</h3>
            <input type="text" id="emScore" class="inp" placeholder="Счет (2:1)">
            <input type="text" id="emTime" class="inp" placeholder="Время (45')">
            <div style="display:flex; gap:10px;">
                <button class="btn" onclick="App.admin.updateMatch()">Обновить</button>
                <button class="btn" style="background:#333; color:#fff;" onclick="App.admin.settleBet()">Расчет ставок</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="betModal">
        <div class="modal">
            <h3 class="m-t" style="text-align:center">Ставка</h3>
            <div style="text-align:center; margin-bottom:20px; background:#222; padding:10px; border-radius:10px;">
                <div id="bOut" style="font-size:18px; font-weight:700;">-</div>
                <div id="bCoef" style="color:var(--accent); font-weight:800;">-</div>
            </div>
            <input type="number" id="bSum" class="inp" placeholder="Сумма" style="text-align:center; font-weight:700;">
            <button class="btn" style="background:var(--accent); color:#000;" onclick="App.bets.confirm()">Поставить</button>
        </div>
    </div>

    <div class="overlay" id="bannerModal">
        <div class="modal">
            <h3 class="m-t">Баннер</h3>
            <input type="text" id="ebTitle" class="inp" placeholder="Заголовок">
            <input type="text" id="ebText" class="inp" placeholder="Текст">
            <button class="btn" onclick="App.admin.saveBanner()">Сохранить</button>
            <button class="btn" style="background:#333; color:#fff; margin-top:5px;" onclick="App.admin.hideBanner()">Скрыть</button>
        </div>
    </div>

    <script>
        const CFG = {
            url: 'https://cmoeirxugwapvvcdkwjs.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE'
        };

        const App = {
            sb: null, user: null, profile: null,
            tempBet: null, editId: null,

            init: async function() {
                try {
                    this.sb = window.supabase.createClient(CFG.url, CFG.key);
                    const { data: { session } } = await this.sb.auth.getSession();
                    if(!session) return window.location.href = 'login.html';
                    this.user = session.user;

                    await Promise.all([this.loadProfile(), this.posts.load()]);
                    this.realtime();
                    this.setupUI();
                    
                    // Banner Init
                    if(localStorage.getItem('showBanner') === 'true') {
                        document.getElementById('adminBanner').style.display = 'flex';
                        document.getElementById('bnrTitle').innerText = localStorage.getItem('bnrT') || 'BONUS';
                        document.getElementById('bnrText').innerText = localStorage.getItem('bnrD') || 'Info';
                    }

                } catch(e) { console.error(e); }
            },

            loadProfile: async function() {
                // Fetch profile or create if missing (Self-healing)
                let { data } = await this.sb.from('users').select('*').eq('id', this.user.id).single();
                
                if(!data) {
                    // Create profile if missing
                    const newProfile = { 
                        id: this.user.id, 
                        username: this.user.user_metadata.username || 'User',
                        email: this.user.email,
                        role: 'user', 
                        balance: 0 
                    };
                    await this.sb.from('users').insert([newProfile]);
                    data = newProfile;
                }

                this.profile = data;
                document.getElementById('headBal').innerText = parseFloat(data.balance).toFixed(2);
                document.getElementById('headAva').innerText = (data.username || '?')[0].toUpperCase();

                // RBAC
                if(data.role === 'admin') {
                    document.getElementById('adminFab').style.display = 'flex';
                    document.getElementById('adminFields').style.display = 'block';
                    document.getElementById('bnrEdit').style.display = 'block';
                }
            },

            posts: {
                load: async function() {
                    const s1 = document.getElementById('feedStream');
                    const s2 = document.getElementById('pinnedStream');
                    
                    // Запрос с явным указанием связи (users:author_id)
                    const { data } = await App.sb
                        .from('posts')
                        .select('*, users:author_id(username, role)')
                        .order('created_at', { ascending: false });

                    s1.innerHTML = ''; s2.innerHTML = '';
                    if(!data || !data.length) {
                        s1.innerHTML = '<div style="text-align:center; color:#555;">Пусто</div>';
                        return;
                    }

                    data.forEach(p => {
                        const html = this.render(p);
                        if(p.content.includes('|PIN|')) s2.innerHTML += html;
                        else s1.innerHTML += html;
                    });
                },

                render: function(p) {
                    const u = p.users || { username: 'Anon', role: 'user' };
                    let body = p.content.replace('|PIN|','');
                    const isMatch = body.includes('|VS|');
                    const isAd = body.includes('|AD|');
                    
                    // --- MATCH RENDERER ---
                    if(isMatch) {
                        // Parse: T1|VS|T2|SC|1:0|TM|45'
                        let [main, meta] = body.split('|SC|');
                        let [t1, t2] = main.split('|VS|');
                        let score = '0:0', time = 'LIVE';
                        if(meta) {
                            let [sc, tm] = meta.split('|TM|');
                            score = sc || score; time = tm || time;
                        }

                        body = `
                        <div class="match">
                            <div class="m-live">${time}</div>
                            <div class="m-teams">
                                <div class="mt">${t1}</div>
                                <div class="ms">${score}</div>
                                <div class="mt">${t2}</div>
                            </div>
                            <div class="m-bets">
                                <div class="btn-bet" onclick="App.bets.open('${t1}', 1.85)"><span class="bk">1.85</span><span class="bl">P1</span></div>
                                <div class="btn-bet" onclick="App.bets.open('Draw', 3.20)"><span class="bk">3.20</span><span class="bl">X</span></div>
                                <div class="btn-bet" onclick="App.bets.open('${t2}', 2.10)"><span class="bk">2.10</span><span class="bl">P2</span></div>
                            </div>
                            ${App.profile?.role === 'admin' ? 
                                `<div style="text-align:center; margin-top:10px;">
                                    <button class="ao-btn" style="width:auto; padding:5px 15px; border-radius:10px;" onclick="App.admin.openMatch('${p.id}')">Управление</button>
                                 </div>` : ''}
                        </div>`;
                    }
                    // --- AD RENDERER ---
                    else if(isAd) {
                        let [tag, title, desc] = body.split('|');
                        body = `
                        <div style="background:linear-gradient(45deg, #FFD70033, #000); padding:20px; border-radius:16px; border:1px solid #FFD700;">
                            <h3 style="color:#FFD700; font-family:var(--font-h);">${title}</h3>
                            <p style="font-size:12px; color:#ddd;">${desc}</p>
                            <button class="btn" style="background:#FFD700; color:#000; margin-top:10px; width:auto; padding:10px 20px;">Открыть</button>
                        </div>`;
                    }
                    else {
                        body = `<div class="p-body">${body}</div>`;
                        if(p.image_url) body += `<img src="${p.image_url}" class="p-img">`;
                    }

                    // Admin Overlay
                    let adminUI = '';
                    if(App.profile?.role === 'admin') {
                        adminUI = `
                        <div class="p-admin-opts">
                            <div class="ao-btn" onclick="App.admin.pin('${p.id}', '${p.content}')"><i class="fa-solid fa-thumbtack"></i></div>
                            <div class="ao-btn" onclick="App.admin.del('${p.id}')"><i class="fa-solid fa-trash"></i></div>
                        </div>`;
                    }

                    return `
                    <div class="post glass">
                        ${adminUI}
                        <div class="p-head">
                            <div class="p-u">
                                <div class="p-a">${u.username[0].toUpperCase()}</div>
                                <div class="p-i">
                                    <h4>${u.username} <span class="badge" style="${u.role==='admin'?'background:#fff':'background:#333; color:#fff'}">${u.role}</span></h4>
                                    <span style="font-size:10px; color:#777;">Только что</span>
                                </div>
                            </div>
                        </div>
                        <h4 style="font-family:var(--font-h); font-size:15px; margin-bottom:10px;">${p.title}</h4>
                        ${body}
                    </div>`;
                },

                create: async function() {
                    const t = document.getElementById('pTitle').value;
                    let c = document.getElementById('pContent').value;
                    const type = document.getElementById('pType').value;
                    const img = document.getElementById('pImg')?.value; // Optional

                    if(!t) return App.ui.toast("Заголовок!");

                    if(App.profile.role === 'admin') {
                        if(type === 'match') {
                            const t1 = document.getElementById('mT1').value;
                            const t2 = document.getElementById('mT2').value;
                            c = `${t1}|VS|${t2}`;
                        } else if(type === 'ad') {
                            c = `|AD|${t}|${c}`;
                        }
                    }

                    const { error } = await App.sb.from('posts').insert([{
                        author_id: App.user.id,
                        title: t, content: c, image_url: img || null
                    }]);

                    if(!error) {
                        App.ui.closeModal();
                        App.ui.toast("Готово");
                        document.getElementById('pTitle').value = '';
                        document.getElementById('pContent').value = '';
                    } else {
                        alert(error.message);
                    }
                }
            },

            admin: {
                openMatch: (id) => { App.editId = id; App.ui.openModal('editMatchModal'); },
                updateMatch: async () => {
                    const sc = document.getElementById('emScore').value;
                    const tm = document.getElementById('emTime').value;
                    // Fetch old content to preserve teams
                    const { data } = await App.sb.from('posts').select('content').eq('id', App.editId).single();
                    let base = data.content.split('|SC|')[0];
                    let newC = `${base}|SC|${sc}|TM|${tm}`;
                    await App.sb.from('posts').update({ content: newC }).eq('id', App.editId);
                    App.ui.closeModal();
                },
                settleBet: () => {
                    App.ui.closeModal();
                    App.ui.toast("Ставки рассчитаны (Simulated)");
                },
                del: async (id) => {
                    if(confirm('Delete?')) await App.sb.from('posts').delete().eq('id', id);
                },
                pin: async (id, oldC) => {
                    let newC = oldC.includes('|PIN|') ? oldC.replace('|PIN|','') : oldC + '|PIN|';
                    await App.sb.from('posts').update({ content: newC }).eq('id', id);
                },
                // Banner
                editBanner: () => App.ui.openModal('bannerModal'),
                saveBanner: () => {
                    const t = document.getElementById('ebTitle').value;
                    const d = document.getElementById('ebText').value;
                    localStorage.setItem('showBanner', 'true');
                    localStorage.setItem('bnrT', t);
                    localStorage.setItem('bnrD', d);
                    document.getElementById('adminBanner').style.display = 'flex';
                    document.getElementById('bnrTitle').innerText = t;
                    document.getElementById('bnrText').innerText = d;
                    App.ui.closeModal();
                },
                hideBanner: () => {
                    localStorage.setItem('showBanner', 'false');
                    document.getElementById('adminBanner').style.display = 'none';
                    App.ui.closeModal();
                }
            },

            bets: {
                open: (res, coef) => {
                    App.tempBet = { res, coef };
                    document.getElementById('bOut').innerText = res;
                    document.getElementById('bCoef').innerText = 'x'+coef;
                    App.ui.openModal('betModal');
                },
                confirm: async () => {
                    const v = parseFloat(document.getElementById('bSum').value);
                    if(!v || v <= 0) return App.ui.toast('Сумма?');
                    if(v > App.profile.balance) return App.ui.toast('Мало денег');
                    
                    const newB = App.profile.balance - v;
                    await App.sb.from('users').update({ balance: newB }).eq('id', App.user.id);
                    App.ui.closeModal();
                    App.ui.toast('Принято!');
                }
            },

            ui: {
                openModal: (id) => document.getElementById(id).style.display = 'block',
                closeModal: () => document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none'),
                toast: (m) => {
                    const t = document.getElementById('toast');
                    t.innerText = m; t.classList.add('show');
                    setTimeout(() => t.classList.remove('show'), 2000);
                }
            },

            setupUI: () => {
                document.getElementById('pType').addEventListener('change', e => {
                    document.getElementById('matchInp').style.display = e.target.value === 'match' ? 'flex' : 'none';
                });
            },

            realtime: function() {
                this.sb.channel('main')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => this.posts.load())
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${this.user.id}` }, 
                    p => {
                        this.profile.balance = p.new.balance;
                        document.getElementById('headBal').innerText = parseFloat(p.new.balance).toFixed(2);
                    })
                    .subscribe();
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
