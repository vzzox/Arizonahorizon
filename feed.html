<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Лента | STAVOK.NET</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Unbounded:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* COLORS */
            --bg-body: #050505;
            --bg-panel: #0F0F0F;
            --bg-card: rgba(20, 20, 20, 0.6);
            --bg-card-hover: rgba(30, 30, 30, 0.8);
            
            --border-weak: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.2);
            
            --brand-white: #FFFFFF;
            --brand-green: #00E096;
            --brand-red: #FF4444;
            --brand-blue: #2E86DE;
            --brand-gold: #FFBB00;
            
            --text-main: #FFFFFF;
            --text-muted: #888888;
            
            /* SIZES */
            --nav-height: 70px;
            --sidebar-width: 280px;
            --feed-width: 680px;
            
            /* FONTS */
            --font-display: 'Unbounded', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            /* EFFECTS */
            --glass-blur: blur(20px);
            --shadow-card: 0 10px 40px -10px rgba(0,0,0,0.5);
            --transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- PARTICLES BG --- */
        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; pointer-events: none; }
        .ambient-light {
            position: fixed; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: -2;
            background: radial-gradient(circle at 50% 0%, rgba(0, 224, 150, 0.05), transparent 60%);
        }

        /* --- LAYOUT GRID --- */
        .app-layout {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr var(--sidebar-width);
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            padding-top: calc(var(--nav-height) + 40px); /* +40px for Ad Banner space */
            padding-bottom: 50px;
            padding-left: 20px; padding-right: 20px;
        }

        /* --- HEADER & AD BANNER --- */
        .top-ad-banner {
            position: fixed; top: 0; left: 0; width: 100%; height: 40px;
            background: linear-gradient(90deg, #111, #222, #111);
            z-index: 1002; display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid var(--border-weak);
            font-size: 12px; font-weight: 600; letter-spacing: 1px;
            transform: translateY(0); transition: transform 0.3s;
        }
        .top-ad-banner.hidden { transform: translateY(-100%); }
        .top-ad-banner span { color: var(--brand-green); margin-right: 10px; }

        .navbar {
            position: fixed; top: 40px; left: 0; width: 100%; height: var(--nav-height);
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-weak);
            z-index: 1000; display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; transition: top 0.3s;
        }

        /* LOGO (Copied from Reg) */
        .logo-box { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-cube {
            width: 36px; height: 36px; background: white; color: black; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-weight: 900; font-size: 18px;
            font-style: italic; transform: skewX(-12deg);
        }
        .logo-text {
            font-family: var(--font-display); font-size: 20px; font-weight: 800;
            color: white; font-style: normal; letter-spacing: -0.5px;
        }

        .nav-actions { display: flex; align-items: center; gap: 20px; }
        
        .user-chip {
            display: flex; align-items: center; gap: 10px;
            background: var(--bg-card); border: 1px solid var(--border-weak);
            padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .user-chip:hover { border-color: var(--brand-white); }
        .user-avatar { width: 28px; height: 28px; background: #333; border-radius: 50%; }
        .user-balance { color: var(--brand-green); font-weight: 600; font-size: 14px; font-family: var(--font-display); }

        /* --- SIDEBARS --- */
        .sidebar { position: sticky; top: 130px; height: fit-content; }
        .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .nav-item {
            padding: 12px 16px; border-radius: 12px; color: var(--text-muted);
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px;
            font-weight: 500;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: white; }
        .nav-item i { width: 20px; text-align: center; }

        .widget-card {
            background: var(--bg-card); border: 1px solid var(--border-weak);
            border-radius: 16px; padding: 20px; margin-bottom: 20px;
        }
        .widget-title { font-family: var(--font-display); font-size: 14px; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; }

        /* --- FEED STREAM --- */
        .feed-stream { display: flex; flex-direction: column; gap: 24px; }

        /* POST CARD BASE */
        .post-card {
            background: var(--bg-card); border: 1px solid var(--border-weak);
            border-radius: 20px; overflow: hidden; position: relative;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .post-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .post-author { display: flex; align-items: center; gap: 10px; }
        .author-avatar { width: 40px; height: 40px; border-radius: 10px; background: white; color: black; display: flex; align-items: center; justify-content: center; font-weight: 900; font-style: italic; transform: skewX(-5deg); }
        .author-info h4 { font-size: 15px; font-weight: 700; color: white; display: flex; align-items: center; gap: 6px; }
        .admin-badge { font-size: 10px; background: var(--brand-red); padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .post-time { font-size: 12px; color: var(--text-muted); }

        .post-content { padding: 0 20px 20px; font-size: 15px; line-height: 1.6; color: #ddd; }
        .post-image { width: 100%; height: auto; display: block; margin-top: 15px; border-radius: 12px; }

        /* TEMPLATE: FOOTBALL SCORE */
        .match-widget {
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.0));
            border: 1px solid var(--border-weak); border-radius: 16px;
            padding: 20px; margin-top: 15px; text-align: center;
        }
        .match-header { font-family: var(--font-display); font-size: 12px; color: var(--brand-green); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .teams-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .team { width: 30%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .team-logo { width: 60px; height: 60px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: #555; }
        .team-name { font-weight: 700; font-size: 14px; }
        .score-board { font-family: var(--font-display); font-size: 32px; font-weight: 800; letter-spacing: 2px; }
        
        .bet-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .bet-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-weak);
            padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .bet-btn:hover { background: var(--brand-green); border-color: var(--brand-green); color: black; }
        .coef { font-weight: 800; font-size: 16px; font-family: var(--font-display); }
        .label { font-size: 11px; text-transform: uppercase; opacity: 0.7; }

        /* TEMPLATE: PROMO */
        .promo-card {
            background: linear-gradient(135deg, #222, #111);
            border: 1px solid var(--brand-gold);
        }
        .promo-badge { background: var(--brand-gold); color: black; padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 11px; text-transform: uppercase; display: inline-block; margin-bottom: 10px; }
        .promo-btn {
            display: inline-block; background: var(--brand-gold); color: black;
            padding: 12px 24px; border-radius: 30px; font-weight: 700;
            text-decoration: none; margin-top: 15px; transform: skewX(-10deg);
        }
        .promo-btn span { display: block; transform: skewX(10deg); }

        /* ACTIONS & COMMENTS */
        .post-actions {
            padding: 15px 20px; border-top: 1px solid var(--border-weak);
            display: flex; gap: 20px;
        }
        .action-btn { color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 14px; transition: 0.2s; }
        .action-btn:hover { color: white; }
        .action-btn.active { color: var(--brand-red); }

        .comments-section {
            background: rgba(0,0,0,0.2); border-top: 1px solid var(--border-weak);
            padding: 20px; display: none; /* Hidden by default */
        }
        .comments-section.open { display: block; }
        
        .comment-input-wrap { display: flex; gap: 10px; margin-bottom: 20px; }
        .comment-input {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border-weak);
            border-radius: 20px; padding: 10px 16px; color: white; font-family: var(--font-body);
        }
        .send-btn { background: white; color: black; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .send-btn:hover { transform: scale(1.1); }

        .comment-list { display: flex; flex-direction: column; gap: 15px; }
        .comment { display: flex; gap: 12px; font-size: 13px; }
        .comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: #333; flex-shrink: 0; }
        .comment-body { flex: 1; }
        .comment-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .comment-user { font-weight: 600; color: white; }
        .comment-text { color: #ccc; line-height: 1.4; }
        .comment-actions { margin-top: 6px; display: flex; gap: 12px; font-size: 11px; color: var(--text-muted); }
        .reply-link { cursor: pointer; } .reply-link:hover { color: white; }

        /* Nested comments */
        .comment-reply { margin-left: 44px; margin-top: 10px; border-left: 2px solid var(--border-weak); padding-left: 12px; }

        /* --- ADMIN FAB & MODAL --- */
        .admin-fab {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; background: var(--brand-green);
            color: black; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 0 20px rgba(0, 224, 150, 0.4);
            cursor: pointer; z-index: 2000; transition: 0.3s;
            display: none; /* Visible only to admin */
        }
        .admin-fab:hover { transform: scale(1.1) rotate(90deg); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            z-index: 3000; display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        
        .modal-card {
            background: #111; border: 1px solid var(--border-strong);
            width: 500px; padding: 30px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .modal-title { font-family: var(--font-display); font-size: 20px; margin-bottom: 20px; }
        
        .form-select, .form-input, .form-textarea {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-weak); border-radius: 8px;
            color: white; margin-bottom: 15px; font-family: var(--font-body);
        }
        .form-textarea { height: 100px; resize: vertical; }

        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .btn-cancel { padding: 10px 20px; border-radius: 8px; background: transparent; border: 1px solid var(--border-weak); color: white; cursor: pointer; }
        .btn-publish { padding: 10px 20px; border-radius: 8px; background: white; color: black; border: none; font-weight: 700; cursor: pointer; }

        /* --- TOAST --- */
        .toast {
            position: fixed; top: 80px; right: 20px;
            background: #222; border: 1px solid var(--border-weak);
            padding: 15px 25px; border-radius: 12px; z-index: 4000;
            display: flex; align-items: center; gap: 10px;
            transform: translateX(120%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 4px solid var(--brand-green); }

        /* Responsive */
        @media (max-width: 1100px) {
            .app-layout { grid-template-columns: 80px 1fr 250px; }
            .sidebar span { display: none; } /* Icon only sidebar */
        }
        @media (max-width: 900px) {
            .app-layout { grid-template-columns: 1fr; padding-left: 0; padding-right: 0; }
            .sidebar, .widgets-col { display: none; }
            .navbar { padding: 0 20px; }
            .feed-stream { width: 100%; max-width: 600px; margin: 0 auto; padding: 0 10px; }
        }
    </style>
</head>
<body>

        <span>⚡ BONUS X2</span> ПОПОЛНИ БАЛАНС СЕЙЧАС И ПОЛУЧИ УДВОЕНИЕ! <i class="fa-solid fa-xmark" style="margin-left: 15px; cursor: pointer;" onclick="toggleBanner()"></i>

            <h3 class="modal-title">Создать пост</h3>
            
            <select id="postTemplate" class="form-select" onchange="App.admin.toggleFields()">
                <option value="text">Обычный текст</option>

    <script>
        // CONFIG
        const CONFIG = {
            supabaseUrl: 'https://cmoeirxugwapvvcdkwjs.supabase.co',
            supabaseKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE',
            adminEmails: ['admin@stavok.net', 'boss@stavok.net'] // Mock admin list for prototype
        };

        // --- AUTH MANAGER ---
        class AuthManager {
            constructor() {
                this.supabase = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
                this.user = null;
                this.profile = null;
            }

            async init() {
                // Check session
                const { data: { session } } = await this.supabase.auth.getSession();
                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }
                this.user = session.user;
                await this.loadProfile();
                this.updateUI();
                
                // Check Admin
                if (this.profile && this.profile.role === 'admin') {
                    document.getElementById('adminFab').style.display = 'flex';
                }
            }

            async loadProfile() {
                // Fetch profile from 'users' table
                const { data, error } = await this.supabase
                    .from('users')
                    .select('*')
                    .eq('id', this.user.id)
                    .single();
                
                if (data) this.profile = data;
                else {
                    // Fallback for demo if DB isn't populated
                    this.profile = { 
                        username: this.user.user_metadata.username || 'User',
                        balance: 0,
                        role: this.user.user_metadata.role || 'user' // Assume role passed in metadata or DB
                    };
                }
            }

            updateUI() {
                document.getElementById('navBalance').innerText = `${this.profile.balance.toFixed(2)} x2`;
                // Generate avatar from letters
                const av = document.getElementById('navAvatar');
                av.innerText = this.profile.username.substring(0, 1).toUpperCase();
            }

            async logout() {
                await this.supabase.auth.signOut();
                window.location.href = 'login.html';
            }
        }

        // --- POST & FEED MANAGER ---
        class FeedManager {
            constructor() {
                this.stream = document.getElementById('feedStream');
                this.posts = [];
            }

            init() {
                // In a real app, fetch from DB. Here we load mock initial data + created ones
                this.loadMockData();
                this.renderAll();
            }

            loadMockData() {
                this.posts = [
                    {
                        id: 1, type: 'match',
                        author: 'STAVOK ADMIN', role: 'admin', time: '10 мин назад',
                        content: 'Главное событие вечера! Лига Чемпионов возвращается. Делайте ваши ставки.',
                        data: {
                            team1: 'Bayern', team2: 'PSG',
                            score1: 0, score2: 0,
                            odds: { w1: 2.15, x: 3.50, w2: 3.10 }
                        },
                        likes: 42, comments: []
                    },
                    {
                        id: 2, type: 'promo',
                        author: 'Partners', role: 'admin', time: '1 час назад',
                        content: 'Специальное предложение от наших партнеров. Используйте промокод STAVOK2024.',
                        data: {
                            badge: 'Реклама',
                            btnText: 'Забрать Бонус',
                            link: '#'
                        },
                        likes: 120, comments: []
                    }
                ];
            }

            addPost(post) {
                this.posts.unshift(post);
                this.renderAll();
            }

            renderAll() {
                this.stream.innerHTML = '';
                this.posts.forEach(post => {
                    const html = this.generateHTML(post);
                    this.stream.insertAdjacentHTML('beforeend', html);
                });
            }

            generateHTML(post) {
                let innerContent = '';

                // TEMPLATE SWITCHER
                if (post.type === 'text') {
                    innerContent = `<div class="post-content">${post.content}</div>`;
                } 
                else if (post.type === 'image') {
                    innerContent = `
                        <div class="post-content">
                            ${post.content}
                            <img src="${post.data.image}" class="post-image" alt="Post Image">
                        </div>`;
                }
                else if (post.type === 'match') {
                    innerContent = `
                        <div class="post-content">${post.content}</div>
                        <div class="match-widget">
                            <div class="match-header">Champions League • Live</div>
                            <div class="teams-row">
                                <div class="team">
                                    <div class="team-logo">${post.data.team1[0]}</div>
                                    <div class="team-name">${post.data.team1}</div>
                                </div>
                                <div class="score-board">${post.data.score1} : ${post.data.score2}</div>
                                <div class="team">
                                    <div class="team-logo">${post.data.team2[0]}</div>
                                    <div class="team-name">${post.data.team2}</div>
                                </div>
                            </div>
                            <div class="bet-buttons">
                                <div class="bet-btn" onclick="App.bet.placeBet('${post.data.team1}', ${post.data.odds.w1})">
                                    <div class="label">Победа 1</div>
                                    <div class="coef">${post.data.odds.w1}</div>
                                </div>
                                <div class="bet-btn" onclick="App.bet.placeBet('Draw', ${post.data.odds.x})">
                                    <div class="label">Ничья</div>
                                    <div class="coef">${post.data.odds.x}</div>
                                </div>
                                <div class="bet-btn" onclick="App.bet.placeBet('${post.data.team2}', ${post.data.odds.w2})">
                                    <div class="label">Победа 2</div>
                                    <div class="coef">${post.data.odds.w2}</div>
                                </div>
                            </div>
                        </div>`;
                }
                else if (post.type === 'promo') {
                    innerContent = `
                        <div class="post-content">
                            <div class="promo-card" style="padding: 20px; border-radius: 12px; margin-top: 10px;">
                                <span class="promo-badge">${post.data.badge}</span>
                                <h3 style="color:white; margin-bottom: 10px;">${post.content}</h3>
                                <a href="${post.data.link}" class="promo-btn"><span>${post.data.btnText}</span></a>
                            </div>
                        </div>`;
                }

                // COMMON WRAPPER
                return `
                    <article class="post-card" id="post-${post.id}">
                        <div class="post-header">
                            <div class="post-author">
                                <div class="author-avatar">${post.author[0]}</div>
                                <div class="author-info">
                                    <h4>${post.author} <span class="admin-badge">ADMIN</span></h4>
                                    <div class="post-time">${post.time}</div>
                                </div>
                            </div>
                            <i class="fa-solid fa-ellipsis" style="color: #666;"></i>
                        </div>
                        ${innerContent}
                        <div class="post-actions">
                            <div class="action-btn" onclick="this.classList.toggle('active')">
                                <i class="fa-regular fa-heart"></i> ${post.likes}
                            </div>
                            <div class="action-btn" onclick="App.comments.toggle(${post.id})">
                                <i class="fa-regular fa-comment"></i> Комментарии
                            </div>
                            <div class="action-btn">
                                <i class="fa-solid fa-share"></i>
                            </div>
                        </div>
                        
                        <div class="comments-section" id="comments-${post.id}">
                            <div class="comment-input-wrap">
                                <input type="text" class="comment-input" id="input-${post.id}" placeholder="Написать комментарий...">
                                <button class="send-btn" onclick="App.comments.add(${post.id})"><i class="fa-solid fa-paper-plane"></i></button>
                            </div>
                            <div class="comment-list" id="list-${post.id}">
                                </div>
                        </div>
                    </article>
                `;
            }
        }

        // --- BETTING SYSTEM ---
        class BetManager {
            placeBet(outcome, coef) {
                // Here we would check balance and API
                App.ui.toast(`Ставка принята: ${outcome} (k=${coef})`, 'success');
                // Simulate balance deduction
                App.auth.profile.balance -= 10;
                App.auth.updateUI();
            }
        }

        // --- COMMENT SYSTEM ---
        class CommentManager {
            toggle(postId) {
                const sec = document.getElementById(`comments-${postId}`);
                sec.classList.toggle('open');
            }

            add(postId) {
                const input = document.getElementById(`input-${postId}`);
                const text = input.value.trim();
                if (!text) return;

                const username = App.auth.profile.username;
                
                const html = `
                    <div class="comment">
                        <div class="comment-avatar" style="color:white; display:flex; align-items:center; justify-content:center;">${username[0]}</div>
                        <div class="comment-body">
                            <div class="comment-header">
                                <span class="comment-user">${username}</span>
                                <span style="color:#666;">Только что</span>
                            </div>
                            <div class="comment-text">${text}</div>
                            <div class="comment-actions">
                                <span>Нравится</span>
                                <span class="reply-link" onclick="App.comments.reply(this)">Ответить</span>
                            </div>
                        </div>
                    </div>
                `;

                const list = document.getElementById(`list-${postId}`);
                list.insertAdjacentHTML('afterbegin', html);
                input.value = '';
            }

            reply(el) {
                // Simple visual reply simulation
                const parent = el.closest('.comment-body');
                if(parent.querySelector('.comment-input')) return; // Already replying

                const replyBox = document.createElement('div');
                replyBox.className = 'comment-input-wrap';
                replyBox.style.marginTop = '10px';
                replyBox.innerHTML = `
                     <input type="text" class="comment-input" placeholder="Ответ...">
                     <button class="send-btn" onclick="App.comments.submitReply(this)"><i class="fa-solid fa-paper-plane"></i></button>
                `;
                parent.appendChild(replyBox);
            }

            submitReply(btn) {
                const input = btn.previousElementSibling;
                const text = input.value.trim();
                if(!text) return;

                const wrapper = btn.closest('.comment-input-wrap');
                const parentBody = wrapper.parentElement; // comment-body
                
                const html = `
                    <div class="comment comment-reply">
                        <div class="comment-avatar" style="width:24px; height:24px; font-size:10px; color:white; display:flex; align-items:center; justify-content:center;">YOU</div>
                        <div class="comment-body">
                            <div class="comment-header"><span class="comment-user">${App.auth.profile.username}</span></div>
                            <div class="comment-text">${text}</div>
                        </div>
                    </div>
                `;
                
                // Insert after parent comment
                wrapper.remove();
                parentBody.insertAdjacentHTML('beforeend', html);
            }
        }

        // --- ADMIN SYSTEM ---
        class AdminManager {
            openModal() {
                document.getElementById('postModal').classList.add('active');
            }
            closeModal() {
                document.getElementById('postModal').classList.remove('active');
            }

            toggleFields() {
                const type = document.getElementById('postTemplate').value;
                document.getElementById('imageFields').style.display = type === 'image' ? 'block' : 'none';
                document.getElementById('matchFields').style.display = type === 'match' ? 'flex' : 'none';
                document.getElementById('matchFields').style.flexDirection = 'column';
                document.getElementById('matchFields').style.gap = '10px';
            }

            publishPost() {
                const type = document.getElementById('postTemplate').value;
                const title = document.getElementById('postTitle').value;
                const content = document.getElementById('postContent').value;

                const newPost = {
                    id: Date.now(),
                    type: type,
                    author: 'STAVOK ADMIN',
                    role: 'admin',
                    time: 'Только что',
                    content: content,
                    likes: 0,
                    data: {}
                };

                if (type === 'image') {
                    newPost.data.image = document.getElementById('postImageUrl').value || 'https://via.placeholder.com/600x300';
                }
                else if (type === 'match') {
                    newPost.data = {
                        team1: document.getElementById('team1').value || 'Team A',
                        team2: document.getElementById('team2').value || 'Team B',
                        score1: 0, score2: 0,
                        odds: {
                            w1: document.getElementById('odd1').value || 2.0,
                            x: document.getElementById('oddX').value || 3.0,
                            w2: document.getElementById('odd2').value || 2.0
                        }
                    };
                }
                else if (type === 'promo') {
                    newPost.data = { badge: 'Promo', btnText: 'Подробнее', link: '#' };
                }

                App.feed.addPost(newPost);
                this.closeModal();
                App.ui.toast('Пост опубликован', 'success');
                
                // Clear inputs
                document.getElementById('postContent').value = '';
                document.getElementById('postTitle').value = '';
            }
        }

        // --- UI UTILS ---
        class UIManager {
            toast(msg, type = 'normal') {
                const t = document.getElementById('toast');
                const txt = document.getElementById('toastMsg');
                txt.innerText = msg;
                t.className = `toast show ${type}`;
                setTimeout(() => t.className = 'toast', 3000);
            }
        }

        // --- PARTICLES (Shared code) ---
        function initParticles() {
            const canvas = document.getElementById('canvas-bg');
            const ctx = canvas.getContext('2d');
            let w, h, particles = [];
            const resize = () => { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; };
            window.addEventListener('resize', () => { resize(); create(); });
            const create = () => {
                particles = [];
                for(let i=0; i<40; i++) particles.push({
                    x: Math.random()*w, y: Math.random()*h,
                    vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, size: Math.random()*2
                });
            };
            const anim = () => {
                ctx.clearRect(0,0,w,h);
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                particles.forEach(p => {
                    p.x+=p.vx; p.y+=p.vy;
                    if(p.x<0)p.x=w; if(p.x>w)p.x=0; if(p.y<0)p.y=h; if(p.y>h)p.y=0;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(anim);
            };
            resize(); create(); anim();
        }

        // --- GLOBAL APP ---
        const App = {
            auth: new AuthManager(),
            feed: new FeedManager(),
            bet: new BetManager(),
            comments: new CommentManager(),
            admin: new AdminManager(),
            ui: new UIManager()
        };

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            initParticles();
            App.auth.init().then(() => {
                App.feed.init();
            });
        });

        function toggleBanner() {
            document.getElementById('topBanner').classList.add('hidden');
        }

    </script>
</body>
</html>
