<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STAVOK.NET | Liquid</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Unbounded:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Жидкое стекло (Liquid Glass) Palette */
            --bg-body: #050505;
            
            /* Glass Surface (60-80% Opacity) */
            --glass-bg: rgba(20, 20, 20, 0.70); 
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-shine: rgba(255, 255, 255, 0.08);
            
            /* Colors */
            --green: #00FF94;
            --gold: #FFD700;
            --white: #FFFFFF;
            --gray: #888888;
            
            /* Fonts & Spacing */
            --font-head: 'Unbounded', sans-serif;
            --font-body: 'Inter', sans-serif;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-body);
            color: var(--white);
            font-family: var(--font-body);
            overflow-x: hidden;
            padding-bottom: 120px;
            /* Сетчатый фон (Mesh Grid) */
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* --- GLASS EFFECT UTILITY --- */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* --- HEADER --- */
        .header {
            position: sticky; top: 15px; z-index: 100;
            margin: 0 15px; border-radius: 50px;
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-sq {
            width: 38px; height: 38px; background: #fff; color: #000;
            border-radius: 8px; /* Квадрат */
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-head); font-weight: 900; font-style: italic; font-size: 20px;
            transform: skewX(-12deg);
        }
        .logo-txt {
            font-family: var(--font-head); font-weight: 800; font-size: 14px;
            color: #fff; text-transform: uppercase; letter-spacing: 0.5px; font-style: italic;
        }

        .profile-chip {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            padding: 5px 5px 5px 15px; border-radius: 40px; cursor: pointer;
        }
        .user-bal { font-family: var(--font-head); font-size: 11px; color: var(--green); font-weight: 600; }
        .user-ava {
            width: 32px; height: 32px; background: #222; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-head); font-weight: 700; font-size: 12px; border: 1px solid var(--white);
        }

        /* --- HEADER BANNER (ADMIN) --- */
        .head-banner {
            margin: 15px 15px 0; border-radius: 20px; padding: 15px;
            background: linear-gradient(90deg, rgba(255,215,0,0.15), rgba(0,0,0,0));
            border: 1px solid rgba(255,215,0,0.3); display: none; /* Скрыто по дефолту */
            align-items: center; gap: 15px; animation: slideDown 0.5s ease;
        }
        .hb-icon { color: var(--gold); font-size: 20px; animation: pulse 2s infinite; }
        .hb-text { font-size: 12px; font-weight: 600; color: #fff; line-height: 1.4; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- FEED STREAM --- */
        .feed { padding: 20px 15px; display: flex; flex-direction: column; gap: 20px; max-width: 600px; margin: 0 auto; }

        .post { border-radius: 24px; padding: 20px; transition: transform 0.2s; position: relative; overflow: hidden; }
        .post:active { transform: scale(0.98); }

        /* POST HEADER */
        .p-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .p-user { display: flex; gap: 12px; align-items: center; }
        .p-ava { width: 42px; height: 42px; border-radius: 14px; background: #333; display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: var(--font-head); border: 1px solid var(--glass-border); }
        .p-info h4 { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 3px; font-family: var(--font-head); }
        .p-info span { font-size: 11px; color: var(--gray); }
        
        .role-badge { font-size: 9px; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; font-weight: 800; margin-left: 6px; }
        .role-badge.admin { background: #fff; color: #000; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        /* POST BODY */
        .p-body { font-size: 14px; line-height: 1.6; color: #ddd; }
        .p-img { width: 100%; border-radius: 16px; margin-top: 15px; border: 1px solid var(--glass-border); }

        /* TEMPLATE: MATCH WIDGET */
        .match-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 15px; margin-top: 15px;
        }
        .mc-teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .mc-t { text-align: center; width: 35%; font-family: var(--font-head); font-size: 12px; font-weight: 700; }
        .mc-vs { font-family: var(--font-head); font-size: 20px; font-weight: 900; color: var(--green); opacity: 0.8; }
        
        .mc-bets { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-bet {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 10px; text-align: center; cursor: pointer;
        }
        .btn-bet:active { background: rgba(0, 255, 148, 0.2); border-color: var(--green); }
        .bk { display: block; font-family: var(--font-head); font-weight: 700; font-size: 13px; }
        .bl { font-size: 9px; color: var(--gray); text-transform: uppercase; }

        /* TEMPLATE: ADVERTISEMENT */
        .ad-card {
            margin-top: 15px; border-radius: 20px; padding: 20px;
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(0,0,0,0.5));
            border: 1px solid var(--gold); position: relative;
        }
        .ad-badge { position: absolute; top: 10px; right: 10px; color: var(--gold); font-size: 9px; font-weight: 800; border: 1px solid var(--gold); padding: 2px 6px; border-radius: 4px; }
        .ad-btn {
            display: inline-block; background: var(--gold); color: #000;
            padding: 10px 20px; border-radius: 30px; font-family: var(--font-head);
            font-weight: 800; font-size: 12px; margin-top: 15px; cursor: pointer;
        }

        /* ACTIONS */
        .p-foot { display: flex; gap: 20px; border-top: 1px solid var(--glass-border); margin-top: 15px; padding-top: 15px; }
        .act { display: flex; align-items: center; gap: 8px; color: var(--gray); font-size: 13px; cursor: pointer; }
        .act:hover { color: #fff; }

        /* --- BOTTOM NAV (Floating) --- */
        .nav-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 70px; border-radius: 50px;
            display: flex; justify-content: space-evenly; align-items: center;
            z-index: 900;
        }
        .nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; color: rgba(255,255,255,0.4); width: 60px; }
        .nav-item i { font-size: 20px; transition: 0.3s; }
        .nav-item span { font-size: 9px; font-family: var(--font-head); font-weight: 600; opacity: 0; transform: translateY(10px); transition: 0.3s; }
        
        .nav-item.active { color: #fff; }
        .nav-item.active i { transform: translateY(-3px); text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .nav-item.active span { opacity: 1; transform: translateY(0); }

        /* --- FAB (ADMIN) --- */
        .fab {
            position: fixed; bottom: 110px; right: 20px;
            width: 60px; height: 60px; border-radius: 20px;
            background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 0 30px rgba(255,255,255,0.2);
            z-index: 800; cursor: pointer; display: none; /* Hidden for users */
        }

        /* --- LOADING & MODALS --- */
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal { width: 100%; max-width: 400px; background: #111; border: 1px solid var(--glass-border); border-radius: 30px; padding: 25px; }
        .inp { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 10px; font-family: var(--font-body); }
        .btn-main { width: 100%; padding: 15px; background: #fff; color: #000; border-radius: 12px; font-family: var(--font-head); font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

    </style>
</head>
<body>

    <div class="head-banner" id="promoBanner">
        <i class="fa-solid fa-bolt hb-icon"></i>
        <div class="hb-text">
            СУПЕР БОНУС! ПОПОЛНИ СЧЕТ СЕГОДНЯ И ПОЛУЧИ x2 НА БАЛАНС.
        </div>
    </div>

    <header class="header glass">
        <a href="feed.html" class="brand">
            <div class="logo-sq">S</div>
            <div class="logo-txt">STAVOK</div>
        </a>
        <div class="profile-chip" onclick="window.location.href='profile.html'">
            <span class="user-bal" id="headerBal">...</span>
            <div class="user-ava" id="headerAva">?</div>
        </div>
    </header>

    <main class="feed" id="feedStream">
        <div class="spinner"></div>
    </main>

    <div class="fab" id="adminFab" onclick="App.ui.openModal('createModal')">
        <i class="fa-solid fa-plus"></i>
    </div>

    <nav class="nav-bar glass">
        <a href="news.html" class="nav-item">
            <i class="fa-solid fa-bolt"></i>
            <span>News</span>
        </a>
        <a href="feed.html" class="nav-item active">
            <i class="fa-solid fa-layer-group"></i>
            <span>Feed</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fa-solid fa-user-astronaut"></i>
            <span>Profile</span>
        </a>
    </nav>

    <div class="overlay" id="createModal">
        <div class="modal">
            <h3 style="font-family:var(--font-head); margin-bottom:20px;">Создать пост</h3>
            
            <input type="text" id="pTitle" class="inp" placeholder="Заголовок">
            <textarea id="pContent" class="inp" style="height:100px; resize:none;" placeholder="Текст..."></textarea>
            
            <div style="margin-top:15px; border-top:1px solid #333; padding-top:15px;">
                <label style="font-size:10px; color:var(--gold); text-transform:uppercase; font-weight:800;">Admin Mode</label>
                <select id="pType" class="inp" style="margin-top:5px;">
                    <option value="text">Обычный</option>
                    <option value="match">Матч (Ставки)</option>
                    <option value="ad">Реклама</option>
                </select>
                
                <div id="matchFields" style="display:none;">
                    <input id="mT1" type="text" class="inp" placeholder="Команда 1">
                    <input id="mT2" type="text" class="inp" placeholder="Команда 2">
                </div>

                <div style="display:flex; gap:10px; align-items:center; margin-top:10px;">
                    <input type="checkbox" id="toggleBanner">
                    <label for="toggleBanner" style="font-size:12px; color:#aaa;">Включить баннер сверху</label>
                </div>
            </div>

            <button class="btn-main" onclick="App.posts.create()">Опубликовать</button>
            <p onclick="App.ui.closeModal()" style="text-align:center; font-size:12px; color:#666; margin-top:15px;">Отмена</p>
        </div>
    </div>

    <div class="overlay" id="betModal">
        <div class="modal">
            <h3 style="font-family:var(--font-head); text-align:center;">Ставка</h3>
            <div style="background:#222; padding:15px; border-radius:12px; margin:15px 0; text-align:center;">
                <div id="betTarget" style="font-size:18px; font-weight:700;">-</div>
                <div id="betCoef" style="color:var(--green); font-weight:800;">-</div>
            </div>
            <input type="number" id="betSum" class="inp" placeholder="Сумма" style="text-align:center; font-weight:700;">
            <button class="btn-main" style="background:var(--green); color:#000;" onclick="App.bets.confirm()">Поставить</button>
            <p onclick="App.ui.closeModal()" style="text-align:center; font-size:12px; color:#666; margin-top:10px;">Отмена</p>
        </div>
    </div>

    <script>
        const SB_CFG = {
            url: 'https://cmoeirxugwapvvcdkwjs.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE'
        };

        const App = {
            sb: null, user: null, profile: null, tempBet: null,

            init: async function() {
                this.sb = window.supabase.createClient(SB_CFG.url, SB_CFG.key);
                
                const { data: { session } } = await this.sb.auth.getSession();
                if(!session) return window.location.href = 'login.html';
                this.user = session.user;

                // Загружаем профиль + Ленту параллельно
                await Promise.all([ this.loadProfile(), this.loadFeed() ]);
                
                this.listeners();
                this.realtime();
            },

            loadProfile: async function() {
                const { data } = await this.sb.from('users').select('*').eq('id', this.user.id).single();
                if(data) {
                    this.profile = data;
                    document.getElementById('headerBal').innerText = parseFloat(data.balance).toFixed(2);
                    document.getElementById('headerAva').innerText = (data.username || '?')[0].toUpperCase();
                    
                    if(data.role === 'admin') {
                        document.getElementById('adminFab').style.display = 'flex';
                    }
                    
                    // Banner state (simple local check)
                    if(localStorage.getItem('showBanner') === 'true') {
                        document.getElementById('promoBanner').style.display = 'flex';
                    }
                }
            },

            loadFeed: async function() {
                const stream = document.getElementById('feedStream');
                try {
                    const { data, error } = await this.sb
                        .from('posts')
                        .select('*, users(username, role, avatar_url)')
                        .order('created_at', { ascending: false });

                    if(error) throw error;

                    stream.innerHTML = '';
                    if(!data || data.length === 0) {
                        stream.innerHTML = '<div style="text-align:center; color:#555; margin-top:50px;">Лента пуста</div>';
                        return;
                    }

                    data.forEach(p => {
                        stream.innerHTML += this.renderPost(p);
                    });
                } catch(e) {
                    console.error(e);
                    stream.innerHTML = `<div style="text-align:center; color:#f33;">Ошибка загрузки: ${e.message}</div>`;
                }
            },

            renderPost: function(p) {
                const u = p.users || { username: 'Anon', role: 'user' };
                const isMatch = p.content.includes('|VS|');
                const isAd = p.content.includes('|AD|');
                
                let body = `<div class="p-body">${p.content}</div>`;
                let badge = u.role === 'admin' ? '<span class="role-badge admin">ADMIN</span>' : '';

                // --- ШАБЛОН: МАТЧ ---
                if(isMatch && u.role === 'admin') {
                    const [t1, t2] = p.content.split('|VS|');
                    body = `
                    <div class="match-card">
                        <div class="mc-teams">
                            <div class="mc-t">${t1}</div>
                            <div class="mc-vs">VS</div>
                            <div class="mc-t">${t2}</div>
                        </div>
                        <div class="mc-bets">
                            <div class="btn-bet" onclick="App.bets.open('${t1}', 1.85)"><span class="bk">1.85</span><span class="bl">P1</span></div>
                            <div class="btn-bet" onclick="App.bets.open('X', 3.40)"><span class="bk">3.40</span><span class="bl">DRAW</span></div>
                            <div class="btn-bet" onclick="App.bets.open('${t2}', 2.10)"><span class="bk">2.10</span><span class="bl">P2</span></div>
                        </div>
                    </div>`;
                }
                // --- ШАБЛОН: РЕКЛАМА ---
                else if(isAd && u.role === 'admin') {
                    const [tag, title, desc] = p.content.split('|');
                    body = `
                    <div class="ad-card">
                        <span class="ad-badge">PROMO</span>
                        <h3 style="font-family:var(--font-head); font-size:18px; margin-bottom:5px;">${title}</h3>
                        <p style="font-size:12px; color:#ccc;">${desc}</p>
                        <div class="ad-btn">ПОДРОБНЕЕ</div>
                    </div>`;
                }

                return `
                <div class="post glass">
                    <div class="p-head">
                        <div class="p-user">
                            <div class="p-ava">${u.username[0].toUpperCase()}</div>
                            <div class="p-info">
                                <h4>${u.username} ${badge}</h4>
                                <span>Только что</span>
                            </div>
                        </div>
                        <i class="fa-solid fa-ellipsis" style="color:#555;"></i>
                    </div>
                    ${!isMatch && !isAd ? `<h4 style="font-family:var(--font-head); font-size:16px; margin-bottom:10px;">${p.title}</h4>` : ''}
                    ${body}
                    <div class="p-foot">
                        <div class="act"><i class="fa-regular fa-heart"></i> Лайк</div>
                        <div class="act"><i class="fa-regular fa-comment"></i> Коммент</div>
                    </div>
                </div>`;
            },

            posts: {
                create: async function() {
                    const title = document.getElementById('pTitle').value;
                    let content = document.getElementById('pContent').value;
                    const type = document.getElementById('pType').value;
                    const banner = document.getElementById('toggleBanner').checked;

                    // Баннер логика (локально для теста)
                    if(banner) {
                        localStorage.setItem('showBanner', 'true');
                        document.getElementById('promoBanner').style.display = 'flex';
                    } else {
                        localStorage.setItem('showBanner', 'false');
                        document.getElementById('promoBanner').style.display = 'none';
                    }

                    if(type === 'match') {
                        const t1 = document.getElementById('mT1').value;
                        const t2 = document.getElementById('mT2').value;
                        content = `${t1}|VS|${t2}`;
                    } else if(type === 'ad') {
                        content = `|AD|${title}|${content}`;
                    }

                    if(!title) return alert('Введите заголовок');

                    const { error } = await App.sb.from('posts').insert([{
                        author_id: App.user.id,
                        title: title,
                        content: content
                    }]);

                    if(!error) {
                        App.ui.closeModal();
                        App.loadFeed(); // Перезагрузить ленту
                    } else {
                        alert(error.message);
                    }
                }
            },

            bets: {
                open: (target, coef) => {
                    App.tempBet = { target, coef };
                    document.getElementById('betTarget').innerText = target;
                    document.getElementById('betCoef').innerText = 'x' + coef;
                    App.ui.openModal('betModal');
                },
                confirm: async function() {
                    const amount = parseFloat(document.getElementById('betSum').value);
                    if(!amount || amount <= 0) return alert('Неверная сумма');
                    if(amount > App.profile.balance) return alert('Мало денег');

                    const newBal = App.profile.balance - amount;
                    const { error } = await App.sb.from('users').update({ balance: newBal }).eq('id', App.user.id);
                    
                    if(!error) {
                        App.ui.closeModal();
                        alert('Ставка принята!');
                    }
                }
            },

            ui: {
                openModal: (id) => document.getElementById(id).style.display = 'flex',
                closeModal: () => document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none')
            },

            listeners: function() {
                document.getElementById('pType').addEventListener('change', (e) => {
                    document.getElementById('matchFields').style.display = e.target.value === 'match' ? 'block' : 'none';
                });
            },

            realtime: function() {
                this.sb.channel('updates')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => this.loadFeed())
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${this.user.id}` }, 
                    payload => {
                        document.getElementById('headerBal').innerText = parseFloat(payload.new.balance).toFixed(2);
                    })
                    .subscribe();
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
