<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Лента | STAVOK.NET Mobile</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Unbounded:wght@400;600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050505;
            --bg-glass: rgba(15, 15, 15, 0.85);
            --bg-input: rgba(255, 255, 255, 0.05);
            
            --accent: #00FF94;
            --accent-soft: rgba(0, 255, 148, 0.1);
            --error: #FF3333;
            --warn: #FFCC00;
            --white: #FFFFFF;
            
            --border: rgba(255, 255, 255, 0.1);
            --border-active: rgba(255, 255, 255, 0.3);
            
            --text-main: #FFFFFF;
            --text-muted: #999999;
            
            --font-display: 'Unbounded', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        /* --- BASIC SETUP --- */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-body);
            line-height: 1.5;
            -webkit-user-select: none;
            overflow-x: hidden;
            padding-bottom: calc(80px + var(--safe-bottom)); /* Пространство для нижнего бара */
        }

        /* --- BACKGROUND PARTICLES --- */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }

        /* --- HEADER SECTION --- */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: calc(15px + var(--safe-top)) 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .brand-icon {
            width: 34px; height: 34px; background: #fff; color: #000;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-weight: 900; font-style: italic;
            transform: skewX(-12deg); font-size: 18px;
        }
        .brand-name { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: #fff; }

        .header-right { display: flex; align-items: center; gap: 15px; }
        
        /* Исправленная аватарка и баланс */
        .wallet-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-input);
            padding: 5px 12px 5px 6px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .avatar-box {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #444, #111);
            border: 2px solid var(--border-active);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800; color: var(--accent);
            text-shadow: 0 0 10px var(--accent-soft);
            overflow: hidden;
        }

        .balance-text { font-family: var(--font-display); font-size: 12px; font-weight: 600; color: var(--accent); }

        /* --- AD BANNER (HORIZONTAL) --- */
        .ad-banner-strip {
            margin: 15px 20px;
            background: linear-gradient(90deg, #1a1a1a, #0a0a0a);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }
        .ad-banner-strip::before {
            content: 'AD'; position: absolute; top: 0; right: 0; background: var(--warn);
            color: #000; font-size: 8px; font-weight: 900; padding: 2px 6px; border-bottom-left-radius: 8px;
        }
        .ad-icon { width: 40px; height: 40px; background: var(--accent-soft); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 20px; }
        .ad-content h5 { font-size: 14px; margin-bottom: 2px; }
        .ad-content p { font-size: 11px; color: var(--text-muted); }

        /* --- FEED SECTION --- */
        .feed { padding: 0 15px; display: flex; flex-direction: column; gap: 20px; }

        .post {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            position: relative;
            animation: postFadeIn 0.5s ease-out;
        }

        @keyframes postFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .post-user { display: flex; align-items: center; gap: 12px; }
        .user-meta h4 { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .user-meta span { font-size: 11px; color: var(--text-muted); }
        .badge-admin { background: var(--error); color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }

        .post-text { font-size: 15px; line-height: 1.6; color: #efefef; margin-bottom: 15px; }
        .post-media { width: 100%; border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--border); }

        /* --- MATCH WIDGET --- */
        .match-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .match-teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .m-team { flex: 1; text-align: center; }
        .m-team img { width: 40px; height: 40px; margin-bottom: 5px; }
        .m-team b { font-size: 12px; display: block; }
        .m-score { font-family: var(--font-display); font-size: 24px; font-weight: 900; color: var(--accent); }

        .bet-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .bet-option {
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 10px 5px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .bet-option:active { background: var(--accent); color: #000; transform: scale(0.95); }
        .bet-option .o-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; display: block; }
        .bet-option .o-val { font-family: var(--font-display); font-size: 14px; font-weight: 700; }

        /* --- INTERACTIONS --- */
        .post-footer { display: flex; gap: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
        .i-btn { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-muted); cursor: pointer; }
        .i-btn.active { color: var(--error); }
        .i-btn.active i { font-weight: 900; }

        /* --- COMMENTS SYSTEM --- */
        .comments-block { margin-top: 15px; display: none; padding-top: 15px; border-top: 1px dashed var(--border); }
        .comment { display: flex; gap: 10px; margin-bottom: 12px; }
        .c-body { flex: 1; background: var(--bg-input); padding: 10px 14px; border-radius: 14px; font-size: 13px; }
        .c-user { font-weight: 700; margin-bottom: 2px; display: block; }
        .c-reply-btn { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: inline-block; }

        .comment-input-area { display: flex; gap: 10px; margin-top: 15px; }
        .c-input { flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: 50px; padding: 10px 18px; color: #fff; font-size: 13px; }
        .c-send { width: 38px; height: 38px; background: var(--white); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* --- BOTTOM NAVIGATION (MOBILE) --- */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: calc(70px + var(--safe-bottom));
            background: var(--bg-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: var(--safe-bottom);
            z-index: 2000;
        }

        .nav-link {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            text-decoration: none; color: var(--text-muted); transition: 0.3s;
            position: relative;
        }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 20px; }
        .nav-link span { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .nav-link.active::after {
            content: ''; position: absolute; top: -15px; width: 30px; height: 4px;
            background: var(--accent); border-radius: 0 0 10px 10px; box-shadow: 0 5px 15px var(--accent-soft);
        }

        /* --- MODALS --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 3000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal {
            background: #111; border: 1px solid var(--border-active);
            width: 100%; max-width: 400px; border-radius: 28px; padding: 30px;
        }
        .modal-h { font-family: var(--font-display); font-size: 18px; margin-bottom: 20px; }
        .m-input, .m-area {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; color: #fff; margin-bottom: 15px;
        }
        .m-area { height: 100px; resize: none; }
        .m-btn {
            width: 100%; padding: 15px; background: var(--white); color: #000;
            border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase;
        }

        /* --- TOAST --- */
        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--accent); color: #000; padding: 12px 25px; border-radius: 50px;
            font-weight: 700; font-size: 13px; z-index: 5000; opacity: 0; transition: 0.4s; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="toast" class="toast">Действие выполнено</div>

    <header class="header">
        <a href="feed.html" class="brand">
            <div class="brand-icon">S</div>
            <span class="brand-name">STAVOK.NET</span>
        </a>
        <div class="header-right">
            <div class="wallet-info">
                <div class="avatar-box" id="userAvatar">?</div>
                <span class="balance-text" id="userBalance">0.00 x2</span>
            </div>
        </div>
    </header>

    <div class="ad-banner-strip" id="topAd">
        <div class="ad-icon"><i class="fa-solid fa-bolt-lightning"></i></div>
        <div class="ad-content">
            <h5>VIP ПРОГНОЗЫ ДОСТУПНЫ</h5>
            <p>Получи доступ к аналитике от профи со скидкой 50%</p>
        </div>
    </div>

    <main class="feed" id="mainFeed">
        </main>

    <nav class="bottom-nav">
        <a href="new.html" class="nav-link">
            <i class="fa-solid fa-bolt"></i>
            <span>News</span>
        </a>
        <a href="feed.html" class="nav-link active">
            <i class="fa-solid fa-layer-group"></i>
            <span>Feed</span>
        </a>
        <a href="profile.html" class="nav-link">
            <i class="fa-solid fa-user-astronaut"></i>
            <span>Profile</span>
        </a>
    </nav>

    <div class="overlay" id="createPostModal">
        <div class="modal">
            <h3 class="modal-h">Новая публикация</h3>
            <textarea id="postContent" class="m-area" placeholder="О чем вы думаете?"></textarea>
            <input type="text" id="postImgUrl" class="m-input" placeholder="Ссылка на фото (необязательно)">
            
            <div id="adminOptions" style="display: none; border-top: 1px solid var(--border); padding-top: 15px; margin-top: 10px;">
                <p style="font-size: 10px; color: var(--warn); margin-bottom: 10px;">ADMIN PANEL</p>
                <select id="postType" class="m-input">
                    <option value="text">Обычный пост</option>
                    <option value="match">Матч (Ставки)</option>
                    <option value="ad">Рекламный блок</option>
                </select>
            </div>

            <button class="m-btn" onclick="App.posts.submit()">Опубликовать</button>
            <p onclick="App.ui.closeModal()" style="text-align: center; font-size: 12px; margin-top: 15px; color: var(--text-muted);">Отмена</p>
        </div>
    </div>

    <div class="overlay" id="betModal">
        <div class="modal">
            <h3 class="modal-h">Сделать ставку</h3>
            <div id="betDetails" style="margin-bottom: 20px; font-size: 14px;"></div>
            <input type="number" id="betAmount" class="m-input" placeholder="Сумма ставки">
            <button class="m-btn" style="background: var(--accent);" onclick="App.bets.confirm()">Подтвердить</button>
            <p onclick="App.ui.closeModal()" style="text-align: center; font-size: 12px; margin-top: 15px; color: var(--text-muted);">Отмена</p>
        </div>
    </div>

    <script>
        /**
         * STAVOK.NET ENGINE v3.0
         * Синхронизация с Supabase Realtime + Логика Ставок
         */

        const SB_URL = 'https://cmoeirxugwapvvcdkwjs.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE';

        const App = {
            sb: null,
            user: null,
            profile: null,
            activeBet: null,

            async init() {
                console.log("App: Initialization...");
                this.sb = window.supabase.createClient(SB_URL, SB_KEY);
                this.initVisuals();
                
                // 1. Auth Check
                const { data: { session } } = await this.sb.auth.getSession();
                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }
                this.user = session.user;

                // 2. Load Profile & Realtime
                await this.loadProfile();
                this.initRealtime();
                
                // 3. Load Feed
                App.posts.load();

                // 4. Bind Global Clicks
                document.addEventListener('click', (e) => {
                    if(e.target.closest('.i-btn-like')) App.posts.like(e.target.closest('.post').dataset.id);
                });
            },

            async loadProfile() {
                const { data, error } = await this.sb
                    .from('users')
                    .select('*')
                    .eq('id', this.user.id)
                    .single();

                if (data) {
                    this.profile = data;
                    document.getElementById('userBalance').innerText = `${data.balance.toFixed(2)} x2`;
                    const avatar = document.getElementById('userAvatar');
                    avatar.innerText = data.username.substring(0, 1).toUpperCase();
                    
                    if(data.role === 'admin') {
                        document.getElementById('adminOptions').style.display = 'block';
                    }
                }
            },

            initRealtime() {
                // Слушаем изменения баланса
                this.sb
                    .channel('any')
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${this.user.id}` }, 
                    payload => {
                        this.profile.balance = payload.new.balance;
                        document.getElementById('userBalance').innerText = `${payload.new.balance.toFixed(2)} x2`;
                    })
                    .subscribe();

                // Слушаем новые посты
                this.sb
                    .channel('posts')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, 
                    payload => App.posts.prepend(payload.new))
                    .subscribe();
            },

            // --- UI CONTROLLER ---
            ui: {
                toast(msg) {
                    const t = document.getElementById('toast');
                    t.innerText = msg;
                    t.classList.add('show');
                    setTimeout(() => t.classList.remove('show'), 3000);
                },
                openModal(id) { document.getElementById(id).style.display = 'flex'; },
                closeModal() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }
            },

            // --- POSTS CONTROLLER ---
            posts: {
                async load() {
                    const { data, error } = await App.sb
                        .from('posts')
                        .select('*, users(username, role, avatar_url)')
                        .order('created_at', { ascending: false });

                    if (data) {
                        const feed = document.getElementById('mainFeed');
                        feed.innerHTML = '';
                        data.forEach(post => this.render(post));
                    }
                },

                render(post) {
                    const feed = document.getElementById('mainFeed');
                    const isLiked = false; // TODO: Check likes table
                    const date = new Date(post.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    
                    let mediaHtml = post.image_url ? `<img src="${post.image_url}" class="post-media">` : '';
                    let adminBadge = post.users?.role === 'admin' ? '<span class="badge-admin">Admin</span>' : '';

                    let html = `
                        <div class="post" data-id="${post.id}">
                            <div class="post-header">
                                <div class="post-user">
                                    <div class="avatar-box">${post.users?.username[0].toUpperCase()}</div>
                                    <div class="user-meta">
                                        <h4>${post.users?.username} ${adminBadge}</h4>
                                        <span>${date}</span>
                                    </div>
                                </div>
                                <i class="fa-solid fa-ellipsis-vertical" style="color:#444"></i>
                            </div>
                            <div class="post-text">${post.content}</div>
                            ${mediaHtml}
                            
                            ${this.getTemplateData(post)}

                            <div class="post-footer">
                                <div class="i-btn i-btn-like">
                                    <i class="fa-regular fa-heart"></i> <span>24</span>
                                </div>
                                <div class="i-btn" onclick="App.comments.toggle(${post.id})">
                                    <i class="fa-regular fa-comment"></i> <span>12</span>
                                </div>
                                <div class="i-btn">
                                    <i class="fa-solid fa-share-nodes"></i>
                                </div>
                            </div>

                            <div class="comments-block" id="comments-${post.id}">
                                <div id="list-${post.id}"></div>
                                <div class="comment-input-area">
                                    <input type="text" class="c-input" id="c-input-${post.id}" placeholder="Ваш комментарий...">
                                    <div class="c-send" onclick="App.comments.send(${post.id})">
                                        <i class="fa-solid fa-paper-plane"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    feed.insertAdjacentHTML('beforeend', html);
                },

                getTemplateData(post) {
                    // Если это пост-матч (упрощенная проверка по содержанию или метаданным)
                    if(post.content.includes('VS')) {
                        return `
                        <div class="match-card">
                            <div class="match-teams">
                                <div class="m-team"><b>HOME</b></div>
                                <div class="m-score">0 : 0</div>
                                <div class="m-team"><b>AWAY</b></div>
                            </div>
                            <div class="bet-grid">
                                <div class="bet-option" onclick="App.bets.open(${post.id}, 'W1', 1.95)">
                                    <span class="o-label">П1</span>
                                    <span class="o-val">1.95</span>
                                </div>
                                <div class="bet-option" onclick="App.bets.open(${post.id}, 'Draw', 3.40)">
                                    <span class="o-label">Ничья</span>
                                    <span class="o-val">3.40</span>
                                </div>
                                <div class="bet-option" onclick="App.bets.open(${post.id}, 'W2', 2.10)">
                                    <span class="o-label">П2</span>
                                    <span class="o-val">2.10</span>
                                </div>
                            </div>
                        </div>`;
                    }
                    return '';
                },

                async submit() {
                    const content = document.getElementById('postContent').value;
                    const img = document.getElementById('postImgUrl').value;
                    
                    if(!content) return App.ui.toast("Введите текст");

                    const { error } = await App.sb
                        .from('posts')
                        .insert([{ 
                            author_id: App.user.id, 
                            content: content, 
                            image_url: img 
                        }]);

                    if(!error) {
                        App.ui.closeModal();
                        App.ui.toast("Опубликовано!");
                        document.getElementById('postContent').value = '';
                    }
                }
            },

            // --- BETS CONTROLLER ---
            bets: {
                open(postId, outcome, coef) {
                    App.activeBet = { postId, outcome, coef };
                    document.getElementById('betDetails').innerHTML = `
                        Прогноз: <b>${outcome}</b><br>
                        Коэффициент: <b>${coef}</b>
                    `;
                    App.ui.openModal('betModal');
                },

                async confirm() {
                    const amount = parseFloat(document.getElementById('betAmount').value);
                    if(!amount || amount <= 0) return App.ui.toast("Введите сумму");
                    if(amount > App.profile.balance) return App.ui.toast("Недостаточно средств");

                    // 1. Снимаем баланс
                    const newBalance = App.profile.balance - amount;
                    const { error: balErr } = await App.sb
                        .from('users')
                        .update({ balance: newBalance })
                        .eq('id', App.user.id);

                    if(!balErr) {
                        // 2. Записываем ставку в таблицу (если она создана)
                        App.ui.closeModal();
                        App.ui.toast("Ставка принята!");
                        // Здесь должен быть INSERT в таблицу bets
                    }
                }
            },

            // --- COMMENTS CONTROLLER ---
            comments: {
                toggle(id) {
                    const el = document.getElementById(`comments-${id}`);
                    el.style.display = el.style.display === 'block' ? 'none' : 'block';
                },
                async send(postId) {
                    const input = document.getElementById(`c-input-${postId}`);
                    const text = input.value.trim();
                    if(!text) return;

                    const { error } = await App.sb
                        .from('comments')
                        .insert([{ 
                            post_id: postId, 
                            user_id: App.user.id, 
                            text_content: text 
                        }]);
                    
                    if(!error) {
                        input.value = '';
                        App.ui.toast("Комментарий отправлен");
                        // В идеале тут Realtime подгрузка в блок
                    }
                }
            },

            // --- VISUAL EFFECTS ---
            initVisuals() {
                const canvas = document.getElementById('bg-canvas');
                const ctx = canvas.getContext('2d');
                let w, h, particles = [];
                const resize = () => { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; };
                window.addEventListener('resize', resize);
                resize();

                for(let i=0; i<40; i++) particles.push({ x: Math.random()*w, y: Math.random()*h, vx: Math.random()-0.5, vy: Math.random()-0.5 });

                function draw() {
                    ctx.clearRect(0,0,w,h);
                    ctx.fillStyle = "rgba(255,255,255,0.1)";
                    particles.forEach(p => {
                        p.x += p.vx; p.y += p.vy;
                        if(p.x<0) p.x=w; if(p.x>w) p.x=0; if(p.y<0) p.y=h; if(p.y>h) p.y=0;
                        ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI*2); ctx.fill();
                    });
                    requestAnimationFrame(draw);
                }
                draw();
            }
        };

        // RUN
        window.onload = () => App.init();

    </script>
</body>
</html>
