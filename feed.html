<style>
    /* ========================================
       CSS VARIABLES & ROOT SETUP
       ======================================== */
    :root {
        /* Background Colors */
        --bg: #050505;
        --bg-glass: rgba(15, 15, 15, 0.85);
        --bg-secondary: #0a0a0a;
        --bg-input: rgba(255, 255, 255, 0.05);
        --bg-card: rgba(20, 20, 20, 0.6);
        
        /* Accent Colors */
        --accent: #00FF94;
        --accent-soft: rgba(0, 255, 148, 0.1);
        --accent-bright: #00FFAA;
        --accent-dark: #00CC75;
        
        /* Status Colors */
        --error: #FF3333;
        --error-soft: rgba(255, 51, 51, 0.1);
        --success: #00FF94;
        --success-soft: rgba(0, 255, 148, 0.1);
        --warn: #FFCC00;
        --warn-soft: rgba(255, 204, 0, 0.1);
        --info: #3B82F6;
        --info-soft: rgba(59, 130, 246, 0.1);
        
        /* Neutral Colors */
        --white: #FFFFFF;
        --black: #000000;
        --gray-50: #F9FAFB;
        --gray-100: #F3F4F6;
        --gray-200: #E5E7EB;
        --gray-300: #D1D5DB;
        --gray-400: #9CA3AF;
        --gray-500: #6B7280;
        --gray-600: #4B5563;
        --gray-700: #374151;
        --gray-800: #1F2937;
        --gray-900: #111827;
        
        /* Border Colors */
        --border: rgba(255, 255, 255, 0.1);
        --border-active: rgba(255, 255, 255, 0.3);
        --border-focus: rgba(0, 255, 148, 0.5);
        
        /* Text Colors */
        --text-main: #FFFFFF;
        --text-secondary: #E5E7EB;
        --text-muted: #999999;
        --text-disabled: #666666;
        
        /* Fonts */
        --font-display: 'Unbounded', sans-serif;
        --font-body: 'Inter', sans-serif;
        
        /* Safe Area Insets for iOS */
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
        --safe-left: env(safe-area-inset-left);
        --safe-right: env(safe-area-inset-right);
        
        /* Shadows */
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        --shadow-glow: 0 0 20px rgba(0, 255, 148, 0.3);
        
        /* Z-Index Layers */
        --z-background: -1;
        --z-base: 0;
        --z-dropdown: 1000;
        --z-sticky: 1100;
        --z-header: 2000;
        --z-overlay: 3000;
        --z-modal: 4000;
        --z-toast: 5000;
        
        /* Transitions */
        --transition-fast: 0.15s ease;
        --transition-base: 0.3s ease;
        --transition-slow: 0.5s ease;
    }

    /* ========================================
       GLOBAL RESET & BASE STYLES
       ======================================== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        outline: none;
        -webkit-tap-highlight-color: transparent;
    }
    
    html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }
    
    body {
        background-color: var(--bg);
        color: var(--text-main);
        font-family: var(--font-body);
        line-height: 1.6;
        -webkit-user-select: none;
        user-select: none;
        overflow-x: hidden;
        padding-bottom: calc(80px + var(--safe-bottom));
        position: relative;
        min-height: 100vh;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
        width: 6px;
    }

    ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
        background: var(--border-active);
        border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
    }

    /* ========================================
       ANIMATED BACKGROUND CANVAS
       ======================================== */
    #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: var(--z-background);
        opacity: 0.3;
        pointer-events: none;
    }

    /* ========================================
       HEADER SECTION (MOBILE OPTIMIZED)
       ======================================== */
    .header {
        position: sticky;
        top: 0;
        z-index: var(--z-header);
        background: var(--bg-glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        padding: calc(12px + var(--safe-top)) 20px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all var(--transition-base);
    }

    .header.scrolled {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    /* Brand/Logo Section */
    .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        transition: transform var(--transition-fast);
    }

    .brand:active {
        transform: scale(0.95);
    }

    .brand-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
        color: var(--black);
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-display);
        font-weight: 900;
        font-style: italic;
        transform: skewX(-10deg);
        font-size: 19px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .brand-name {
        font-family: var(--font-display);
        font-size: 17px;
        font-weight: 800;
        color: var(--white);
        letter-spacing: -0.5px;
    }

    /* Header Right Section */
    .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .notifications-btn {
        position: relative;
        width: 40px;
        height: 40px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        cursor: pointer;
        transition: all var(--transition-fast);
    }

    .notifications-btn:active {
        transform: scale(0.9);
        background: var(--accent-soft);
        color: var(--accent);
    }

    .notifications-btn .badge {
        position: absolute;
        top: -2px;
        right: -2px;
        width: 18px;
        height: 18px;
        background: var(--error);
        color: var(--white);
        border-radius: 50%;
        font-size: 10px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid var(--bg);
    }

    /* Wallet Info - Pill Design */
    .wallet-info {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--bg-input);
        padding: 4px 12px 4px 4px;
        border-radius: 50px;
        border: 1px solid var(--border);
        transition: all var(--transition-fast);
        cursor: pointer;
    }

    .wallet-info:hover {
        border-color: var(--border-active);
    }

    .wallet-info:active {
        transform: scale(0.95);
    }

    /* Avatar Circle */
    .avatar-box {
        width: 34px;
        height: 34px;
        background: linear-gradient(135deg, #2a2a2a 0%, #0f0f0f 100%);
        border: 2px solid var(--accent);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 800;
        color: var(--accent);
        text-shadow: 0 0 10px var(--accent-soft);
        overflow: hidden;
        flex-shrink: 0;
    }

    .avatar-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Balance Text */
    .balance-text {
        font-family: var(--font-display);
        font-size: 13px;
        font-weight: 700;
        color: var(--accent);
        white-space: nowrap;
        letter-spacing: -0.3px;
    }

    /* ========================================
       AD BANNER STRIP (HORIZONTAL)
       ======================================== */
    .ad-banner-strip {
        margin: 16px 20px;
        background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        display: flex;
        align-items: center;
        gap: 14px;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        transition: all var(--transition-base);
    }

    .ad-banner-strip::before {
        content: 'AD';
        position: absolute;
        top: 0;
        right: 0;
        background: var(--warn);
        color: var(--black);
        font-size: 9px;
        font-weight: 900;
        padding: 3px 8px;
        border-bottom-left-radius: 10px;
        letter-spacing: 0.5px;
    }

    .ad-banner-strip:active {
        transform: scale(0.98);
        border-color: var(--accent);
    }

    .ad-icon {
        width: 46px;
        height: 46px;
        background: var(--accent-soft);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--accent);
        font-size: 22px;
        flex-shrink: 0;
    }

    .ad-content {
        flex: 1;
    }

    .ad-content h5 {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 3px;
        color: var(--white);
    }

    .ad-content p {
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.4;
    }

    /* ========================================
       FEED SECTION
       ======================================== */
    .feed {
        padding: 0 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    /* Loading Skeleton */
    .loading-skeleton {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 20px;
        animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
    }

    .skeleton-line {
        height: 12px;
        background: var(--bg-input);
        border-radius: 6px;
        margin-bottom: 10px;
    }

    .skeleton-line.short { width: 60%; }
    .skeleton-line.medium { width: 80%; }
    .skeleton-line.long { width: 100%; }

    /* ========================================
       POST CARD DESIGN
       ======================================== */
    .post {
        background: var(--bg-glass);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 20px;
        position: relative;
        animation: postFadeIn 0.5s ease-out;
        transition: all var(--transition-base);
    }

    .post:hover {
        border-color: var(--border-active);
    }

    @keyframes postFadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Post Header */
    .post-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
    }

    .post-user {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
    }

    .post-user .avatar-box {
        width: 42px;
        height: 42px;
        font-size: 15px;
    }

    .user-meta {
        flex: 1;
    }

    .user-meta h4 {
        font-size: 15px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 2px;
    }

    .user-meta .verified-badge {
        color: var(--info);
        font-size: 14px;
    }

    .user-meta span {
        font-size: 12px;
        color: var(--text-muted);
    }

    /* Role Badges */
    .badge-admin {
        background: var(--error);
        color: var(--white);
        font-size: 9px;
        padding: 3px 8px;
        border-radius: 6px;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.5px;
    }

    .badge-vip {
        background: linear-gradient(135deg, #FFD700, #FFA500);
        color: var(--black);
        font-size: 9px;
        padding: 3px 8px;
        border-radius: 6px;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.5px;
    }

    .badge-pro {
        background: var(--accent);
        color: var(--black);
        font-size: 9px;
        padding: 3px 8px;
        border-radius: 6px;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.5px;
    }

    /* Post Menu Button */
    .post-menu-btn {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        cursor: pointer;
        border-radius: 8px;
        transition: all var(--transition-fast);
    }

    .post-menu-btn:active {
        background: var(--bg-input);
        color: var(--white);
    }

    /* Post Content */
    .post-text {
        font-size: 15px;
        line-height: 1.6;
        color: var(--text-secondary);
        margin-bottom: 14px;
        word-wrap: break-word;
    }

    .post-text a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
    }

    .post-text a:hover {
        text-decoration: underline;
    }

    /* Post Media */
    .post-media {
        width: 100%;
        max-height: 400px;
        object-fit: cover;
        border-radius: 16px;
        margin-bottom: 14px;
        border: 1px solid var(--border);
        cursor: pointer;
        transition: all var(--transition-base);
    }

    .post-media:active {
        transform: scale(0.98);
    }

    /* ========================================
       MATCH BETTING WIDGET
       ======================================== */
    .match-card {
        background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        margin-bottom: 14px;
        position: relative;
        overflow: hidden;
    }

    .match-card::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(0, 255, 148, 0.05) 0%, transparent 70%);
        animation: rotate 20s linear infinite;
    }

    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .match-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        position: relative;
        z-index: 1;
    }

    .match-league {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    .match-time {
        font-size: 11px;
        color: var(--accent);
        font-weight: 700;
        background: var(--accent-soft);
        padding: 4px 10px;
        border-radius: 20px;
    }

    .match-teams {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        position: relative;
        z-index: 1;
    }

    .m-team {
        flex: 1;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
    }

    .m-team-logo {
        width: 44px;
        height: 44px;
        background: var(--bg-input);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid var(--border);
    }

    .m-team-logo img {
        width: 30px;
        height: 30px;
        object-fit: contain;
    }

    .m-team b {
        font-size: 13px;
        font-weight: 700;
        color: var(--white);
    }

    .m-vs {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
    }

    .m-score {
        font-family: var(--font-display);
        font-size: 26px;
        font-weight: 900;
        color: var(--accent);
        letter-spacing: 2px;
    }

    .m-status {
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        font-weight: 600;
    }

    /* Betting Options Grid */
    .bet-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        position: relative;
        z-index: 1;
    }

    .bet-option {
        background: var(--bg-input);
        border: 2px solid var(--border);
        padding: 12px 8px;
        border-radius: 14px;
        text-align: center;
        cursor: pointer;
        transition: all var(--transition-fast);
        position: relative;
        overflow: hidden;
    }

    .bet-option::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        transition: left 0.5s;
    }

    .bet-option:hover::before {
        left: 100%;
    }

    .bet-option:active {
        background: var(--accent);
        border-color: var(--accent);
        transform: scale(0.95);
    }

    .bet-option:active .o-label,
    .bet-option:active .o-val {
        color: var(--black);
    }

    .bet-option.selected {
        background: var(--accent-soft);
        border-color: var(--accent);
    }

    .bet-option .o-label {
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        display: block;
        margin-bottom: 4px;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    .bet-option .o-val {
        font-family: var(--font-display);
        font-size: 16px;
        font-weight: 800;
        color: var(--accent);
    }

    /* More Bets Link */
    .more-bets-link {
        text-align: center;
        margin-top: 12px;
        font-size: 12px;
        color: var(--accent);
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition-fast);
    }

    .more-bets-link:active {
        color: var(--accent-bright);
    }

    /* ========================================
       POST INTERACTIONS (FOOTER)
       ======================================== */
    .post-footer {
        display: flex;
        gap: 18px;
        border-top: 1px solid var(--border);
        padding-top: 14px;
        margin-top: 4px;
    }

    .i-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: var(--text-muted);
        cursor: pointer;
        transition: all var(--transition-fast);
        padding: 6px 10px;
        border-radius: 10px;
    }

    .i-btn:active {
        background: var(--bg-input);
        transform: scale(0.95);
    }

    .i-btn i {
        font-size: 16px;
    }

    .i-btn span {
        font-weight: 600;
    }

    .i-btn.active {
        color: var(--error);
    }

    .i-btn.active i {
        font-weight: 900;
    }

    .i-btn-like.active i {
        animation: heartBeat 0.3s ease;
    }

    @keyframes heartBeat {
        0%, 100% { transform: scale(1); }
        25% { transform: scale(1.3); }
        50% { transform: scale(1.1); }
    }

    /* ========================================
       COMMENTS SYSTEM
       ======================================== */
    .comments-block {
        margin-top: 16px;
        display: none;
        padding-top: 16px;
        border-top: 1px dashed var(--border);
        animation: slideDown 0.3s ease;
    }

    .comments-block.show {
        display: block;
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .comments-list {
        max-height: 300px;
        overflow-y: auto;
        margin-bottom: 12px;
    }

    .comment {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
        animation: commentSlide 0.3s ease;
    }

    @keyframes commentSlide {
        from {
            opacity: 0;
            transform: translateX(-10px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .comment .avatar-box {
        width: 32px;
        height: 32px;
        font-size: 12px;
        flex-shrink: 0;
    }

    .c-body {
        flex: 1;
        background: var(--bg-input);
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 13px;
        line-height: 1.5;
    }

    .c-user {
        font-weight: 700;
        margin-bottom: 3px;
        display: block;
        font-size: 13px;
    }

    .c-text {
        color: var(--text-secondary);
    }

    .c-footer {
        display: flex;
        gap: 12px;
        margin-top: 6px;
        font-size: 11px;
    }

    .c-time {
        color: var(--text-muted);
    }

    .c-reply-btn {
        color: var(--text-muted);
        cursor: pointer;
        font-weight: 600;
    }

    .c-reply-btn:active {
        color: var(--accent);
    }

    .c-like-btn {
        color: var(--text-muted);
        cursor: pointer;
        font-weight: 600;
    }

    .c-like-btn.active {
        color: var(--error);
    }

    /* Comment Input Area */
    .comment-input-area {
        display: flex;
        gap: 10px;
        margin-top: 12px;
    }

    .c-input {
        flex: 1;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 50px;
        padding: 10px 18px;

<script>
    /**
     * ==========================================
     * STAVOK.NET ENGINE v4.0
     * Full Featured Social Betting Platform
     * ==========================================
     * Features:
     * - Supabase Realtime synchronization
     * - Advanced betting system
     * - Comments with nested replies
     * - Like/Unlike functionality
     * - Admin panel integration
     * - Mobile-first responsive design
     * - Animated UI transitions
     * ==========================================
     */

    // Supabase Configuration
    const SB_URL = 'https://cmoeirxugwapvvcdkwjs.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE';

    /**
     * Main Application Object
     */
    const App = {
        sb: null,
        user: null,
        profile: null,
        activeBet: null,
        likesCache: new Set(),
        commentsCache: new Map(),

        /**
         * Initialize Application
         */
        async init() {
            console.log("🚀 STAVOK.NET: Initializing...");
            
            // Initialize Supabase Client
            this.sb = window.supabase.createClient(SB_URL, SB_KEY);
            
            // Initialize visual effects
            this.initVisuals();
            
            // Check authentication
            const { data: { session } } = await this.sb.auth.getSession();
            if (!session) {
                console.log("❌ No session found, redirecting to login...");
                window.location.href = 'login.html';
                return;
            }
            
            this.user = session.user;
            console.log("✅ User authenticated:", this.user.email);
            
            // Load user profile
            await this.loadProfile();
            
            // Initialize realtime subscriptions
            this.initRealtime();
            
            // Load feed posts
            await this.posts.load();
            
            // Setup scroll effects
            this.initScrollEffects();
            
            // Setup global event listeners
            this.bindGlobalEvents();
            
            console.log("✨ STAVOK.NET: Ready!");
        },

        /**
         * Load User Profile
         */
        async loadProfile() {
            try {
                const { data, error } = await this.sb
                    .from('users')
                    .select('*')
                    .eq('id', this.user.id)
                    .single();

                if (error) throw error;

                if (data) {
                    this.profile = data;
                    console.log("👤 Profile loaded:", data.username);
                    
                    // Update UI
                    document.getElementById('userBalance').innerText = `${data.balance.toFixed(2)} ₽`;
                    const avatar = document.getElementById('userAvatar');
                    
                    if (data.avatar_url) {
                        avatar.innerHTML = `<img src="${data.avatar_url}" alt="${data.username}">`;
                    } else {
                        avatar.innerText = data.username.substring(0, 1).toUpperCase();
                    }
                    
                    // Show admin options if user is admin
                    if (data.role === 'admin') {
                        document.getElementById('adminOptions').style.display = 'block';
                        console.log("🔧 Admin panel enabled");
                    }
                }
            } catch (error) {
                console.error("Error loading profile:", error);
                this.ui.toast("Ошибка загрузки профиля", "error");
            }
        },

        /**
         * Initialize Realtime Subscriptions
         */
        initRealtime() {
            console.log("🔄 Setting up realtime subscriptions...");

            // Subscribe to user balance updates
            this.sb
                .channel('user-updates')
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'users',
                    filter: `id=eq.${this.user.id}`
                }, (payload) => {
                    console.log("💰 Balance updated:", payload.new.balance);
                    this.profile.balance = payload.new.balance;
                    document.getElementById('userBalance').innerText = `${payload.new.balance.toFixed(2)} ₽`;
                    this.ui.toast(`Баланс обновлен: ${payload.new.balance.toFixed(2)} ₽`, 'success');
                })
                .subscribe();

            // Subscribe to new posts
            this.sb
                .channel('posts-feed')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'posts'
                }, (payload) => {
                    console.log("📬 New post received:", payload.new);
                    this.posts.prepend(payload.new);
                })
                .subscribe();

            // Subscribe to new comments
            this.sb
                .channel('comments-feed')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'comments'
                }, (payload) => {
                    console.log("💬 New comment received:", payload.new);
                    // Refresh comments for that post if visible
                    const commentsBlock = document.getElementById(`comments-${payload.new.post_id}`);
                    if (commentsBlock && commentsBlock.classList.contains('show')) {
                        this.comments.load(payload.new.post_id);
                    }
                })
                .subscribe();
        },

        /**
         * Initialize Scroll Effects
         */
        initScrollEffects() {
            let lastScroll = 0;
            const header = document.getElementById('mainHeader');
            
            window.addEventListener('scroll', () => {
                const currentScroll = window.pageYOffset;
                
                if (currentScroll > 50) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
                
                lastScroll = currentScroll;
            });
        },

        /**
         * Bind Global Event Listeners
         */
        bindGlobalEvents() {
            // Close modals on overlay click
            document.querySelectorAll('.overlay').forEach(overlay => {
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        this.ui.closeModal();
                    }
                });
            });

            // Prevent modal close on modal content click
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', (e) => {
                    e.stopPropagation();
                });
            });
        },

        /**
         * UI Controller
         */
        ui: {
            /**
             * Show toast notification
             */
            toast(msg, type = 'success') {
                const t = document.getElementById('toast');
                t.innerText = msg;
                t.className = `toast ${type}`;
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 3000);
            },

            /**
             * Open modal by ID
             */
            openModal(id) {
                const modal = document.getElementById(id);
                if (modal) {
                    modal.classList.add('show');
                    document.body.style.overflow = 'hidden';
                }
            },

            /**
             * Close all modals
             */
            closeModal() {
                document.querySelectorAll('.overlay').forEach(o => {
                    o.classList.remove('show');
                });
                document.body.style.overflow = '';
                
                // Clear form inputs
                document.getElementById('postContent').value = '';
                document.getElementById('postImgUrl').value = '';
                document.getElementById('betAmount').value = '';
            }
        },

        /**
         * Posts Controller
         */
        posts: {
            /**
             * Load all posts from database
             */
            async load() {
                try {
                    console.log("📥 Loading posts...");
                    
                    const { data, error } = await App.sb
                        .from('posts')
                        .select(`
                            *,
                            users (
                                username,
                                role,
                                avatar_url
                            )
                        `)
                        .order('created_at', { ascending: false });

                    if (error) throw error;

                    const feed = document.getElementById('mainFeed');
                    feed.innerHTML = '';

                    if (data && data.length > 0) {
                        console.log(`✅ Loaded ${data.length} posts`);
                        data.forEach(post => this.render(post));
                    } else {
                        feed.innerHTML = `
                            <div class="empty-state">
                                <i class="fa-solid fa-inbox"></i>
                                <h3>Пока нет публикаций</h3>
                                <p>Станьте первым, кто создаст пост!</p>
                            </div>
                        `;
                    }
                } catch (error) {
                    console.error("Error loading posts:", error);
                    App.ui.toast("Ошибка загрузки ленты", "error");
                }
            },

            /**
             * Render a single post
             */
            async render(post) {
                const feed = document.getElementById('mainFeed');
                const date = new Date(post.created_at).toLocaleString('ru-RU', {
                    day: 'numeric',
                    month: 'short',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                // Check if user has liked this post
                const { data: likeData } = await App.sb
                    .from('likes')
                    .select('id')
                    .eq('post_id', post.id)
                    .eq('user_id', App.user.id)
                    .single();
                
                const isLiked = !!likeData;
                if (isLiked) App.likesCache.add(post.id);
                
                // Get like count
                const { count: likeCount } = await App.sb
                    .from('likes')
                    .select('id', { count: 'exact', head: true })
                    .eq('post_id', post.id);
                
                // Get comment count
                const { count: commentCount } = await App.sb
                    .from('comments')
                    .select('id', { count: 'exact', head: true })
                    .eq('post_id', post.id);
                
                // Build media HTML
                let mediaHtml = '';
                if (post.image_url) {
                    mediaHtml = `<img src="${post.image_url}" class="post-media" alt="Post image" onclick="window.open('${post.image_url}', '_blank')">`;
                }
                
                // Build role badge
                let badge = '';
                if (post.users?.role === 'admin') {
                    badge = '<span class="badge-admin">Admin</span>';
                } else if (post.users?.role === 'vip') {
                    badge = '<span class="badge-vip">VIP</span>';
                } else if (post.users?.role === 'pro') {
                    badge = '<span class="badge-pro">Pro</span>';
                }
                
                // Build avatar
                let avatarContent = post.users?.username[0].toUpperCase() || '?';
                if (post.users?.avatar_url) {
                    avatarContent = `<img src="${post.users.avatar_url}" alt="${post.users.username}">`;
                }
                
                // Build template content (match card if needed)
                const templateHtml = this.getTemplateData(post);
                
                const html = `
                    <div class="post" data-id="${post.id}">
                        <div class="post-header">
                            <div class="post-user">
                                <div class="avatar-box">${avatarContent}</div>
                                <div class="user-meta">
                                    <h4>
                                        ${post.users?.username || 'Unknown'}
                                        ${badge}
                                    </h4>
                                    <span>${date}</span>
                                </div>
                            </div>
                            <div class="post-menu-btn">
                                <i class="fa-solid fa-ellipsis-vertical"></i>
                            </div>
                        </div>
                        
                        <div class="post-text">${this.linkify(post.content)}</div>
                        ${mediaHtml}
                        ${templateHtml}

                        <div class="post-footer">
                            <div class="i-btn i-btn-like ${isLiked ? 'active' : ''}" onclick="App.posts.toggleLike(${post.id})">
                                <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i>
                                <span id="like-count-${post.id}">${likeCount || 0}</span>
                            </div>
                            <div class="i-btn" onclick="App.comments.toggle(${post.id})">
                                <i class="fa-regular fa-comment"></i>
                                <span id="comment-count-${post.id}">${commentCount || 0}</span>
                            </div>
                            <div class="i-btn" onclick="App.ui.toast('Функция в разработке', 'info')">
                                <i class="fa-solid fa-share-nodes"></i>
                            </div>
                        </div>

                        <div class="comments-block" id="comments-${post.id}">
                            <div class="comments-list" id="list-${post.id}">
                                <!-- Comments will be loaded here -->
                            </div>
                            <div class="comment-input-area">
                                <input 
                                    type="text" 
                                    class="c-input" 
                                    id="c-input-${post.id}" 
                                    placeholder="Добавить комментарий..."
                                    onkeypress="if(event.key === 'Enter') App.comments.send(${post.id})">
                                <div class="c-send" onclick="App.comments.send(${post.id})">
                                    <i class="fa-solid fa-paper-plane"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                feed.insertAdjacentHTML('beforeend', html);
            },

            /**
             * Prepend a new post (realtime)
             */
            async prepend(post) {
                // Fetch user data for the post
                const { data: userData } = await App.sb
                    .from('users')
                    .select('username, role, avatar_url')
                    .eq('id', post.author_id)
                    .single();
                
                post.users = userData;
                
                const feed = document.getElementById('mainFeed');
                const tempDiv = document.createElement('div');
                await this.render(post);
                
                // Move the newly created post to the top
                const newPost = feed.lastElementChild;
                feed.insertBefore(newPost, feed.firstChild);
                
                App.ui.toast("Новая публикация!", "success");
            },

            /**
             * Get template data for special post types
             */
            getTemplateData(post) {
                // Check if this is a match post (simple check for "VS")
                if (post.content.includes('VS') || post.content.includes('vs')) {
                    return `
                        <div class="match-card">
                            <div class="match-header">
                                <span class="match-league">ПРЕМЬЕР ЛИГА</span>
                                <span class="match-time">LIVE</span>
                            </div>
                            <div class="match-teams">
                                <div class="m-team">
                                    <div class="m-team-logo">
                                        <i class="fa-solid fa-shield-halved"></i>
                                    </div>
                                    <b>HOME</b>
                                </div>
                                <div class="m-vs">
                                    <div class="m-score">0 : 0</div>
                                    <div class="m-status">1-й тайм</div>
                                </div>
                                <div class="m-team">
                                    <div class="m-team-logo">
                                        <i class="fa-solid fa-shield"></i>
                                    </div>
                                    <b>AWAY</b>
                                </div>
                            </div>
                            <div class="bet-grid">
                                <div class="bet-option" onclick="App.bets.open(${post.id}, 'П1', 1.95)">
                                    <span class="o-label">П1</span>
                                    <span class="o-val">1.95</span>
                                </div>
                                <div class="bet-option" onclick="App.bets.open(${post.id}, 'Ничья', 3.40)">
                                    <span class="o-label">X</span>
                                    <span class="o-val">3.40</span>
                                </div>
                                <div class="bet-option" onclick="App.bets.open(${post.id}, 'П2', 2.10)">
                                    <span class="o-label">П2</span>
                                    <span class="o-val">2.10</span>
                                </div>
                            </div>
                            <div class="more-bets-link">
                                Еще ${Math.floor(Math.random() * 50) + 20} вариантов ставок →
                            </div>
                        </div>
                    `;
                }
                return '';
            },

            /**
             * Linkify URLs in text
             */
            linkify(text) {
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                return text.replace(urlRegex, '<a href="$1" target="_blank">$1</a>');
            },

            /**
             * Toggle like on a post
             */
            async toggleLike(postId) {
                try {
                    const isLiked = App.likesCache.has(postId);
                    const btn = document.querySelector(`.post[data-id="${postId}"] .i-btn-like`);
                    const icon = btn.querySelector('i');
                    const countSpan = document.getElementById(`like-count-${postId}`);
                    let currentCount = parseInt(countSpan.innerText) || 0;

                    if (isLiked) {
                        // Unlike
                        const { error } = await App.sb
                            .from('likes')
                            .delete()
                            .eq('post_id', postId)
                            .eq('user_id', App.user.id);

                        if (!error) {
                            App.likesCache.delete(postId);
                            btn.classList.remove('active');
                            icon.classList.remove('fa-solid');
                            icon.classList.add('fa-regular');
                            countSpan.innerText = Math.max(0, currentCount - 1);
                        }
                    } else {
                        // Like
                        const { error } = await App.sb
                            .from('likes')
                            .insert([{
                                post_id: postId,
                                user_id: App.user.id
                            }]);

                        if (!error) {
                            App.likesCache.add(postId);
                            btn.classList.add('active');
                            icon.classList.remove('fa-regular');
                            icon.classList.add('fa-solid');
                            countSpan.innerText = currentCount + 1;
                        }
                    }
                } catch (error) {
                    console.error("Error toggling like:", error);
                    App.ui.toast("Ошибка", "error");
                }
            },

            /**
             * Submit a new post
             */
            async submit() {
                const content = document.getElementById('postContent').value.trim();
                const img = document.getElementById('postImgUrl').value.trim();
                
                if (!content) {
                    App.ui.toast("Введите текст публикации", "warning");
                    return;
                }

                try {
                    const { error } = await App.sb
                        .from('posts')
                        .insert([{
                            author_id: App.user.id,
                            content: content,
                            image_url: img || null
                        }]);

                    if (error) throw error;

                    App.ui.closeModal();
                    App.ui.toast("Публикация создана!", "success");
                    
                    // Clear inputs
                    document.getElementById('postContent').value = '';
                    document.getElementById('postImgUrl').value = '';
                    
                    // Reload feed
                    setTimeout(() => this.load(), 500);
                    
                } catch (error) {
                    console.error("Error creating post:", error);
                    App.ui.toast("Ошибка публикации", "error");
                }
            }
        },

        /**
         * Bets Controller
         */
        bets: {
            /**
             * Open bet modal
             */
            open(postId, outcome, coef) {
                App.activeBet = { postId, outcome, coef };
                
                document.getElementById('betOutcome').innerText = outcome;
                document.getElementById('betCoef').innerText = coef;
                document.getElementById('betPotential').innerText = '0.00 ₽';
                document.getElementById('betAmount').value = '';
                
                App.ui.openModal('betModal');
            },

            /**
             * Update potential winnings
             */
            updatePotential() {
                const amount = parseFloat(document.getElementById('betAmount').value) || 0;
                const coef = App.activeBet?.coef || 1;
                const potential = (amount * coef).toFixed(2);
                
                document.getElementById('betPotential').innerText = `${potential} ₽`;
            },

            /**
             * Confirm and place bet
             */
            async confirm() {
                const amount = parseFloat(document.getElementById('betAmount').value);
                
                if (!amount || amount <= 0) {
                    App.ui.toast("Введите корректную сумму", "warning");
                    return;
                }
                
                if (amount > App.profile.balance) {
                    App.ui.toast("Недостаточно средств", "error");
                    return;
                }

                try {
                    // Deduct balance
                    const newBalance = App.profile.balance - amount;
                    const { error: balError } = await App.sb
                        .from('users')
                        .update({ balance: newBalance })
                        .eq('id', App.user.id);

                    if (balError) throw balError;

                    // Create bet record (if bets table exists)
                    // const { error: betError } = await App.sb
                    //     .from('bets')
                    //     .insert([{
                    //         user_id: App.user.id,
                    //         post_id: App.activeBet.postId,
                    //         outcome: App.activeBet.outcome,
                    //         coefficient: App.activeBet.coef,
                    //         amount: amount,
                    //         status: 'pending'
                    //     }]);

                    App.ui.closeModal();
                    App.ui.toast(`Ставка ${amount.toFixed(2)} ₽ принята!`, "success");
                    
                    // Update local balance
                    App.profile.balance = newBalance;
                    document.getElementById('userBalance').innerText = `${newBalance.toFixed(2)} ₽`;

        /**
         * Comments Controller
         */
        comments: {
            /**
             * Toggle comments visibility
             */
            async toggle(postId) {
                const el = document.getElementById(`comments-${postId}`);
                
                if (el.classList.contains('show')) {
                    el.classList.remove('show');
                } else {
                    el.classList.add('show');
                    // Load comments if not already loaded
                    if (!App.commentsCache.has(postId)) {
                        await this.load(postId);
                    }
                }
            },

            /**
             * Load comments for a post
             */
            async load(postId) {
                try {
                    const { data, error } = await App.sb
                        .from('comments')
                        .select(`
                            *,
                            users (
                                username,
                                avatar_url,
                                role
                            )
                        `)
                        .eq('post_id', postId)
                        .order('created_at', { ascending: true });

                    if (error) throw error;

                    const listEl = document.getElementById(`list-${postId}`);
                    listEl.innerHTML = '';

                    if (data && data.length > 0) {
                        App.commentsCache.set(postId, data);
                        data.forEach(comment => this.renderComment(comment, listEl));
                    } else {
                        listEl.innerHTML = '<p style="text-align: center; color: var(--text-muted); font-size: 12px; padding: 10px;">Комментариев пока нет</p>';
                    }
                } catch (error) {
                    console.error("Error loading comments:", error);
                }
            },

            /**
             * Render a single comment
             */
            renderComment(comment, container) {
                const date = new Date(comment.created_at).toLocaleTimeString('ru-RU', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                let avatarContent = comment.users?.username[0].toUpperCase() || '?';
                if (comment.users?.avatar_url) {
                    avatarContent = `<img src="${comment.users.avatar_url}" alt="${comment.users.username}">`;
                }
                
                const html = `
                    <div class="comment">
                        <div class="avatar-box">${avatarContent}</div>
                        <div class="c-body">
                            <span class="c-user">${comment.users?.username || 'Unknown'}</span>
                            <div class="c-text">${comment.text_content}</div>
                            <div class="c-footer">
                                <span class="c-time">${date}</span>
                                <span class="c-reply-btn" onclick="App.comments.reply(${comment.post_id}, '${comment.users?.username}')">Ответить</span>
                            </div>
                        </div>
                    </div>
                `;
                
                container.insertAdjacentHTML('beforeend', html);
            },

            /**
             * Reply to a comment
             */
            reply(postId, username) {
                const input = document.getElementById(`c-input-${postId}`);
                input.value = `@${username} `;
                input.focus();
            },

            /**
             * Send a new comment
             */
            async send(postId) {
                const input = document.getElementById(`c-input-${postId}`);
                const text = input.value.trim();
                
                if (!text) {
                    App.ui.toast("Введите текст комментария", "warning");
                    return;
                }

                try {
                    const { error } = await App.sb
                        .from('comments')
                        .insert([{
                            post_id: postId,
                            user_id: App.user.id,
                            text_content: text
                        }]);

                    if (error) throw error;

                    input.value = '';
                    App.ui.toast("Комментарий отправлен", "success");
                    
                    // Update comment count
                    const countSpan = document.getElementById(`comment-count-${postId}`);
                    if (countSpan) {
                        const current = parseInt(countSpan.innerText) || 0;
                        countSpan.innerText = current + 1;
                    }
                    
                    // Reload comments
                    setTimeout(() => this.load(postId), 300);
                    
                } catch (error) {
                    console.error("Error sending comment:", error);
                    App.ui.toast("Ошибка отправки", "error");
                }
            }
        },

        /**
         * Initialize Visual Effects (Background Animation)
         */
        initVisuals() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            let particles = [];
            
            const resize = () => {
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
            };
            
            window.addEventListener('resize', resize);
            resize();

            // Create particles
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    radius: Math.random() * 1.5 + 0.5
                });
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                ctx.fillStyle = "rgba(0, 255, 148, 0.15)";
                
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    
                    if (p.x < 0) p.x = w;
                    if (p.x > w) p.x = 0;
                    if (p.y < 0) p.y = h;
                    if (p.y > h) p.y = 0;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                });
                
                requestAnimationFrame(animate);
            }
            
            animate();
        }
    };

    /**
     * Initialize App on Page Load
     */
    window.onload = () => {
        App.init();
    };

    /**
     * Prevent accidental page refresh
     */
    window.addEventListener('beforeunload', (e) => {
        // Only warn if user has unsaved content
        const postContent = document.getElementById('postContent')?.value;
        if (postContent && postContent.trim().length > 0) {
            e.preventDefault();
            e.returnValue = '';
        }
    });
</script>
