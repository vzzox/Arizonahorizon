<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <title>STAVOK.NET | Feed</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Unbounded:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            /* --- LIQUID GLASS PALETTE --- */
            --bg-body: #050505;
            
            /* Glass Surface */
            --glass-bg: rgba(20, 20, 20, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shine: rgba(255, 255, 255, 0.05);
            --glass-blur: 20px;
            
            /* Accents */
            --neon-green: #00FF94;
            --neon-gold: #FFD700;
            --neon-red: #FF3B30;
            --neon-blue: #00C2FF;
            
            /* Text */
            --text-main: #FFFFFF;
            --text-muted: #888888;
            
            /* Font */
            --font-head: 'Unbounded', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            /* Safe Area */
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        /* RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 120px;
            /* Mesh Background */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 148, 0.04), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 194, 255, 0.04), transparent 40%);
        }

        /* --- GLASS PANEL UTILITY --- */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        /* --- HEADER --- */
        .header-wrap {
            position: sticky; top: 0; z-index: 100;
            padding: 15px 20px;
            background: linear-gradient(180deg, rgba(5,5,5,0.9) 0%, rgba(5,5,5,0) 100%);
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 50px; padding: 8px 8px 8px 20px;
        }

        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        
        .logo-sq {
            width: 38px; height: 38px; background: #fff; color: #000;
            border-radius: 8px; /* Квадрат */
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-head); font-weight: 900; font-size: 20px;
            font-style: italic; transform: skewX(-12deg);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        
        .logo-txt {
            font-family: var(--font-head); font-weight: 800; font-size: 16px;
            color: #fff; letter-spacing: -0.5px; font-style: italic;
        }

        .profile-chip {
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            border-radius: 40px; padding: 5px 5px 5px 15px;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
        }
        .user-bal { font-family: var(--font-head); font-size: 12px; color: var(--neon-green); font-weight: 700; }
        .user-ava {
            width: 34px; height: 34px; background: #222; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center;
            font-family: var(--font-head); font-weight: 700; font-size: 12px; color: #fff;
        }

        /* --- ADMIN BANNER --- */
        .banner-container {
            width: calc(100% - 40px); max-width: 600px; margin: 0 auto 20px;
            display: none; /* Controlled by JS */
            animation: slideDown 0.4s ease;
        }
        .ad-banner {
            background: linear-gradient(90deg, rgba(255,215,0,0.15), transparent);
            border: 1px solid rgba(255,215,0,0.3); border-radius: 16px; padding: 15px;
            display: flex; align-items: center; gap: 15px; position: relative;
        }
        .ab-icon { color: var(--neon-gold); font-size: 20px; animation: pulse 2s infinite; }
        .ab-info h4 { font-family: var(--font-head); font-size: 13px; margin-bottom: 2px; }
        .ab-info p { font-size: 11px; color: rgba(255,255,255,0.7); }
        .ab-edit { position: absolute; right: 10px; top: 10px; font-size: 12px; color: #fff; cursor: pointer; opacity: 0.7; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- FEED --- */
        .feed { padding: 0 20px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

        .post { border-radius: 24px; padding: 20px; position: relative; transition: transform 0.2s; }
        .post.pinned { border: 1px solid var(--neon-gold); box-shadow: 0 0 20px rgba(255,215,0,0.1); }
        
        .pin-badge {
            position: absolute; top: -10px; right: 20px; background: var(--neon-gold);
            color: #000; font-size: 10px; font-weight: 800; padding: 4px 10px;
            border-radius: 10px; z-index: 10; font-family: var(--font-head);
        }

        .p-head { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .p-user { display: flex; gap: 12px; align-items: center; }
        .p-ava {
            width: 42px; height: 42px; background: #222; border-radius: 14px;
            border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center;
            font-family: var(--font-head); font-weight: 700;
        }
        .p-meta h4 { font-family: var(--font-head); font-size: 14px; font-weight: 700; margin-bottom: 3px; }
        .p-meta span { font-size: 11px; color: var(--text-muted); }
        
        .role-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: 800; margin-left: 5px; }
        .role-tag.admin { background: #fff; color: #000; }
        
        /* Admin Controls Overlay */
        .admin-opts { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; opacity: 0; transition: 0.2s; }
        .post:hover .admin-opts { opacity: 1; }
        .ao-btn { width: 28px; height: 28px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; border: 1px solid #555; }
        .ao-btn:hover { background: #fff; color: #000; }

        .p-content { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.9); margin-bottom: 15px; white-space: pre-wrap; }
        .p-img { width: 100%; border-radius: 16px; border: 1px solid var(--glass-border); }

        /* --- WIDGET: MATCH --- */
        .w-match {
            background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
            border: 1px solid var(--glass-border); border-radius: 18px; padding: 15px; margin-top: 15px;
        }
        .wm-teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .wm-t { text-align: center; width: 35%; font-family: var(--font-head); font-size: 12px; font-weight: 700; }
        .wm-score { font-family: var(--font-head); font-size: 24px; font-weight: 900; color: #fff; }
        
        .wm-bets { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .bet-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .bet-btn:active { background: var(--neon-green); color: #000; }
        .bk { display: block; font-family: var(--font-head); font-weight: 700; font-size: 13px; }
        .bl { font-size: 9px; text-transform: uppercase; color: var(--text-muted); }

        /* --- WIDGET: AD (Dynamic) --- */
        .w-ad {
            margin-top: 15px; border-radius: 18px; padding: 20px;
            position: relative; border: 1px solid; overflow: hidden;
        }
        .wa-tag {
            position: absolute; top: 10px; right: 10px; font-size: 9px; 
            font-weight: 800; border: 1px solid currentColor; padding: 2px 6px; border-radius: 4px;
        }
        .wa-title { font-family: var(--font-head); font-size: 18px; margin-bottom: 5px; color: #fff; }
        .wa-text { font-size: 12px; color: rgba(255,255,255,0.7); }
        .wa-btn {
            display: inline-block; padding: 10px 20px; border-radius: 30px; 
            font-family: var(--font-head); font-weight: 800; font-size: 11px;
            margin-top: 15px; cursor: pointer; text-transform: uppercase; text-decoration: none;
        }

        /* --- FOOTER --- */
        .p-foot { border-top: 1px solid var(--glass-border); margin-top: 15px; padding-top: 15px; display: flex; gap: 20px; }
        .act { display: flex; align-items: center; gap: 6px; color: #777; font-size: 13px; cursor: pointer; }
        .act:hover { color: #fff; }

        /* --- BOTTOM NAV --- */
        .nav-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 70px;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px);
            border-radius: 50px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-evenly; align-items: center; z-index: 900;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; color: #555; width: 60px; transition: 0.3s; }
        .nav-item i { font-size: 22px; transition: 0.3s; }
        .nav-item span { font-size: 9px; font-family: var(--font-head); font-weight: 700; text-transform: uppercase; opacity: 0; transform: translateY(10px); transition: 0.3s; }
        .nav-item.active { color: #fff; }
        .nav-item.active i { transform: translateY(-3px); text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .nav-item.active span { opacity: 1; transform: translateY(0); }

        /* --- FAB --- */
        .fab {
            position: fixed; bottom: 120px; right: 25px; width: 56px; height: 56px;
            background: #fff; color: #000; border-radius: 18px; display: flex;
            align-items: center; justify-content: center; font-size: 24px;
            box-shadow: 0 0 30px rgba(255,255,255,0.2); z-index: 800; cursor: pointer;
            transition: 0.3s;
        }
        .fab:hover { transform: rotate(90deg); }

        /* --- MODALS --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal { width: 100%; max-width: 400px; background: #0A0A0A; border: 1px solid var(--glass-border); border-radius: 30px; padding: 25px; max-height: 90vh; overflow-y: auto; }
        
        .inp { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 15px; border-radius: 14px; color: #fff; margin-bottom: 12px; font-family: var(--font-body); font-size: 14px; }
        .btn-main { width: 100%; padding: 16px; background: #fff; color: #000; border-radius: 14px; font-weight: 800; border: none; font-family: var(--font-head); text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        
        /* Admin Tabs in Modal */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .tab { font-size: 11px; font-weight: 700; color: #555; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: #fff; }

        /* Color Picker */
        .colors { display: flex; gap: 10px; margin-bottom: 15px; }
        .c-opt { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .c-opt.active { border-color: #fff; transform: scale(1.1); }

        /* Toast */
        #toast { position: fixed; top: 120px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #fff; color: #000; padding: 10px 24px; border-radius: 30px; font-family: var(--font-head); font-size: 12px; font-weight: 700; z-index: 5000; opacity: 0; pointer-events: none; transition: 0.3s; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        
        .spinner { border: 2px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="toast">Ready</div>

    <div class="header-wrap">
        <header class="header glass">
            <a href="feed.html" class="brand">
                <div class="logo-sq">S</div>
                <div class="logo-txt">STAVOK</div>
            </a>
            <div class="profile-chip" onclick="window.location.href='profile.html'">
                <span class="user-bal" id="headBal">...</span>
                <div class="user-ava" id="headAva">?</div>
            </div>
        </header>
    </div>

    <div class="banner-container" id="bannerWrap">
        <div class="ad-banner">
            <i class="fa-solid fa-bolt ab-icon"></i>
            <div class="ab-info">
                <h4 id="bnrTitle">LOADING...</h4>
                <p id="bnrText">...</p>
            </div>
            <div class="ab-edit" id="bnrEdit" style="display:none;" onclick="App.admin.editBanner()">
                <i class="fa-solid fa-pen"></i>
            </div>
        </div>
    </div>

    <main class="feed">
        <div id="pinnedStream"></div>
        <div id="feedStream">
            <div class="spinner"></div>
        </div>
    </main>

    <div class="fab" onclick="App.ui.openCreate()">
        <i class="fa-solid fa-plus"></i>
    </div>

    <nav class="nav-dock">
        <a href="news.html" class="nav-item"><i class="fa-solid fa-bolt"></i><span>News</span></a>
        <a href="feed.html" class="nav-item active"><i class="fa-solid fa-layer-group"></i><span>Feed</span></a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user-astronaut"></i><span>Profile</span></a>
    </nav>

    <div class="overlay" id="createModal">
        <div class="modal">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 style="font-family:var(--font-head); font-size:18px; color:#fff;">Новый пост</h3>
                <i class="fa-solid fa-xmark" style="color:#666; cursor:pointer;" onclick="App.ui.closeModal()"></i>
            </div>

            <div id="adminTabs" class="tabs" style="display:none;">
                <div class="tab active" onclick="App.create.setMode('text')">Пост</div>
                <div class="tab" onclick="App.create.setMode('match')">Матч</div>
                <div class="tab" onclick="App.create.setMode('ad')">Реклама</div>
            </div>
            
            <input type="text" id="pTitle" class="inp" placeholder="Заголовок">
            <textarea id="pContent" class="inp" style="height:100px; resize:none;" placeholder="Текст..."></textarea>
            
            <label style="display:block; margin-bottom:15px; font-size:12px; color:#888; cursor:pointer;">
                <i class="fa-solid fa-image"></i> Прикрепить фото (из галереи)
                <input type="file" id="pFile" style="display:none;" accept="image/*" onchange="App.ui.toast('Фото выбрано')">
            </label>

            <div id="fieldMatch" style="display:none;">
                <input type="text" id="mT1" class="inp" placeholder="Команда 1">
                <input type="text" id="mT2" class="inp" placeholder="Команда 2">
            </div>

            <div id="fieldAd" style="display:none;">
                <div class="colors">
                    <div class="c-opt active" style="background:#FFD700" onclick="App.create.setAdColor('gold', this)"></div>
                    <div class="c-opt" style="background:#00FF94" onclick="App.create.setAdColor('green', this)"></div>
                    <div class="c-opt" style="background:#FF2E2E" onclick="App.create.setAdColor('red', this)"></div>
                    <div class="c-opt" style="background:#00C2FF" onclick="App.create.setAdColor('blue', this)"></div>
                </div>
                <input type="text" id="adTag" class="inp" placeholder="Бейдж (напр. PROMO)">
                <input type="text" id="adBtn" class="inp" placeholder="Текст кнопки (Открыть)">
                <input type="text" id="adLink" class="inp" placeholder="Ссылка">
            </div>

            <button class="btn-main" onclick="App.create.submit()">Опубликовать</button>
        </div>
    </div>

    <div class="overlay" id="betModal">
        <div class="modal">
            <h3 style="text-align:center; font-family:var(--font-head); color:#fff;">Ставка</h3>
            <div style="text-align:center; background:#222; padding:15px; border-radius:12px; margin:15px 0;">
                <div id="bOut" style="font-size:18px; font-weight:700;">-</div>
                <div id="bCoef" style="color:var(--neon-green); font-weight:800;">-</div>
            </div>
            <input type="number" id="bSum" class="inp" placeholder="Сумма (x2)" style="text-align:center; font-weight:700;">
            <button class="btn-main" style="background:var(--neon-green); color:#000;" onclick="App.bets.confirm()">Поставить</button>
        </div>
    </div>

    <div class="overlay" id="bannerModal">
        <div class="modal">
            <h3 style="font-family:var(--font-head);">Баннер</h3>
            <input type="text" id="ebTitle" class="inp" placeholder="Заголовок">
            <input type="text" id="ebText" class="inp" placeholder="Текст">
            <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
                <input type="checkbox" id="ebActive"> <label style="color:#fff; font-size:14px;">Показывать</label>
            </div>
            <button class="btn-main" onclick="App.admin.saveBanner()">Сохранить</button>
        </div>
    </div>

    <div class="overlay" id="editMatchModal">
        <div class="modal">
            <h3 style="font-family:var(--font-head);">Матч</h3>
            <input type="text" id="emScore" class="inp" placeholder="Счет (1:0)">
            <input type="text" id="emTime" class="inp" placeholder="Время (45')">
            <button class="btn-main" onclick="App.admin.updateMatch()">Обновить</button>
            <button class="btn-main" style="background:#333; color:#fff;" onclick="App.admin.settle()">Расчет</button>
        </div>
    </div>

    <script>
        const CFG = {
            url: 'https://cmoeirxugwapvvcdkwjs.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE'
        };

        const App = {
            sb: null, user: null, profile: null,
            tempBet: null, editId: null, mode: 'text', adColor: 'gold',

            init: async function() {
                try {
                    this.sb = window.supabase.createClient(CFG.url, CFG.key);
                    const { data: { session } } = await this.sb.auth.getSession();
                    if(!session) return window.location.href = 'login.html';
                    this.user = session.user;

                    await Promise.all([this.loadProfile(), this.posts.load()]);
                    this.admin.loadBanner();
                    this.realtime();

                } catch(e) { console.error(e); }
            },

            loadProfile: async function() {
                let { data } = await this.sb.from('users').select('*').eq('id', this.user.id).single();
                if(!data) {
                    const np = { id: this.user.id, username: this.user.email.split('@')[0], email: this.user.email, role: 'user', balance: 0 };
                    await this.sb.from('users').insert([np]);
                    data = np;
                }
                this.profile = data;
                this.ui.updateProfile(data);
                
                if(data.role === 'admin') {
                    document.getElementById('adminTabs').style.display = 'flex';
                    document.getElementById('bnrEdit').style.display = 'block';
                }
            },

            posts: {
                load: async function() {
                    const mStream = document.getElementById('feedStream');
                    const pStream = document.getElementById('pinnedStream');
                    const { data } = await App.sb
                        .from('posts')
                        .select('*, users:author_id(username, role)')
                        .order('created_at', { ascending: false });

                    mStream.innerHTML = ''; pStream.innerHTML = '';
                    if(!data || !data.length) { mStream.innerHTML = '<div style="text-align:center; color:#555; margin-top:50px;">Лента пуста</div>'; return; }

                    data.forEach(p => {
                        const html = this.render(p);
                        if(p.is_pinned) pStream.innerHTML += html;
                        else mStream.innerHTML += html;
                    });
                },

                render: function(p) {
                    const u = p.users || { username: 'Anon', role: 'user' };
                    const isAdmin = App.profile?.role === 'admin';
                    const isPinned = p.is_pinned;
                    const meta = p.meta_data || {};
                    let body = '';

                    // TYPE RENDERER
                    if(meta.type === 'match') {
                        body = `
                        <div class="w-match">
                            <div style="text-align:center; font-size:10px; color:${meta.live?'var(--neon-red)':'#888'}; font-weight:800; margin-bottom:10px;">
                                ${meta.live ? '● LIVE' : 'PRE-MATCH'} ${meta.time || ''}
                            </div>
                            <div class="wm-teams">
                                <div class="wm-t">${meta.t1}</div>
                                <div class="wm-score">${meta.score || '0:0'}</div>
                                <div class="wm-t">${meta.t2}</div>
                            </div>
                            <div class="wm-bets">
                                <div class="bet-btn" onclick="App.bets.open('${meta.t1}', 1.85)"><span class="bk">1.85</span><span class="bl">P1</span></div>
                                <div class="bet-btn" onclick="App.bets.open('X', 3.20)"><span class="bk">3.20</span><span class="bl">X</span></div>
                                <div class="bet-btn" onclick="App.bets.open('${meta.t2}', 2.10)"><span class="bk">2.10</span><span class="bl">P2</span></div>
                            </div>
                            ${isAdmin ? `<div style="text-align:center; margin-top:10px;"><button style="background:transparent; border:1px solid #555; color:#fff; padding:5px 10px; border-radius:8px; font-size:10px; cursor:pointer;" onclick="App.admin.openMatch('${p.id}')">EDIT</button></div>` : ''}
                        </div>`;
                    } 
                    else if(meta.type === 'ad') {
                        const colors = { gold: '#FFD700', green: '#00FF94', red: '#FF3B30', blue: '#00C2FF' };
                        const c = colors[meta.color] || colors.gold;
                        body = `
                        <div class="w-ad" style="background:linear-gradient(135deg, ${c}15, rgba(0,0,0,0.6)); border-color:${c};">
                            <div class="wa-tag" style="color:${c};">${meta.tag}</div>
                            <h3 class="wa-title" style="color:#fff;">${p.title}</h3>
                            <p class="wa-text">${p.content}</p>
                            <a href="${meta.link}" class="wa-btn" style="background:${c}; color:#000;">${meta.btn}</a>
                        </div>`;
                    }
                    else {
                        body = `<div class="p-content">${p.content}</div>`;
                        if(p.image_url) body += `<img src="${p.image_url}" class="p-img">`;
                    }

                    // ADMIN OVERLAY
                    let adm = '';
                    if(isAdmin) {
                        adm = `
                        <div class="admin-opts">
                            <div class="ao-btn" style="${isPinned?'color:gold; border-color:gold':''}" onclick="App.admin.pin('${p.id}', ${!isPinned})"><i class="fa-solid fa-thumbtack"></i></div>
                            <div class="ao-btn" onclick="App.admin.del('${p.id}')"><i class="fa-solid fa-trash"></i></div>
                        </div>`;
                    }

                    const pinMark = isPinned ? `<div class="pin-badge"><i class="fa-solid fa-thumbtack"></i> PIN</div>` : '';

                    return `
                    <div class="post glass ${isPinned?'pinned':''}">
                        ${pinMark} ${adm}
                        <div class="p-head">
                            <div class="p-user">
                                <div class="p-ava">${u.username[0].toUpperCase()}</div>
                                <div class="p-meta">
                                    <h4>${u.username} <span class="role-tag ${u.role}">${u.role}</span></h4>
                                    <span>Только что</span>
                                </div>
                            </div>
                        </div>
                        ${(!meta.type || meta.type==='text') && p.title ? `<h4 style="font-family:var(--font-head); font-size:16px; margin-bottom:10px;">${p.title}</h4>` : ''}
                        ${body}
                        <div class="p-foot">
                            <div class="act"><i class="fa-regular fa-heart"></i> Like</div>
                            <div class="act"><i class="fa-regular fa-comment"></i> 0</div>
                        </div>
                    </div>`;
                }
            },

            create: {
                setMode: (m) => {
                    App.mode = m;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    event.target.classList.add('active');
                    
                    document.getElementById('fieldMatch').style.display = m==='match'?'block':'none';
                    document.getElementById('fieldAd').style.display = m==='ad'?'block':'none';
                },
                setAdColor: (c, el) => {
                    App.adColor = c;
                    document.querySelectorAll('.c-opt').forEach(e => e.classList.remove('active'));
                    el.classList.add('active');
                },
                submit: async function() {
                    const title = document.getElementById('pTitle').value;
                    let content = document.getElementById('pContent').value;
                    let meta = { type: App.mode };
                    let imgUrl = null;

                    // Image
                    const file = document.getElementById('pFile').files[0];
                    if(file) {
                        imgUrl = await new Promise(r => {
                            const rd = new FileReader();
                            rd.onload=e=>r(e.target.result); rd.readAsDataURL(file);
                        });
                    }

                    if(App.mode === 'match') {
                        meta.t1 = document.getElementById('mT1').value;
                        meta.t2 = document.getElementById('mT2').value;
                        meta.score = '0:0'; meta.time = 'PRE-MATCH';
                        content = `${meta.t1} vs ${meta.t2}`; // Fallback text
                    } else if(App.mode === 'ad') {
                        meta.color = App.adColor;
                        meta.tag = document.getElementById('adTag').value || 'PROMO';
                        meta.btn = document.getElementById('adBtn').value || 'OPEN';
                        meta.link = document.getElementById('adLink').value || '#';
                    }

                    if(!content && !imgUrl && App.mode === 'text') return App.ui.toast("Пусто...");

                    const { error } = await App.sb.from('posts').insert([{
                        author_id: App.user.id,
                        title: title || 'Post',
                        content: content,
                        image_url: imgUrl,
                        meta_data: meta
                    }]);

                    if(!error) {
                        App.ui.closeModal();
                        App.ui.toast('Опубликовано!');
                        // Reset
                        document.getElementById('pContent').value = '';
                        document.getElementById('pTitle').value = '';
                    } else {
                        alert(error.message);
                    }
                }
            },

            admin: {
                loadBanner: async () => {
                    const { data } = await App.sb.from('app_config').select('*').eq('key', 'banner').single();
                    if(data && data.value.active) {
                        document.getElementById('bannerWrap').style.display = 'block';
                        document.getElementById('bnrTitle').innerText = data.value.title;
                        document.getElementById('bnrText').innerText = data.value.text;
                    } else document.getElementById('bannerWrap').style.display = 'none';
                },
                editBanner: () => {
                    document.getElementById('ebTitle').value = document.getElementById('bnrTitle').innerText;
                    document.getElementById('ebText').value = document.getElementById('bnrText').innerText;
                    App.ui.openModal('bannerModal');
                },
                saveBanner: async () => {
                    const val = {
                        active: document.getElementById('ebActive').checked,
                        title: document.getElementById('ebTitle').value,
                        text: document.getElementById('ebText').value
                    };
                    await App.sb.from('app_config').upsert({ key: 'banner', value: val });
                    App.ui.closeModal();
                },
                pin: async (id, state) => {
                    await App.sb.from('posts').update({ is_pinned: state }).eq('id', id);
                },
                del: async (id) => {
                    if(confirm('Удалить?')) await App.sb.from('posts').delete().eq('id', id);
                },
                openMatch: (id) => { App.editId = id; App.ui.openModal('editMatchModal'); },
                updateMatch: async () => {
                    const sc = document.getElementById('emScore').value;
                    const tm = document.getElementById('emTime').value;
                    // Need to fetch current meta to preserve teams
                    const { data } = await App.sb.from('posts').select('meta_data').eq('id', App.editId).single();
                    const newMeta = { ...data.meta_data, score: sc, time: tm, live: true };
                    
                    await App.sb.from('posts').update({ meta_data: newMeta }).eq('id', App.editId);
                    App.ui.closeModal();
                },
                settle: () => { App.ui.closeModal(); App.ui.toast("Расчет..."); }
            },

            bets: {
                open: (t, c) => {
                    document.getElementById('bOut').innerText = t;
                    document.getElementById('bCoef').innerText = 'x'+c;
                    App.ui.openModal('betModal');
                },
                confirm: async () => {
                    const v = parseFloat(document.getElementById('bSum').value);
                    if(!v || v<=0 || v > App.profile.balance) return App.ui.toast("Ошибка суммы");
                    
                    await App.sb.from('users').update({ balance: App.profile.balance - v }).eq('id', App.user.id);
                    App.ui.closeModal();
                    App.ui.toast("Ставка принята!");
                }
            },

            ui: {
                updateProfile: (p) => {
                    document.getElementById('headBal').innerText = parseFloat(p.balance).toFixed(2);
                    document.getElementById('headAva').innerText = (p.username||'?')[0].toUpperCase();
                },
                openCreate: () => App.ui.openModal('createModal'),
                openModal: (id) => document.getElementById(id).style.display = 'flex',
                closeModal: () => document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none'),
                toast: (m) => {
                    const t = document.getElementById('toast');
                    t.innerText = m; t.classList.add('show');
                    setTimeout(() => t.classList.remove('show'), 2000);
                }
            },

            realtime: function() {
                this.sb.channel('main')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => this.posts.load())
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'app_config' }, () => this.admin.loadBanner())
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${this.user.id}` }, 
                    p => { this.profile.balance = p.new.balance; this.ui.updateProfile(p.new); })
                    .subscribe();
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
