<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>STAVOK.NET | Liquid Feed</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Unbounded:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Palette: Deep Dark & Liquid Accents */
            --bg-deep: #000000;
            --bg-mesh: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                       radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                       radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            
            /* Glass Variables */
            --glass-surface: rgba(20, 20, 20, 0.65); /* 65% opacity for visibility */
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-shine: rgba(255, 255, 255, 0.07);
            --glass-blur: 25px;
            
            /* Brand Colors */
            --brand-green: #00FF94;
            --brand-gold: #FFD700;
            --brand-white: #FFFFFF;
            --brand-danger: #FF3B30;
            
            /* Typography */
            --font-display: 'Unbounded', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            /* Spacing */
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
            --nav-height: 90px;
        }

        /* --- RESET & BASE --- */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--brand-white);
            font-family: var(--font-body);
            overflow-x: hidden;
            min-height: 100vh;
            /* Mesh Gradient Background */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            padding-bottom: calc(var(--nav-height) + 20px);
        }

        /* --- LIQUID GLASS UTILITIES --- */
        .glass-panel {
            background: var(--glass-surface);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        /* The "Liquid" Shine */
        .glass-panel::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, var(--glass-shine) 0%, transparent 100%);
            pointer-events: none; opacity: 0.5;
        }

        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- HEADER (FLOATING CAPSULE) --- */
        .header {
            position: sticky; top: 20px; z-index: 100;
            width: calc(100% - 40px); max-width: 600px; margin: 0 auto;
            border-radius: 50px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .brand-container {
            display: flex; align-items: center; gap: 12px; text-decoration: none;
        }
        .logo-box {
            width: 40px; height: 40px; background: #fff; color: #000;
            border-radius: 8px; /* Square with slight radius */
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-weight: 900; font-size: 20px;
            font-style: italic; transform: skewX(-12deg);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .brand-text {
            font-family: var(--font-display); font-weight: 800; font-size: 16px;
            color: #fff; letter-spacing: -0.5px; font-style: italic;
        }

        /* Wallet & Profile */
        .profile-pill {
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            border-radius: 40px; padding: 6px 6px 6px 16px;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
        }
        .user-balance {
            font-family: var(--font-display); font-size: 12px; font-weight: 700;
            color: var(--brand-green);
        }
        .user-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: linear-gradient(135deg, #333, #111);
            border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-size: 12px; font-weight: 800; color: #fff;
        }

        /* --- HEADER BANNER (ADMIN CONTROLLED) --- */
        .header-banner {
            width: calc(100% - 40px); max-width: 600px; margin: 15px auto 0;
            background: linear-gradient(90deg, rgba(255,215,0,0.15) 0%, rgba(0,0,0,0) 100%);
            border: 1px solid rgba(255,215,0,0.3); border-radius: 20px;
            padding: 15px 20px; display: none; /* Hidden by default */
            align-items: center; gap: 15px; animation: slideDown 0.5s ease;
        }
        .hb-icon { color: var(--brand-gold); font-size: 20px; animation: pulse 2s infinite; }
        .hb-content h4 { font-family: var(--font-display); font-size: 12px; margin-bottom: 2px; color: #fff; }
        .hb-content p { font-size: 10px; color: rgba(255,255,255,0.7); }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* --- FEED STREAM --- */
        .feed-container {
            width: 100%; max-width: 600px; margin: 0 auto;
            padding: 20px; display: flex; flex-direction: column; gap: 24px;
        }

        /* --- POST CARD DESIGN --- */
        .post {
            border-radius: 24px; padding: 24px;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .post:active { transform: scale(0.98); }

        .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .ph-left { display: flex; gap: 12px; align-items: center; }
        .ph-avatar {
            width: 44px; height: 44px; border-radius: 14px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-weight: 700; color: #fff; font-size: 16px;
        }
        .ph-info h4 { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 2px; }
        .ph-info span { font-size: 11px; color: #888; }
        
        .badge { 
            font-size: 9px; padding: 3px 8px; border-radius: 6px; 
            text-transform: uppercase; font-weight: 800; font-family: var(--font-display); margin-left: 6px; 
        }
        .badge.admin { background: #fff; color: #000; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .badge.user { border: 1px solid var(--glass-border); color: #888; }

        .post-content { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.85); margin-bottom: 15px; }
        .post-image { width: 100%; border-radius: 16px; margin-top: 10px; border: 1px solid var(--glass-border); }

        /* --- WIDGET: MATCH BETTING --- */
        .widget-match {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 16px; margin-top: 15px;
        }
        .wm-header { display: flex; justify-content: space-between; margin-bottom: 15px; opacity: 0.7; }
        .wm-teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .wm-team { text-align: center; width: 35%; font-family: var(--font-display); font-size: 12px; font-weight: 700; }
        .wm-vs { font-family: var(--font-display); font-size: 24px; font-weight: 900; color: var(--brand-green); text-shadow: 0 0 15px rgba(0,255,148,0.4); }
        
        .wm-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-bet {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 10px; text-align: center; cursor: pointer;
            transition: 0.2s;
        }
        .btn-bet:active { background: rgba(0, 255, 148, 0.2); border-color: var(--brand-green); }
        .bb-coef { display: block; font-family: var(--font-display); font-weight: 800; font-size: 14px; color: #fff; }
        .bb-label { font-size: 9px; text-transform: uppercase; color: #888; letter-spacing: 1px; }

        /* --- WIDGET: AD PROMO --- */
        .widget-ad {
            margin-top: 15px; padding: 20px; border-radius: 20px;
            background: linear-gradient(135deg, rgba(255,215,0,0.15) 0%, rgba(0,0,0,0.8) 100%);
            border: 1px solid var(--brand-gold); position: relative; overflow: hidden;
        }
        .wa-badge { position: absolute; top: 10px; right: 10px; color: var(--brand-gold); border: 1px solid var(--brand-gold); font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; }
        .wa-title { font-family: var(--font-display); font-size: 18px; color: var(--brand-gold); margin-bottom: 5px; }
        .wa-btn { display: inline-block; background: var(--brand-gold); color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 800; font-size: 12px; margin-top: 15px; cursor: pointer; font-family: var(--font-display); }

        /* --- POST FOOTER --- */
        .post-footer { border-top: 1px solid var(--glass-border); margin-top: 20px; padding-top: 15px; display: flex; gap: 20px; }
        .act-btn { display: flex; align-items: center; gap: 8px; color: #888; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .act-btn:hover { color: #fff; }
        .act-btn.liked { color: var(--brand-danger); }

        /* --- BOTTOM NAVIGATION (Floating) --- */
        .nav-float {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 75px; border-radius: 60px;
            display: flex; justify-content: space-evenly; align-items: center;
            z-index: 1000; background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; color: rgba(255,255,255,0.4); width: 60px; transition: 0.3s; }
        .nav-item i { font-size: 22px; transition: 0.3s; }
        .nav-item span { font-size: 9px; font-family: var(--font-display); font-weight: 700; text-transform: uppercase; opacity: 0; transform: translateY(10px); transition: 0.3s; }
        
        .nav-item.active { color: #fff; }
        .nav-item.active i { transform: translateY(-4px); text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .nav-item.active span { opacity: 1; transform: translateY(0); }

        /* --- FAB (ADMIN ONLY) --- */
        .fab {
            position: fixed; bottom: 120px; right: 25px;
            width: 60px; height: 60px; border-radius: 20px;
            background: #fff; color: #000;
            display: none; /* JS will show this if admin */
            align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 0 30px rgba(255,255,255,0.3);
            z-index: 900; cursor: pointer; transform: rotate(0deg); transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .fab:hover { transform: scale(1.1) rotate(90deg); }

        /* --- MODALS & OVERLAYS --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal {
            width: 100%; max-width: 420px; background: #0A0A0A;
            border: 1px solid var(--glass-border); border-radius: 32px; padding: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6); position: relative;
        }
        .m-title { font-family: var(--font-display); font-size: 20px; margin-bottom: 25px; color: #fff; }
        
        .inp {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 16px; color: #fff; margin-bottom: 12px;
            font-family: var(--font-body); font-size: 14px;
        }
        .inp:focus { border-color: #fff; background: rgba(255,255,255,0.08); }
        
        .btn-main {
            width: 100%; padding: 18px; background: #fff; color: #000;
            border-radius: 16px; font-family: var(--font-display); font-weight: 800; border: none;
            cursor: pointer; text-transform: uppercase; margin-top: 15px;
            transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.97); }

        /* Admin Specific Inputs */
        .admin-box {
            border-top: 1px solid var(--glass-border); margin-top: 20px; padding-top: 15px;
        }
        .lbl-admin { color: var(--brand-danger); font-size: 10px; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 10px; }

        /* --- TOAST & LOADER --- */
        #toast {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.9); color: #000; padding: 12px 24px; border-radius: 40px;
            font-family: var(--font-display); font-size: 12px; font-weight: 700; z-index: 5000;
            opacity: 0; transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .loader {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 100px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <canvas id="liquid-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.4; pointer-events:none;"></canvas>

    <div id="toast">Действие выполнено</div>

    <header class="header glass-panel">
        <a href="feed.html" class="brand-container">
            <div class="logo-box">S</div>
            <div class="brand-text">STAVOK</div>
        </a>
        <div class="profile-pill" onclick="window.location.href='profile.html'">
            <span class="user-balance" id="headerBal">...</span>
            <div class="user-avatar" id="headerAva">?</div>
        </div>
    </header>

    <div class="header-banner" id="adminBanner">
        <i class="fa-solid fa-bolt hb-icon"></i>
        <div class="hb-content">
            <h4>БОНУС X2 АКТИВЕН</h4>
            <p>Успей пополнить баланс до полуночи</p>
        </div>
    </div>

    <main class="feed-container" id="feedStream">
        <div class="loader"></div>
    </main>

    <div class="fab" id="adminFab" onclick="App.ui.openModal('createModal')">
        <i class="fa-solid fa-plus"></i>
    </div>

    <nav class="nav-float">
        <a href="news.html" class="nav-item">
            <i class="fa-solid fa-bolt"></i>
            <span>News</span>
        </a>
        <a href="feed.html" class="nav-item active">
            <i class="fa-solid fa-layer-group"></i>
            <span>Feed</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fa-solid fa-user-astronaut"></i>
            <span>Profile</span>
        </a>
    </nav>

    <div class="overlay" id="createModal">
        <div class="modal">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h3 class="m-title">Создать пост</h3>
                <i class="fa-solid fa-xmark" style="color:#666; cursor:pointer;" onclick="App.ui.closeModal()"></i>
            </div>
            
            <input type="text" id="pTitle" class="inp" placeholder="Заголовок">
            <textarea id="pContent" class="inp" style="height:100px; resize:none;" placeholder="Ваш текст..."></textarea>
            <input type="text" id="pImg" class="inp" placeholder="Ссылка на фото (опционально)">

            <div class="admin-box">
                <span class="lbl-admin">ADMIN TOOLS</span>
                <select id="pType" class="inp" style="cursor:pointer;">
                    <option value="text">Обычный пост</option>
                    <option value="match">Матч (Ставки)</option>
                    <option value="ad">Реклама (Баннер)</option>
                </select>

                <div id="matchFields" style="display:none; gap:10px;">
                    <input type="text" id="mT1" class="inp" placeholder="Команда 1">
                    <input type="text" id="mT2" class="inp" placeholder="Команда 2">
                </div>

                <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
                    <input type="checkbox" id="toggleBanner">
                    <label for="toggleBanner" style="font-size:12px; color:#aaa;">Включить баннер под хедером</label>
                </div>
            </div>

            <button class="btn-main" onclick="App.posts.create()">Опубликовать</button>
        </div>
    </div>

    <div class="overlay" id="betModal">
        <div class="modal">
            <h3 class="m-title" style="text-align:center;">Сделать ставку</h3>
            
            <div style="background:rgba(255,255,255,0.05); border-radius:16px; padding:20px; text-align:center; margin-bottom:20px;">
                <div style="font-size:10px; color:#888; text-transform:uppercase;">ВЫБОР</div>
                <div id="betOutcome" style="font-family:var(--font-display); font-size:22px; font-weight:700; margin:5px 0;">-</div>
                <div id="betCoef" style="color:var(--brand-green); font-weight:800; font-size:16px;">-</div>
            </div>

            <input type="number" id="betAmount" class="inp" placeholder="Сумма ставки (x2)" style="text-align:center; font-weight:700; font-size:18px;">
            <button class="btn-main" style="background:var(--brand-green); color:#000;" onclick="App.bets.confirm()">Подтвердить</button>
            <p onclick="App.ui.closeModal()" style="text-align:center; margin-top:15px; font-size:12px; color:#666; cursor:pointer;">Отмена</p>
        </div>
    </div>

    <script>
        const CFG = {
            url: 'https://cmoeirxugwapvvcdkwjs.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE'
        };

        const App = {
            sb: null, user: null, profile: null, tempBet: null,

            init: async function() {
                try {
                    this.fx.start(); // Start background canvas
                    this.sb = window.supabase.createClient(CFG.url, CFG.key);
                    
                    const { data: { session } } = await this.sb.auth.getSession();
                    if(!session) return window.location.href = 'login.html';
                    this.user = session.user;

                    await Promise.all([this.loadProfile(), this.posts.load()]);
                    
                    this.listeners();
                    this.realtime();
                } catch(e) {
                    console.error(e);
                    document.getElementById('feedStream').innerHTML = `<div style="text-align:center; color:#555; margin-top:50px;">Ошибка подключения</div>`;
                }
            },

            loadProfile: async function() {
                const { data } = await this.sb.from('users').select('*').eq('id', this.user.id).single();
                if(data) {
                    this.profile = data;
                    document.getElementById('headerBal').innerText = parseFloat(data.balance).toFixed(2);
                    document.getElementById('headerAva').innerText = (data.username || '?')[0].toUpperCase();
                    
                    if(data.role === 'admin') {
                        document.getElementById('adminFab').style.display = 'flex';
                    }
                    if(localStorage.getItem('showBanner') === 'true') {
                        document.getElementById('adminBanner').style.display = 'flex';
                    }
                }
            },

            // --- POSTS ---
            posts: {
                load: async function() {
                    const stream = document.getElementById('feedStream');
                    try {
                        // FIXED: Explicit relationship definition 'users:author_id'
                        const { data, error } = await App.sb
                            .from('posts')
                            .select('*, users:author_id(username, role, avatar_url)')
                            .order('created_at', { ascending: false });

                        if(error) throw error;

                        stream.innerHTML = '';
                        if(!data || data.length === 0) {
                            stream.innerHTML = '<div style="text-align:center; color:#555; margin-top:50px;">Лента пуста</div>';
                            return;
                        }

                        data.forEach(p => stream.innerHTML += this.template(p));
                    } catch(e) {
                        console.warn("Feed Load Error:", e.message);
                        stream.innerHTML = `<div style="text-align:center; color:#666; margin-top:50px;">Постов нет или ошибка доступа<br><small>${e.message}</small></div>`;
                    }
                },

                template: function(p) {
                    const u = p.users || { username: 'Unknown', role: 'user' };
                    const isMatch = p.content.includes('|VS|');
                    const isAd = p.content.includes('|AD|');
                    const badge = u.role === 'admin' ? '<span class="badge admin">ADMIN</span>' : '<span class="badge user">USER</span>';
                    
                    let body = `<div class="post-content">${p.content}</div>`;

                    // Match Template
                    if(isMatch) {
                        const [t1, t2] = p.content.split('|VS|');
                        body = `
                        <div class="widget-match">
                            <div class="wm-header"><span style="font-size:10px;">LIVE MATCH</span><span style="color:#f00; font-size:10px;">● LIVE</span></div>
                            <div class="wm-teams">
                                <div class="wm-team">${t1}</div>
                                <div class="wm-vs">VS</div>
                                <div class="wm-team">${t2}</div>
                            </div>
                            <div class="wm-grid">
                                <div class="btn-bet" onclick="App.bets.open('${t1}', 1.85)"><span class="bb-coef">1.85</span><span class="bb-label">WIN 1</span></div>
                                <div class="btn-bet" onclick="App.bets.open('Ничья', 3.30)"><span class="bb-coef">3.30</span><span class="bb-label">DRAW</span></div>
                                <div class="btn-bet" onclick="App.bets.open('${t2}', 2.10)"><span class="bb-coef">2.10</span><span class="bb-label">WIN 2</span></div>
                            </div>
                        </div>`;
                    }
                    // Ad Template
                    else if(isAd) {
                        const parts = p.content.split('|AD|'); // |AD|Title|Text
                        const info = parts[1] ? parts[1].split('|') : ['Promo', 'Details'];
                        body = `
                        <div class="widget-ad">
                            <span class="wa-badge">PROMO</span>
                            <h3 class="wa-title">${info[0]}</h3>
                            <p style="font-size:12px; color:#ccc;">${info[1] || ''}</p>
                            <div class="wa-btn">ПОДРОБНЕЕ</div>
                        </div>`;
                    }
                    // Image Template
                    else if(p.image_url) {
                        body += `<img src="${p.image_url}" class="post-image" loading="lazy">`;
                    }

                    return `
                    <div class="post glass-panel">
                        <div class="post-header">
                            <div class="ph-left">
                                <div class="ph-avatar">${u.username[0].toUpperCase()}</div>
                                <div class="ph-info">
                                    <h4>${u.username} ${badge}</h4>
                                    <span>Только что</span>
                                </div>
                            </div>
                            <i class="fa-solid fa-ellipsis" style="color:#555;"></i>
                        </div>
                        ${!isMatch && !isAd ? `<h4 style="font-family:var(--font-display); font-size:16px; margin-bottom:10px;">${p.title}</h4>` : ''}
                        ${body}
                        <div class="post-footer">
                            <div class="act-btn"><i class="fa-regular fa-heart"></i> Лайк</div>
                            <div class="act-btn"><i class="fa-regular fa-comment"></i> Коммент</div>
                        </div>
                    </div>`;
                },

                create: async function() {
                    const title = document.getElementById('pTitle').value;
                    let content = document.getElementById('pContent').value;
                    const img = document.getElementById('pImg').value;
                    const type = document.getElementById('pType').value;
                    
                    // Banner Logic
                    if(document.getElementById('toggleBanner').checked) {
                        localStorage.setItem('showBanner', 'true');
                        document.getElementById('adminBanner').style.display = 'flex';
                    } else {
                        localStorage.setItem('showBanner', 'false');
                        document.getElementById('adminBanner').style.display = 'none';
                    }

                    if(!title) return App.ui.toast('Введите заголовок');

                    // Admin Content Generators
                    if(type === 'match' && App.profile.role === 'admin') {
                        const t1 = document.getElementById('mT1').value;
                        const t2 = document.getElementById('mT2').value;
                        content = `${t1}|VS|${t2}`;
                    } else if(type === 'ad' && App.profile.role === 'admin') {
                        content = `|AD|${title}|${content}`;
                    }

                    const { error } = await App.sb.from('posts').insert([{
                        author_id: App.user.id,
                        title: title,
                        content: content,
                        image_url: img || null
                    }]);

                    if(!error) {
                        App.ui.closeModal();
                        App.ui.toast('Опубликовано');
                        // Reset Inputs
                        document.getElementById('pTitle').value = '';
                        document.getElementById('pContent').value = '';
                    } else {
                        App.ui.toast('Ошибка: ' + error.message);
                    }
                }
            },

            // --- BETS ---
            bets: {
                open: (out, coef) => {
                    App.tempBet = { out, coef };
                    document.getElementById('betOutcome').innerText = out;
                    document.getElementById('betCoef').innerText = 'x' + coef;
                    App.ui.openModal('betModal');
                },
                confirm: async function() {
                    const val = parseFloat(document.getElementById('betAmount').value);
                    if(!val || val <= 0) return App.ui.toast('Неверная сумма');
                    if(val > App.profile.balance) return App.ui.toast('Мало средств');

                    const newBal = App.profile.balance - val;
                    const { error } = await App.sb.from('users').update({ balance: newBal }).eq('id', App.user.id);
                    
                    if(!error) {
                        App.ui.closeModal();
                        App.ui.toast('Ставка принята!');
                        document.getElementById('betAmount').value = '';
                    }
                }
            },

            // --- HELPERS ---
            ui: {
                toast: (msg) => {
                    const t = document.getElementById('toast');
                    t.innerText = msg; t.classList.add('show');
                    setTimeout(() => t.classList.remove('show'), 2500);
                },
                openModal: (id) => document.getElementById(id).style.display = 'flex',
                closeModal: () => document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none')
            },

            listeners: function() {
                document.getElementById('pType').addEventListener('change', (e) => {
                    const t = e.target.value;
                    document.getElementById('matchFields').style.display = t === 'match' ? 'flex' : 'none';
                });
            },

            realtime: function() {
                this.sb.channel('global')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => this.posts.load())
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${this.user.id}` }, 
                    payload => {
                        this.profile.balance = payload.new.balance;
                        document.getElementById('headerBal').innerText = parseFloat(payload.new.balance).toFixed(2);
                    })
                    .subscribe();
            },

            // --- FX ---
            fx: {
                start: function() {
                    const cvs = document.getElementById('liquid-canvas');
                    const ctx = cvs.getContext('2d');
                    let w, h;
                    const orbs = [];
                    
                    const resize = () => { w = window.innerWidth; h = window.innerHeight; cvs.width = w; cvs.height = h; };
                    window.addEventListener('resize', resize);
                    resize();

                    for(let i=0; i<6; i++) {
                        orbs.push({
                            x: Math.random()*w, y: Math.random()*h, r: Math.random()*150+50,
                            dx: (Math.random()-0.5)*0.2, dy: (Math.random()-0.5)*0.2,
                            col: i%2===0 ? 'rgba(0,255,148,0.04)' : 'rgba(255,255,255,0.03)'
                        });
                    }

                    function anim() {
                        ctx.clearRect(0,0,w,h);
                        orbs.forEach(p => {
                            p.x+=p.dx; p.y+=p.dy;
                            if(p.x<-p.r || p.x>w+p.r) p.dx*=-1;
                            if(p.y<-p.r || p.y>h+p.r) p.dy*=-1;
                            
                            const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
                            g.addColorStop(0, p.col);
                            g.addColorStop(1, 'transparent');
                            ctx.fillStyle = g;
                            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                        });
                        requestAnimationFrame(anim);
                    }
                    anim();
                }
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
