<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>STAVOK.NET | Titanium OS</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Unbounded:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* --- COLOR MATRIX --- */
            --bg-deep: #030303;
            --bg-noise: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+CjxyZWN0IHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgZmlsbD0iIzAzMDMwMyI+PC9yZWN0Pgo8ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPgo8ZyBmaWxsPSIjMWExYTFhIiBmaWxsLW9wYWNpdHk9IjAuMSI+CjxwYXRoIGQ9Ik0wIDBoNDB2NDBIMHoiLz4KPC9nPgo8L2c+Cjwvc3ZnPg==');
            
            /* Glass Layers */
            --glass-base: rgba(18, 18, 18, 0.70);
            --glass-high: rgba(30, 30, 30, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shine: linear-gradient(125deg, rgba(255,255,255,0.05) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.02) 100%);
            
            /* Brand Neons */
            --neon-green: #00FF94;
            --neon-green-dim: rgba(0, 255, 148, 0.15);
            --neon-red: #FF2E2E;
            --neon-gold: #FFD700;
            --neon-blue: #00C2FF;
            --neon-purple: #BD00FF;
            
            /* Text */
            --text-primary: #FFFFFF;
            --text-secondary: #999999;
            --text-tertiary: #555555;
            
            /* Typography */
            --font-display: 'Unbounded', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            /* Layout */
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --nav-height: 90px;
            --max-width: 600px;
            
            /* Animation */
            --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
            --ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* --- RESET --- */
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            outline: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 148, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 194, 255, 0.03) 0%, transparent 40%),
                var(--bg-noise);
            color: var(--text-primary);
            font-family: var(--font-body);
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 140px;
        }

        /* --- COMPONENTS --- */
        .glass-panel {
            background: var(--glass-base);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.6);
            position: relative; overflow: hidden;
        }
        
        .glass-panel::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--glass-shine); pointer-events: none;
        }

        /* --- HEADER --- */
        .app-header {
            position: sticky; top: 15px; z-index: 100;
            width: calc(100% - 24px); max-width: var(--max-width); margin: 0 auto;
            height: 68px; border-radius: 50px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 8px 0 24px;
            transition: transform 0.3s var(--ease-out);
        }

        .brand {
            display: flex; align-items: center; gap: 14px; text-decoration: none;
        }
        .brand-logo {
            width: 40px; height: 40px; background: #fff; color: #000;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-weight: 900; font-size: 20px;
            font-style: italic; transform: skewX(-10deg);
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
        }
        .brand-text {
            font-family: var(--font-display); font-weight: 800; font-size: 16px;
            color: #fff; letter-spacing: -0.5px; font-style: italic;
        }

        .profile-chip {
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            border-radius: 40px; padding: 6px 6px 6px 18px;
            display: flex; align-items: center; gap: 12px; cursor: pointer;
            transition: all 0.2s;
        }
        .profile-chip:active { transform: scale(0.95); background: rgba(255,255,255,0.05); }
        
        .user-balance { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--neon-green); }
        .user-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, #333, #111);
            border: 2px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-weight: 800; font-size: 14px; color: #fff;
            position: relative;
        }
        .user-avatar::after {
            content: ''; position: absolute; bottom: 2px; right: 2px;
            width: 8px; height: 8px; background: var(--neon-green);
            border-radius: 50%; border: 2px solid #000;
        }

        /* --- ADMIN BANNER (DB SYNCED) --- */
        .banner-container {
            width: calc(100% - 24px); max-width: var(--max-width); margin: 20px auto 0;
            display: none; /* Controlled by JS */
            animation: slideDown 0.5s var(--ease-elastic);
        }
        
        .promo-banner {
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.15), rgba(0,0,0,0));
            border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 24px;
            padding: 20px; display: flex; align-items: center; gap: 18px;
            position: relative; overflow: hidden;
        }
        .promo-banner::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: var(--neon-gold);
        }
        
        .pb-icon { font-size: 24px; color: var(--neon-gold); animation: pulse 2s infinite; }
        .pb-content h4 { font-family: var(--font-display); font-size: 14px; margin-bottom: 4px; color: #fff; }
        .pb-content p { font-size: 12px; color: rgba(255,255,255,0.7); }
        
        .pb-edit {
            position: absolute; right: 15px; top: 15px;
            width: 30px; height: 30px; border-radius: 50%;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            color: #fff; cursor: pointer; font-size: 12px;
        }

        /* --- FEED --- */
        .feed-container {
            width: 100%; max-width: var(--max-width); margin: 0 auto;
            padding: 20px 15px; display: flex; flex-direction: column; gap: 24px;
        }

        .post-card {
            border-radius: 28px; padding: 24px; transition: transform 0.2s;
            position: relative;
        }
        .post-card.pinned {
            border: 1px solid var(--neon-gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
        }
        
        .pin-badge {
            position: absolute; top: -12px; right: 20px;
            background: var(--neon-gold); color: #000;
            font-size: 10px; font-weight: 800; padding: 4px 12px;
            border-radius: 20px; display: flex; align-items: center; gap: 6px;
            z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Post Header */
        .ph { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .ph-left { display: flex; gap: 14px; align-items: center; }
        
        .ph-av {
            width: 46px; height: 46px; background: #222; border-radius: 16px;
            border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-weight: 700; font-size: 16px; color: #fff;
        }
        
        .ph-info h4 { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; font-family: var(--font-display); display: flex; align-items: center; gap: 8px; }
        .ph-info span { font-size: 12px; color: var(--text-secondary); }
        
        .role-badge {
            font-size: 9px; padding: 3px 8px; border-radius: 6px;
            text-transform: uppercase; font-weight: 800;
        }
        .role-badge.admin { background: #fff; color: #000; box-shadow: 0 0 10px rgba(255,255,255,0.4); }
        .role-badge.user { border: 1px solid var(--glass-border); color: var(--text-tertiary); }

        /* Admin Controls */
        .admin-opts {
            position: absolute; top: 20px; right: 20px;
            display: flex; gap: 8px; opacity: 0; transition: 0.2s;
        }
        .post-card:hover .admin-opts { opacity: 1; }
        
        .ao-btn {
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 12px; cursor: pointer; transition: 0.2s;
        }
        .ao-btn:hover { background: #fff; color: #000; }
        .ao-btn.active { color: var(--neon-gold); border-color: var(--neon-gold); }

        /* Content */
        .pc-text { font-size: 15px; line-height: 1.6; color: rgba(255,255,255,0.9); white-space: pre-wrap; }
        .pc-img { width: 100%; border-radius: 20px; margin-top: 15px; border: 1px solid var(--glass-border); }

        /* --- WIDGET: MATCH (LIVE) --- */
        .match-card {
            margin-top: 20px; border-radius: 24px; padding: 20px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
            border: 1px solid var(--glass-border); position: relative;
        }
        .mc-live {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            color: var(--neon-red); font-size: 10px; font-weight: 800;
            border: 1px solid var(--neon-red); padding: 3px 10px; border-radius: 12px;
            animation: blink 2s infinite;
        }
        
        .mc-main { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; margin-bottom: 25px; }
        .mc-t { text-align: center; width: 35%; font-family: var(--font-display); font-size: 13px; font-weight: 700; line-height: 1.4; }
        .mc-score { font-family: var(--font-display); font-size: 32px; font-weight: 900; color: #fff; }
        .mc-time { font-size: 11px; color: var(--neon-green); display: block; text-align: center; margin-top: 5px; }

        .mc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .bet-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            border-radius: 14px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .bet-btn:active { background: var(--neon-green); color: #000; }
        .k { display: block; font-family: var(--font-display); font-weight: 800; font-size: 15px; }
        .l { font-size: 10px; text-transform: uppercase; color: var(--text-secondary); }

        /* --- WIDGET: AD (CUSTOM) --- */
        .ad-card {
            margin-top: 20px; border-radius: 24px; padding: 24px;
            position: relative; overflow: hidden; border: 1px solid;
        }
        .ad-tag {
            position: absolute; top: 15px; right: 15px;
            border: 1px solid currentColor; font-size: 10px; padding: 3px 8px;
            border-radius: 6px; font-weight: 800; text-transform: uppercase;
        }
        .ad-btn {
            display: inline-block; padding: 12px 24px; border-radius: 40px;
            font-weight: 800; font-size: 12px; margin-top: 20px; cursor: pointer;
            font-family: var(--font-display); text-transform: uppercase;
            text-decoration: none; transition: 0.2s;
        }
        .ad-btn:active { transform: scale(0.95); opacity: 0.9; }

        /* --- FOOTER ACTIONS --- */
        .pf { border-top: 1px solid var(--glass-border); margin-top: 20px; padding-top: 18px; display: flex; gap: 25px; }
        .act { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 14px; cursor: pointer; transition: 0.2s; }
        .act:hover { color: #fff; }
        .act i { font-size: 18px; }

        /* --- BOTTOM NAV --- */
        .nav-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px; height: 75px;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px);
            border-radius: 60px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-evenly; align-items: center;
            z-index: 900; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            text-decoration: none; color: rgba(255,255,255,0.3); width: 60px; transition: 0.3s;
        }
        .nav-item i { font-size: 24px; transition: 0.3s; }
        .nav-item span { font-size: 9px; font-family: var(--font-display); font-weight: 700; text-transform: uppercase; opacity: 0; transform: translateY(10px); transition: 0.3s; }
        
        .nav-item.active { color: #fff; }
        .nav-item.active i { transform: translateY(-4px); text-shadow: 0 0 20px rgba(255,255,255,0.6); }
        .nav-item.active span { opacity: 1; transform: translateY(0); }

        /* --- FAB --- */
        .fab {
            position: fixed; bottom: 125px; right: 25px; width: 60px; height: 60px;
            background: #fff; color: #000; border-radius: 20px; display: none;
            align-items: center; justify-content: center; font-size: 24px;
            box-shadow: 0 0 40px rgba(255,255,255,0.25); z-index: 800; cursor: pointer;
            transition: 0.4s var(--ease-elastic);
        }
        .fab:hover { transform: scale(1.1) rotate(90deg); }

        /* --- MODALS --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            z-index: 2000; display: none; align-items: center; justify-content: center;
            padding: 20px; animation: fadeIn 0.3s ease;
        }
        .modal {
            width: 100%; max-width: 420px; background: #080808;
            border: 1px solid var(--glass-border); border-radius: 32px; padding: 28px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8); transform: translateY(20px);
            animation: slideUp 0.3s forwards; max-height: 90vh; overflow-y: auto;
        }
        
        .m-title { font-family: var(--font-display); font-size: 20px; color: #fff; margin-bottom: 25px; }
        
        .inp {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 16px; color: #fff; margin-bottom: 12px;
            font-family: var(--font-body); font-size: 14px; transition: 0.2s;
        }
        .inp:focus { border-color: #fff; background: rgba(255,255,255,0.06); }
        
        .btn-main {
            width: 100%; padding: 18px; background: #fff; color: #000;
            border-radius: 16px; font-weight: 800; border: none; font-family: var(--font-display);
            text-transform: uppercase; cursor: pointer; margin-top: 15px; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.97); }

        /* Admin Tools */
        .admin-panel {
            background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.15);
            padding: 20px; border-radius: 16px; margin-top: 20px;
        }
        .lbl { font-size: 10px; color: var(--neon-gold); font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 10px; letter-spacing: 1px; }

        /* Color Picker */
        .colors { display: flex; gap: 10px; margin-bottom: 15px; }
        .c-opt { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .c-opt.active { border-color: #fff; transform: scale(1.15); }

        /* Upload Btn */
        .file-label {
            display: flex; align-items: center; gap: 10px; font-size: 13px; color: #aaa;
            margin-bottom: 15px; cursor: pointer;
        }
        .file-label i { font-size: 18px; color: #fff; }

        /* --- TOAST & LOADER --- */
        #toast {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(255,255,255,0.95); color: #000; padding: 12px 24px;
            border-radius: 40px; font-family: var(--font-display); font-size: 12px; font-weight: 700;
            z-index: 5000; opacity: 0; transition: 0.4s var(--ease-elastic); pointer-events: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .spinner {
            width: 34px; height: 34px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 60px auto;
        }
        
        .retry-btn {
            background: #222; color: #fff; padding: 10px 20px; border-radius: 10px; border: 1px solid #444; margin: 0 auto; display: block; cursor: pointer;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.95); } }
        @keyframes slideUp { to { transform: translateY(0); } }
        @keyframes blink { 50% { opacity: 0.5; } }

    </style>
</head>
<body>

    <div id="toast">Добро пожаловать</div>

    <div class="header-container">
        <header class="header-pill glass-panel">
            <a href="feed.html" class="brand">
                <div class="brand-logo">S</div>
                <div class="brand-text">STAVOK</div>
            </a>
            <div class="profile-chip" onclick="window.location.href='profile.html'">
                <span class="user-balance" id="headerBal">...</span>
                <div class="user-avatar" id="headerAva">?</div>
            </div>
        </header>
    </div>

    <div class="banner-container" id="bannerWrap">
        <div class="promo-banner">
            <i class="fa-solid fa-bolt pb-icon"></i>
            <div class="pb-content">
                <h4 id="bnrTitle">LOADING...</h4>
                <p id="bnrText">...</p>
            </div>
            <div class="pb-edit" id="bnrEdit" style="display:none;" onclick="App.admin.editBanner()">
                <i class="fa-solid fa-pen"></i>
            </div>
        </div>
    </div>

    <main class="feed-container">
        <div id="pinnedFeed" style="display:flex; flex-direction:column; gap:24px;"></div>
        <div id="feedStream">
            <div class="spinner"></div>
        </div>
        <div id="feedError" style="display:none; text-align:center; padding:20px;">
            <p style="color:#666; margin-bottom:10px;">Ошибка загрузки</p>
            <button class="retry-btn" onclick="location.reload()">Обновить</button>
        </div>
    </main>

    <div class="fab" id="mainFab" onclick="App.ui.openCreate()">
        <i class="fa-solid fa-plus"></i>
    </div>

    <nav class="nav-dock">
        <a href="news.html" class="nav-item"><i class="fa-solid fa-bolt"></i><span>News</span></a>
        <a href="feed.html" class="nav-item active"><i class="fa-solid fa-layer-group"></i><span>Feed</span></a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user-astronaut"></i><span>Profile</span></a>
    </nav>

    <div class="overlay" id="createModal">
        <div class="modal">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 class="m-title" id="createTitle">Новый пост</h3>
                <i class="fa-solid fa-xmark" style="color:#666; cursor:pointer;" onclick="App.ui.closeModal()"></i>
            </div>
            
            <textarea id="uContent" class="inp" style="height:100px; resize:none;" placeholder="Ваш текст..."></textarea>
            
            <label class="file-label">
                <i class="fa-solid fa-image"></i>
                <span>Прикрепить фото</span>
                <input type="file" id="uFile" style="display:none" accept="image/*" onchange="App.ui.toast('Фото выбрано')">
            </label>

            <div class="admin-panel" id="adminFields" style="display:none;">
                <span class="lbl">ADMIN TOOLS</span>
                <input type="text" id="pTitle" class="inp" placeholder="Заголовок поста">
                <select id="pType" class="inp" style="cursor:pointer; background:#222;">
                    <option value="text">Обычный пост</option>
                    <option value="match">Матч</option>
                    <option value="ad">Конструктор Рекламы</option>
                </select>

                <div id="matchFields" style="display:none; gap:10px;">
                    <input type="text" id="mT1" class="inp" placeholder="Команда 1">
                    <input type="text" id="mT2" class="inp" placeholder="Команда 2">
                </div>

                <div id="adFields" style="display:none;">
                    <span class="lbl" style="color:#fff; margin-top:10px;">Цвет Темы</span>
                    <div class="colors">
                        <div class="c-opt active" style="background:#FFD700" onclick="App.create.setColor('gold', this)"></div>
                        <div class="c-opt" style="background:#00FF94" onclick="App.create.setColor('green', this)"></div>
                        <div class="c-opt" style="background:#FF2E2E" onclick="App.create.setColor('red', this)"></div>
                        <div class="c-opt" style="background:#00C2FF" onclick="App.create.setColor('blue', this)"></div>
                        <div class="c-opt" style="background:#BD00FF" onclick="App.create.setColor('purple', this)"></div>
                    </div>
                    <input type="text" id="adTag" class="inp" placeholder="Бейджик (PROMO)">
                    <input type="text" id="adBtn" class="inp" placeholder="Текст Кнопки (Открыть)">
                    <input type="text" id="adLink" class="inp" placeholder="Ссылка (https://...)">
                </div>
            </div>

            <button class="btn-main" onclick="App.create.submit()">Опубликовать</button>
        </div>
    </div>

    <div class="overlay" id="betModal">
        <div class="modal">
            <h3 class="m-title" style="text-align:center">Ставка</h3>
            <div style="background:#222; padding:15px; border-radius:16px; margin-bottom:20px; text-align:center;">
                <div id="bOut" style="font-size:20px; font-weight:700; color:#fff;">-</div>
                <div id="bCoef" style="color:var(--neon-green); font-weight:800;">-</div>
            </div>
            <input type="number" id="bSum" class="inp" placeholder="Сумма (x2)" style="text-align:center; font-size:20px; font-weight:700;">
            <button class="btn-main" style="background:var(--neon-green); color:#000;" onclick="App.bets.confirm()">Поставить</button>
        </div>
    </div>

    <div class="overlay" id="editMatchModal">
        <div class="modal">
            <h3 class="m-title">Управление</h3>
            <input type="text" id="emScore" class="inp" placeholder="Счет (1:0)">
            <input type="text" id="emTime" class="inp" placeholder="Время (45')">
            <div style="display:flex; gap:10px;">
                <button class="btn-main" onclick="App.admin.updateMatch()">Обновить</button>
                <button class="btn-main" style="background:#333; color:#fff;" onclick="App.admin.settle()">Расчет</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="bannerModal">
        <div class="modal">
            <h3 class="m-title">Настройка Баннера</h3>
            <input type="text" id="ebTitle" class="inp" placeholder="Заголовок">
            <input type="text" id="ebText" class="inp" placeholder="Текст">
            <div style="display:flex; align-items:center; gap:10px; margin-top:15px;">
                <input type="checkbox" id="ebActive" style="width:20px; height:20px;">
                <label for="ebActive" style="color:#fff;">Активен</label>
            </div>
            <button class="btn-main" onclick="App.admin.saveBanner()">Сохранить</button>
        </div>
    </div>

    <script>
        const CFG = {
            url: 'https://cmoeirxugwapvvcdkwjs.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE'
        };

        const App = {
            sb: null, user: null, profile: null,
            tempBet: null, editId: null, adColor: 'gold',

            // 1. INIT
            init: async function() {
                try {
                    this.sb = window.supabase.createClient(CFG.url, CFG.key);
                    const { data: { session } } = await this.sb.auth.getSession();
                    if(!session) return window.location.href = 'login.html';
                    this.user = session.user;

                    await this.ensureProfile();
                    this.admin.loadConfig();
                    
                    // Force Load feed with timeout check
                    const loadPromise = this.posts.load();
                    const timeout = new Promise(r => setTimeout(r, 5000));
                    
                    await Promise.race([loadPromise, timeout]).then(() => {
                        // Check if spinner still exists
                        const spinner = document.querySelector('.spinner');
                        if(spinner) {
                            spinner.style.display = 'none';
                            // If stream empty, maybe ok, but ensure no error
                        }
                    });

                    this.listeners();
                    this.realtime();

                } catch(e) { 
                    console.error(e);
                    document.querySelector('.spinner').style.display = 'none';
                    document.getElementById('feedError').style.display = 'block';
                }
            },

            // 2. PROFILE (Self-Healing)
            ensureProfile: async function() {
                let { data } = await this.sb.from('users').select('*').eq('id', this.user.id).single();
                if(!data) {
                    const np = { id: this.user.id, username: this.user.email.split('@')[0], email: this.user.email, role: 'user', balance: 0 };
                    await this.sb.from('users').insert([np]);
                    data = np;
                }
                this.profile = data;
                this.ui.updateProfile(data);
                
                // RBAC
                if(data.role === 'admin') {
                    document.getElementById('adminFields').style.display = 'block';
                    document.getElementById('bnrEdit').style.display = 'flex';
                    document.getElementById('uContent').style.display = 'none'; // Admin uses expanded
                    document.getElementById('createTitle').innerText = 'Создать (Admin)';
                } else {
                    document.getElementById('adminFields').style.display = 'none';
                }
                document.getElementById('mainFab').style.display = 'flex'; // Show for all
            },

            // 3. POSTS
            posts: {
                load: async function() {
                    const mStream = document.getElementById('feedStream');
                    const pStream = document.getElementById('pinnedFeed');
                    
                    const { data, error } = await App.sb
                        .from('posts')
                        .select('*, users:author_id(username, role)')
                        .order('created_at', { ascending: false });

                    if(error) throw error;

                    mStream.innerHTML = ''; pStream.innerHTML = '';
                    if(!data || !data.length) {
                        mStream.innerHTML = '<div style="text-align:center; color:#555; margin-top:50px;">Лента пуста</div>';
                        return;
                    }

                    data.forEach(p => {
                        const html = this.render(p);
                        if(p.is_pinned) pStream.innerHTML += html;
                        else mStream.innerHTML += html;
                    });
                },

                render: function(p) {
                    const u = p.users || { username: 'Deleted', role: 'user' };
                    const isAdmin = App.profile?.role === 'admin';
                    
                    let body = p.content;
                    const isMatch = body.includes('|VS|');
                    const isAd = body.includes('|AD|');
                    
                    // --- MATCH ---
                    if(isMatch) {
                        let [main, meta] = body.split('|SC|');
                        let [t1, t2] = main.split('|VS|');
                        let sc='0:0', tm='LIVE';
                        if(meta) { let [s, t] = meta.split('|TM|'); sc=s||sc; tm=t||tm; }

                        body = `
                        <div class="match-card">
                            <div class="mc-live">${tm}</div>
                            <div class="mc-main">
                                <div class="mc-t">${t1}</div>
                                <div class="mc-score">${sc}</div>
                                <div class="mc-t">${t2}</div>
                            </div>
                            <div class="mc-grid">
                                <div class="bet-btn" onclick="App.bets.open('${t1}', 1.85)"><span class="k">1.85</span><span class="l">P1</span></div>
                                <div class="bet-btn" onclick="App.bets.open('X', 3.20)"><span class="k">3.20</span><span class="l">X</span></div>
                                <div class="bet-btn" onclick="App.bets.open('${t2}', 2.10)"><span class="k">2.10</span><span class="l">P2</span></div>
                            </div>
                            ${isAdmin ? `<div style="text-align:center; margin-top:10px;"><button class="btn-main" style="width:auto; padding:8px 20px; margin:0;" onclick="App.admin.openMatch('${p.id}')">EDIT</button></div>` : ''}
                        </div>`;
                    }
                    // --- AD (CUSTOMIZABLE) ---
                    else if(isAd) {
                        // |AD|Title|Desc
                        let [tag, title, desc] = body.split('|');
                        const meta = p.meta_data || { color: 'gold', btn: 'Открыть', link: '#', tag: 'PROMO' };
                        
                        const colors = { 
                            gold: '#FFD700', green: '#00FF94', red: '#FF2E2E', blue: '#00C2FF', purple: '#BD00FF' 
                        };
                        const c = colors[meta.color] || colors.gold;

                        body = `
                        <div class="ad-card" style="border-color:${c}; background:linear-gradient(135deg, ${c}15, rgba(0,0,0,0.6));">
                            <div class="ad-tag" style="color:${c};">${meta.tag}</div>
                            <h3 style="font-family:var(--font-display); color:#fff; font-size:18px;">${title}</h3>
                            <p style="font-size:13px; color:#ccc; margin-top:5px;">${desc}</p>
                            <a href="${meta.link}" class="ad-btn" style="background:${c}; color:#000;">${meta.btn}</a>
                        </div>`;
                    }
                    // --- TEXT/IMG ---
                    else {
                        body = `<div class="pc-text">${body}</div>`;
                    }

                    if(p.image_url) body += `<img src="${p.image_url}" class="pc-img">`;

                    // Admin UI
                    let adm = '';
                    if(isAdmin) {
                        adm = `
                        <div class="admin-opts">
                            <div class="ao-btn ${p.is_pinned?'active':''}" onclick="App.admin.pin('${p.id}', ${!p.is_pinned})"><i class="fa-solid fa-thumbtack"></i></div>
                            <div class="ao-btn" onclick="App.admin.del('${p.id}')"><i class="fa-solid fa-trash"></i></div>
                        </div>`;
                    }

                    // Pin Badge
                    const pin = p.is_pinned ? `<div class="pin-badge"><i class="fa-solid fa-thumbtack"></i> PIN</div>` : '';

                    return `
                    <div class="post-card glass-panel ${p.is_pinned?'pinned':''}">
                        ${pin} ${adm}
                        <div class="ph">
                            <div class="ph-left">
                                <div class="ph-av">${u.username[0].toUpperCase()}</div>
                                <div class="ph-info">
                                    <h4>${u.username} <span class="role-badge ${u.role}">${u.role}</span></h4>
                                    <span>Только что</span>
                                </div>
                            </div>
                        </div>
                        ${!isMatch && !isAd && p.title ? `<h4 style="font-family:var(--font-display); font-size:16px; margin-bottom:10px;">${p.title}</h4>` : ''}
                        ${body}
                        <div class="pf">
                            <div class="act"><i class="fa-regular fa-heart"></i> Like</div>
                            <div class="act"><i class="fa-regular fa-comment"></i> 0</div>
                        </div>
                    </div>`;
                }
            },

            // 4. CREATE
            create: {
                setColor: (c, el) => {
                    App.adColor = c;
                    document.querySelectorAll('.c-opt').forEach(e=>e.classList.remove('active'));
                    el.classList.add('active');
                },
                submit: async function() {
                    let title, content, imgUrl = null, meta = {};
                    const isAdmin = App.profile.role === 'admin';
                    
                    // Handle File
                    const fileInput = document.getElementById('uFile');
                    if(fileInput.files.length > 0) {
                        const file = fileInput.files[0];
                        imgUrl = await new Promise(r => {
                            const rd = new FileReader();
                            rd.onload = e => r(e.target.result); // Base64
                            rd.readAsDataURL(file);
                        });
                    }

                    if(isAdmin) {
                        const type = document.getElementById('pType').value;
                        title = document.getElementById('pTitle').value;
                        content = document.getElementById('pContent').value; // reuse? no admin has dedicated text inputs usually, but here shared.
                        
                        // Admin logic override
                        if(type === 'text') {
                            // Uses pContent
                        } else if(type === 'match') {
                            const t1 = document.getElementById('mT1').value;
                            const t2 = document.getElementById('mT2').value;
                            content = `${t1}|VS|${t2}`;
                        } else if(type === 'ad') {
                            content = `|AD|${title}|${content}`; // title|desc
                            meta = {
                                color: App.adColor,
                                tag: document.getElementById('adTag').value || 'PROMO',
                                btn: document.getElementById('adBtn').value || 'OPEN',
                                link: document.getElementById('adLink').value || '#'
                            };
                        }
                    } else {
                        // User
                        title = 'User Post';
                        content = document.getElementById('uContent').value;
                    }

                    if(!content && !imgUrl) return App.ui.toast('Пусто...');

                    const { error } = await App.sb.from('posts').insert([{
                        author_id: App.user.id,
                        title: title, content: content,
                        image_url: imgUrl,
                        meta_data: meta
                    }]);

                    if(!error) {
                        App.ui.closeModal();
                        App.ui.toast('Опубликовано!');
                        // clear
                        document.getElementById('uContent').value = '';
                        document.getElementById('pContent').value = '';
                    } else {
                        alert(error.message);
                    }
                }
            },

            // 5. ADMIN
            admin: {
                loadConfig: async function() {
                    const { data } = await App.sb.from('app_config').select('*').eq('key', 'banner').single();
                    const el = document.getElementById('bannerWrap');
                    if(data && data.value.active) {
                        el.style.display = 'block';
                        document.getElementById('bnrTitle').innerText = data.value.title;
                        document.getElementById('bnrText').innerText = data.value.text;
                    } else {
                        el.style.display = 'none';
                    }
                },
                editBanner: () => {
                    const t = document.getElementById('bnrTitle').innerText;
                    const d = document.getElementById('bnrText').innerText;
                    document.getElementById('ebTitle').value = t;
                    document.getElementById('ebText').value = d;
                    document.getElementById('ebActive').checked = document.getElementById('bannerWrap').style.display !== 'none';
                    App.ui.openModal('bannerModal');
                },
                saveBanner: async () => {
                    const val = {
                        active: document.getElementById('ebActive').checked,
                        title: document.getElementById('ebTitle').value,
                        text: document.getElementById('ebText').value
                    };
                    await App.sb.from('app_config').upsert({ key: 'banner', value: val });
                    App.ui.closeModal();
                },
                pin: async (id, state) => {
                    await App.sb.from('posts').update({ is_pinned: state }).eq('id', id);
                },
                del: async (id) => {
                    if(confirm('Delete?')) await App.sb.from('posts').delete().eq('id', id);
                },
                // Match
                openMatch: (id) => { App.editId = id; App.ui.openModal('editMatchModal'); },
                updateMatch: async () => {
                    const sc = document.getElementById('emScore').value;
                    const tm = document.getElementById('emTime').value;
                    const { data } = await App.sb.from('posts').select('content').eq('id', App.editId).single();
                    let base = data.content.split('|SC|')[0];
                    let nc = `${base}|SC|${sc}|TM|${tm}`;
                    await App.sb.from('posts').update({ content: nc }).eq('id', App.editId);
                    App.ui.closeModal();
                },
                settle: () => { App.ui.closeModal(); App.ui.toast("Ставки рассчитаны"); }
            },

            // 6. BETS
            bets: {
                open: (t, c) => {
                    App.tempBet = { t, c };
                    document.getElementById('bOut').innerText = t;
                    document.getElementById('bCoef').innerText = 'x'+c;
                    App.ui.openModal('betModal');
                },
                confirm: async () => {
                    const v = parseFloat(document.getElementById('bSum').value);
                    if(!v || v<=0) return App.ui.toast("Сумма?");
                    if(v > App.profile.balance) return App.ui.toast("Мало средств");
                    const nb = App.profile.balance - v;
                    await App.sb.from('users').update({ balance: nb }).eq('id', App.user.id);
                    App.ui.closeModal();
                    App.ui.toast("Ставка принята!");
                }
            },

            ui: {
                updateProfile: (p) => {
                    document.getElementById('headerBal').innerText = parseFloat(p.balance).toFixed(2);
                    document.getElementById('headerAva').innerText = (p.username||'?')[0].toUpperCase();
                },
                openCreate: () => App.ui.openModal('createModal'),
                openModal: (id) => document.getElementById(id).style.display = 'flex',
                closeModal: () => document.querySelectorAll('.overlay').forEach(e => e.style.display = 'none'),
                toast: (m) => {
                    const t = document.getElementById('toast');
                    t.innerText = m; t.classList.add('show');
                    setTimeout(() => t.classList.remove('show'), 2000);
                }
            },

            listeners: function() {
                document.getElementById('pType').addEventListener('change', e => {
                    const t = e.target.value;
                    document.getElementById('matchFields').style.display = t==='match'?'flex':'none';
                    document.getElementById('adFields').style.display = t==='ad'?'block':'none';
                });
            },

            realtime: function() {
                // FORCE REFRESH ON ANY CHANGE
                this.sb.channel('global')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => this.posts.load())
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'app_config' }, () => this.admin.loadConfig())
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${this.user.id}` }, 
                    p => { this.profile.balance = p.new.balance; this.ui.updateProfile(p.new); })
                    .subscribe();
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
