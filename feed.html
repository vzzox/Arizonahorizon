<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STAVOK.NET | Feed</title>

    <script src="[https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2](https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2)"></script>
    <link rel="stylesheet" href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css)">
    
    <link rel="preconnect" href="[https://fonts.googleapis.com](https://fonts.googleapis.com)">
    <link href="[https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Unbounded:wght@400;500;600;700;900&display=swap](https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Unbounded:wght@400;500;600;700;900&display=swap)" rel="stylesheet">

    <style>
        /* =========================================================================
           1. CORE DESIGN SYSTEM (INSPIRED BY SEO TALOS UI)
           ========================================================================= */
        :root {
            /* Palette */
            --bg-deep: #030303;
            --bg-card: #0A0A0A;
            --bg-glass: rgba(20, 20, 20, 0.6);
            --bg-input: rgba(255, 255, 255, 0.03);
            
            /* Borders & Effects */
            --border-weak: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.15);
            --glow-white: 0 0 20px rgba(255, 255, 255, 0.05);
            
            /* Text */
            --text-main: #FFFFFF;
            --text-gray: #888888;
            --text-dark: #111111;
            
            /* Accents (Monochrome + Green Signal) */
            --accent-white: #FFFFFF;
            --accent-green: #00E096; /* Для ставок */
            --accent-red: #FF3B30;
            
            /* Dimensions */
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 32px;
            --nav-height: 80px;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        /* RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            padding-bottom: calc(var(--nav-height) + 20px);
            min-height: 100vh;
            /* Background Grid Pattern */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100px 100px;
            background-position: center top;
        }

        /* --- TYPOGRAPHY --- */
        .h-display { font-family: 'Unbounded', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
        .text-sm { font-size: 13px; color: var(--text-gray); }
        .text-xs { font-size: 11px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.05em; }

        /* --- HEADER --- */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(3, 3, 3, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-weak);
            padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .brand-pill {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.05); padding: 6px 14px 6px 6px;
            border-radius: 40px; border: 1px solid var(--border-weak);
        }
        .brand-icon {
            width: 28px; height: 28px; background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #000; font-weight: 900; font-size: 14px; font-family: 'Unbounded';
        }

        .user-pill {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; transition: 0.3s;
        }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #333, #111);
            border: 1px solid var(--border-strong);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700;
        }
        .user-bal { font-family: 'Unbounded'; font-size: 12px; }

        /* --- PROMO BANNER (SEO Style) --- */
        .promo-container { padding: 20px 20px 0; }
        .promo-card {
            background: linear-gradient(180deg, #1A1A1A 0%, #050505 100%);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-md);
            padding: 24px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; gap: 10px;
        }
        /* Shine Effect */
        .promo-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        .star-icon {
            position: absolute; top: 20px; right: 20px;
            width: 40px; height: 40px; color: white; opacity: 0.8;
            animation: spinSlow 10s linear infinite;
        }
        @keyframes spinSlow { 100% { transform: rotate(360deg); } }

        .btn-white {
            background: #fff; color: #000; padding: 12px 20px;
            border-radius: 10px; font-weight: 600; font-size: 13px;
            width: fit-content; margin-top: 10px; cursor: pointer;
            font-family: 'Unbounded'; text-transform: uppercase;
        }

        /* --- FEED LIST --- */
        .feed-list {
            padding: 20px; display: flex; flex-direction: column; gap: 24px;
        }

        /* POST CARD */
        .post-card {
            background: var(--bg-card);
            border: 1px solid var(--border-weak);
            border-radius: var(--radius-md);
            padding: 20px;
            position: relative;
            transition: transform 0.2s;
        }
        .post-card:active { transform: scale(0.99); }

        .post-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .p-author { display: flex; align-items: center; gap: 10px; }
        .p-avatar { width: 40px; height: 40px; border-radius: 12px; background: #151515; border: 1px solid var(--border-weak); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; }
        .p-meta h4 { font-size: 14px; margin-bottom: 2px; }
        
        .badge { font-size: 9px; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; font-weight: 800; margin-left: 5px; }
        .badge.admin { background: #fff; color: #000; }
        .badge.user { background: #222; color: #888; border: 1px solid #333; }

        .post-content { font-size: 14px; line-height: 1.6; color: #ccc; margin-bottom: 15px; }
        .post-image { width: 100%; border-radius: 16px; border: 1px solid var(--border-weak); margin-top: 10px; }

        /* MATCH WIDGET (The Betting Interface) */
        .match-widget {
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0));
            border: 1px solid var(--border-weak);
            border-radius: 16px; padding: 16px; margin-top: 10px;
        }
        .mw-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .mw-teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .mw-team { text-align: center; flex: 1; }
        .mw-score { font-family: 'Unbounded'; font-size: 24px; font-weight: 700; color: var(--accent-white); }
        
        .bet-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .bet-btn {
            background: var(--bg-input); border: 1px solid var(--border-weak);
            padding: 10px; border-radius: 10px; text-align: center; cursor: pointer;
            transition: 0.2s;
        }
        .bet-btn:active { background: #fff; color: #000; }
        .bet-coef { font-family: 'Unbounded'; font-weight: 700; font-size: 14px; display: block; }
        .bet-label { font-size: 10px; text-transform: uppercase; opacity: 0.6; }

        /* FOOTER ACTIONS */
        .post-footer {
            display: flex; gap: 20px; border-top: 1px solid var(--border-weak);
            padding-top: 15px; margin-top: 5px;
        }
        .act-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-gray); cursor: pointer; }
        .act-btn:hover { color: #fff; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 65px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-strong);
            border-radius: 200px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px; z-index: 1000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            gap: 4px; color: #555; text-decoration: none; position: relative;
        }
        .nav-item i { font-size: 20px; transition: 0.3s; }
        .nav-item.active { color: #fff; }
        .nav-item.active i { transform: translateY(-2px); }
        .nav-dot {
            width: 4px; height: 4px; background: #fff; border-radius: 50%;
            position: absolute; bottom: -8px; opacity: 0; transition: 0.3s;
        }
        .nav-item.active .nav-dot { opacity: 1; bottom: 5px; }

        /* --- FAB & MODALS --- */
        .fab-btn {
            position: fixed; bottom: 100px; right: 20px;
            width: 56px; height: 56px; border-radius: 50%;
            background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 0 20px rgba(255,255,255,0.2);
            z-index: 900; cursor: pointer; transition: 0.2s;
        }
        .fab-btn:active { transform: scale(0.9); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal {
            background: #0f0f0f; border: 1px solid var(--border-strong);
            width: 100%; max-width: 420px; border-radius: 24px; padding: 24px;
        }
        .modal-title { font-family: 'Unbounded'; font-size: 18px; margin-bottom: 20px; }
        
        .inp {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border-weak);
            padding: 14px; border-radius: 12px; color: #fff; margin-bottom: 12px;
            font-family: 'Inter'; font-size: 14px;
        }
        .inp:focus { border-color: #fff; }
        
        .btn-black {
            width: 100%; background: #fff; color: #000; padding: 16px;
            border-radius: 12px; font-weight: 700; border: none; font-family: 'Unbounded';
            cursor: pointer; text-transform: uppercase;
        }

        /* --- TOAST --- */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: #fff; color: #000; padding: 12px 24px; border-radius: 30px;
            font-weight: 600; font-size: 13px; z-index: 5000; transition: 0.4s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3); opacity: 0;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* --- ADMIN PANEL IN MODAL --- */
        .admin-section {
            border-top: 1px solid var(--border-weak);
            margin-top: 15px; padding-top: 15px; display: none;
        }
        .admin-badge-label { color: var(--accent-red); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; }

    </style>
</head>
<body>

    <div id="toast">Welcome back</div>

    <header class="app-header">
        <div class="brand-pill">
            <div class="brand-icon">S</div>
            <span class="h-display" style="font-size: 14px;">STAVOK</span>
        </div>
        <div class="user-pill" onclick="window.location.href='profile.html'">
            <span class="user-bal" id="headerBal">0.00 x2</span>
            <div class="user-avatar" id="headerAvatar">?</div>
        </div>
    </header>

    <div class="promo-container" id="promoArea">
        <div class="promo-card">
            <svg class="star-icon" viewBox="0 0 24 24" fill="none" xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)">
                <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="currentColor"/>
            </svg>
            
            <span class="text-xs" style="color: #fff; opacity: 0.6;">Special Offer</span>
            <h2 class="h-display" style="font-size: 22px; line-height: 1.2;">Boost your<br>Balance x2</h2>
            <p class="text-sm" style="max-width: 80%;">Пополни баланс сегодня и получи удвоение депозита для ставок.</p>
            <div class="btn-white">GET STARTED</div>
        </div>
    </div>

    <main class="feed-list" id="feedStream">
        <div style="text-align: center; padding: 40px; color: #333;">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 24px;"></i>
        </div>
    </main>

    <div class="fab-btn" onclick="App.ui.openModal('createModal')">
        <i class="fa-solid fa-plus"></i>
    </div>

    <nav class="bottom-nav">
        <a href="new.html" class="nav-item">
            <i class="fa-solid fa-bolt"></i>
            <span class="nav-dot"></span>
        </a>
        <a href="feed.html" class="nav-item active">
            <i class="fa-solid fa-layer-group"></i>
            <span class="nav-dot"></span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span class="nav-dot"></span>
        </a>
    </nav>

    <div class="overlay" id="createModal">
        <div class="modal">
            <div class="mw-header">
                <h3 class="modal-title">New Post</h3>
                <i class="fa-solid fa-xmark" style="cursor: pointer; color: #666;" onclick="App.ui.closeModal()"></i>
            </div>
            
            <textarea id="postText" class="inp" style="height: 100px; resize: none;" placeholder="Share your thoughts..."></textarea>
            <input id="postImage" type="text" class="inp" placeholder="Image URL (Optional)">

            <div class="admin-section" id="adminPanel">
                <span class="admin-badge-label">Admin Tools</span>
                <select id="postType" class="inp" style="background: #222; cursor: pointer;">
                    <option value="text">Standard Post</option>
                    <option value="match">Betting Match</option>
                    <option value="promo">Promo Banner</option>
                </select>
                
                <div id="matchFields" style="display: none;">
                    <input id="mTeam1" type="text" class="inp" placeholder="Home Team">
                    <input id="mTeam2" type="text" class="inp" placeholder="Away Team">
                </div>
            </div>

            <button class="btn-black" onclick="App.posts.submit()">Publish</button>
        </div>
    </div>

    <div class="overlay" id="betModal">
        <div class="modal">
            <div class="mw-header">
                <h3 class="modal-title">Place Bet</h3>
                <i class="fa-solid fa-xmark" style="cursor: pointer; color: #666;" onclick="App.ui.closeModal()"></i>
            </div>
            
            <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center;">
                <div class="text-xs">OUTCOME</div>
                <div class="h-display" style="font-size: 18px; margin: 5px 0;" id="betOutcome">WIN 1</div>
                <div style="color: var(--accent-green); font-weight: 700;" id="betCoef">x2.50</div>
            </div>

            <input type="number" id="betAmount" class="inp" placeholder="Amount (x2)" style="text-align: center; font-size: 18px; font-weight: 700;">
            
            <button class="btn-black" onclick="App.bets.confirm()">Confirm Bet</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            sbUrl: '[https://cmoeirxugwapvvcdkwjs.supabase.co](https://cmoeirxugwapvvcdkwjs.supabase.co)',
            sbKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE'
        };

        const App = {
            sb: null,
            user: null,
            profile: null,
            tempBet: null,

            init: async function() {
                try {
                    this.sb = window.supabase.createClient(CONFIG.sbUrl, CONFIG.sbKey);
                    
                    // Auth Check
                    const { data: { session } } = await this.sb.auth.getSession();
                    if (!session) return window.location.href = 'login.html';
                    this.user = session.user;

                    // Load Data
                    await this.loadProfile();
                    await this.posts.load();
                    
                    // Listeners
                    this.setupListeners();
                    this.realtime();
                    
                } catch(e) {
                    console.error("Init Error", e);
                }
            },

            loadProfile: async function() {
                const { data } = await this.sb.from('users').select('*').eq('id', this.user.id).single();
                if(data) {
                    this.profile = data;
                    // UI Update
                    document.getElementById('headerBal').innerText = parseFloat(data.balance).toFixed(2) + ' x2';
                    document.getElementById('headerAvatar').innerText = data.username[0].toUpperCase();
                    
                    // Admin Check
                    if(data.role === 'admin') {
                        document.getElementById('adminPanel').style.display = 'block';
                    }
                }
            },

            realtime: function() {
                // Live Balance
                this.sb.channel('public:users')
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${this.user.id}` }, 
                    payload => {
                        this.profile.balance = payload.new.balance;
                        document.getElementById('headerBal').innerText = parseFloat(payload.new.balance).toFixed(2) + ' x2';
                    }).subscribe();

                // Live Feed
                this.sb.channel('public:posts')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, 
                    () => this.posts.load()) // Reload feed on new post
                    .subscribe();
            },

            ui: {
                toast: (msg) => {
                    const t = document.getElementById('toast');
                    t.innerText = msg; t.classList.add('show');
                    setTimeout(() => t.classList.remove('show'), 3000);
                },
                openModal: (id) => document.getElementById(id).style.display = 'flex',
                closeModal: () => document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none')
            },

            posts: {
                load: async function() {
                    const stream = document.getElementById('feedStream');
                    // Join with users table
                    const { data, error } = await App.sb
                        .from('posts')
                        .select('*, users(username, role, avatar_url)')
                        .order('created_at', { ascending: false });

                    if(!data) return;
                    
                    stream.innerHTML = '';
                    data.forEach(post => {
                        stream.innerHTML += this.template(post);
                    });
                },

                template: function(p) {
                    const isMatch = p.content.includes('VS') && p.users.role === 'admin';
                    const isPromo = p.content.includes('PROMO_BANNER') && p.users.role === 'admin';
                    const user = p.users || { username: 'Anon', role: 'user' };
                    const badge = user.role === 'admin' ? '<span class="badge admin">Admin</span>' : '<span class="badge user">User</span>';
                    
                    let bodyContent = `<div class="post-content">${p.content}</div>`;
                    
                    // 1. MATCH TEMPLATE (BETTING)
                    if (isMatch) {
                        const teams = p.content.split('VS'); // Simple parse "Team1 VS Team2"
                        const t1 = teams[0].trim(); 
                        const t2 = teams[1] ? teams[1].trim() : 'Opponent';
                        
                        bodyContent = `
                        <div class="match-widget">
                            <div class="mw-header text-xs">
                                <span>LIVE MATCH</span>
                                <span style="color: var(--accent-red)">● LIVE</span>
                            </div>
                            <div class="mw-teams">
                                <div class="mw-team"><span class="h-display">${t1}</span></div>
                                <div class="mw-score">0:0</div>
                                <div class="mw-team"><span class="h-display">${t2}</span></div>
                            </div>
                            <div class="bet-buttons">
                                <div class="bet-btn" onclick="App.bets.open('${t1}', 1.90)">
                                    <span class="bet-coef">1.90</span>
                                    <span class="bet-label">WIN 1</span>
                                </div>
                                <div class="bet-btn" onclick="App.bets.open('Draw', 3.20)">
                                    <span class="bet-coef">3.20</span>
                                    <span class="bet-label">DRAW</span>
                                </div>
                                <div class="bet-btn" onclick="App.bets.open('${t2}', 2.10)">
                                    <span class="bet-coef">2.10</span>
                                    <span class="bet-label">WIN 2</span>
                                </div>
                            </div>
                        </div>`;
                    }
                    // 2. PROMO TEMPLATE
                    else if (isPromo) {
                        // Content format: PROMO_BANNER|Title|Description
                        const parts = p.content.split('|');
                        bodyContent = `
                        <div class="promo-card" style="margin-top:0;">
                            <h2 class="h-display" style="font-size: 20px;">${parts[1] || 'Special Offer'}</h2>
                            <p class="text-sm">${parts[2] || 'Check details.'}</p>
                        </div>`;
                    }
                    // 3. IMAGE POST
                    else if (p.image_url) {
                        bodyContent += `<img src="${p.image_url}" class="post-image" loading="lazy">`;
                    }

                    return `
                    <div class="post-card">
                        <div class="post-header">
                            <div class="p-author">
                                <div class="p-avatar">${user.username[0].toUpperCase()}</div>
                                <div class="p-meta">
                                    <h4>${user.username} ${badge}</h4>
                                    <span class="text-xs">Just now</span>
                                </div>
                            </div>
                            <i class="fa-solid fa-ellipsis" style="color:#444"></i>
                        </div>
                        ${bodyContent}
                        <div class="post-footer">
                            <div class="act-btn"><i class="fa-regular fa-heart"></i> Like</div>
                            <div class="act-btn"><i class="fa-regular fa-comment"></i> Comment</div>
                        </div>
                    </div>`;
                },

                submit: async function() {
                    const type = document.getElementById('postType').value;
                    let content = document.getElementById('postText').value;
                    const img = document.getElementById('postImage').value;

                    // Admin formatting
                    if(App.profile.role === 'admin') {
                        if(type === 'match') {
                            const t1 = document.getElementById('mTeam1').value;
                            const t2 = document.getElementById('mTeam2').value;
                            content = `${t1} VS ${t2}`;
                        } else if (type === 'promo') {
                            content = `PROMO_BANNER|Big Bonus|${content}`;
                        }
                    }

                    if(!content) return App.ui.toast("Write something...");

                    const { error } = await App.sb.from('posts').insert([{
                        author_id: App.user.id,
                        content: content,
                        image_url: img || null
                    }]);

                    if(!error) {
                        App.ui.closeModal();
                        App.ui.toast("Posted!");
                        document.getElementById('postText').value = '';
                    } else {
                        App.ui.toast("Error posting");
                    }
                }
            },

            bets: {
                open: (outcome, coef) => {
                    App.tempBet = { outcome, coef };
                    document.getElementById('betOutcome').innerText = outcome;
                    document.getElementById('betCoef').innerText = 'x' + coef;
                    App.ui.openModal('betModal');
                },
                confirm: async function() {
                    const amount = parseFloat(document.getElementById('betAmount').value);
                    if(!amount || amount <= 0) return App.ui.toast("Invalid amount");
                    if(amount > App.profile.balance) return App.ui.toast("Insufficient funds");

                    // Optimistic UI update
                    const newBal = App.profile.balance - amount;
                    
                    const { error } = await App.sb.from('users').update({ balance: newBal }).eq('id', App.user.id);
                    
                    if(!error) {
                        App.ui.closeModal();
                        App.ui.toast("Bet Placed!");
                        document.getElementById('betAmount').value = '';
                        // In real app, verify tx in backend
                    }
                }
            },

            setupListeners: function() {
                // Show/Hide Match Fields in Modal
                document.getElementById('postType').addEventListener('change', (e) => {
                    const fields = document.getElementById('matchFields');
                    fields.style.display = e.target.value === 'match' ? 'block' : 'none';
                });
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
