<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Регистрация | STAVOK.NET</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Unbounded:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050505;
            --bg-glass: rgba(20, 20, 20, 0.7);
            --border-glass: rgba(255, 255, 255, 0.15);
            --input-bg: rgba(255, 255, 255, 0.05);
            --accent: #FFFFFF;
            --error: #FF3333;
            --success: #00FF94;
            --font-display: 'Unbounded', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-deep); color: white;
            font-family: var(--font-body); min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden; position: relative;
        }

        /* BACKGROUND */
        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; }
        .glow-orb {
            position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: -2;
        }

        /* CARD */
        .auth-card {
            width: 100%; max-width: 440px; margin: 20px;
            background: var(--bg-glass); border: 1px solid var(--border-glass);
            border-radius: 24px; padding: 40px 30px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            opacity: 0; transform: translateY(20px);
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        /* LOGO */
        .header { text-align: center; margin-bottom: 35px; }
        .logo-box { display: inline-flex; align-items: center; gap: 14px; text-decoration: none; margin-bottom: 10px; }
        
        .logo-cube {
            width: 44px; height: 44px; background: white; color: black;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
            font-family: var(--font-display); font-weight: 900; font-size: 24px;
            /* ВАЖНО: Курсив/наклон только у куба */
            transform: skewX(-12deg); 
            font-style: italic;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            position: relative; overflow: hidden;
        }
        
        /* Блик на кубе */
        .logo-cube::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-20deg); animation: shine 3s infinite;
        }
        @keyframes shine { 0%, 80% { left: -100%; } 100% { left: 200%; } }

        .logo-text {
            font-family: var(--font-display); font-size: 22px; font-weight: 800;
            color: white; text-transform: uppercase; letter-spacing: -0.5px;
            /* ВАЖНО: Текст прямой */
            font-style: normal;
        }
        .subtitle { color: #888; font-size: 13px; margin-top: 5px; }

        /* INPUTS */
        .form-group { margin-bottom: 18px; position: relative; }
        
        .input-field {
            width: 100%; height: 56px; background: var(--input-bg);
            border: 1px solid var(--border-glass); border-radius: 14px;
            padding: 0 45px 0 18px; color: white; font-size: 15px;
            transition: 0.3s; font-family: var(--font-body);
        }
        .input-field:focus { border-color: white; background: rgba(255,255,255,0.1); }
        
        .input-icon {
            position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
            color: #666; pointer-events: none; transition: 0.3s;
            display: flex; align-items: center;
        }
        .input-field:focus ~ .input-icon { color: white; }
        .input-icon svg { width: 20px; height: 20px; }

        .eye-btn { pointer-events: auto; cursor: pointer; }
        .eye-btn:hover { color: white; }

        /* BUTTON */
        .btn-submit {
            width: 100%; height: 58px; background: white; color: black;
            border: none; border-radius: 14px;
            font-family: var(--font-display); font-weight: 800; font-size: 15px;
            text-transform: uppercase; cursor: pointer;
            margin-top: 10px; position: relative; overflow: hidden;
            transform: skewX(-6deg); transition: 0.3s;
        }
        .btn-submit span { display: block; transform: skewX(6deg); /* Выпрямляем текст */ }
        .btn-submit:hover { transform: skewX(-6deg) scale(1.02); box-shadow: 0 0 25px rgba(255,255,255,0.3); }
        .btn-submit:active { transform: skewX(-6deg) scale(0.98); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        .loader { display: none; width: 20px; height: 20px; border: 2px solid black; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* FOOTER & TERMS */
        .terms { font-size: 11px; color: #666; text-align: center; margin-top: 15px; }
        .terms span { color: white; cursor: pointer; text-decoration: underline; }
        .footer-link { display: block; text-align: center; margin-top: 25px; color: #888; font-size: 14px; text-decoration: none; }
        .footer-link b { color: white; }

        /* TOAST */
        .toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: #111; border: 1px solid #333; padding: 14px 24px; border-radius: 50px;
            color: white; font-weight: 600; font-size: 13px; z-index: 1000;
            display: flex; align-items: center; gap: 10px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--error); color: var(--error); }

    </style>
</head>
<body>

    <div class="glow-orb"></div>
    <canvas id="canvas-bg"></canvas>
    
    <div id="toast" class="toast"></div>

    <div class="auth-card">
        <div class="header">
            <a href="#" class="logo-box">
                <div class="logo-cube">S</div>
                <div class="logo-text">STAVOK.NET</div>
            </a>
            <div class="subtitle">Присоединяйся к элите</div>
        </div>

        <form id="regForm">
            
            <div class="form-group">
                <input type="text" id="username" class="input-field" placeholder="Никнейм" autocomplete="off">
                <div class="input-icon">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
            </div>

            <div class="form-group">
                <input type="email" id="email" class="input-field" placeholder="Email" autocomplete="off">
                <div class="input-icon">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
            </div>

            <div class="form-group">
                <input type="password" id="password" class="input-field" placeholder="Пароль">
                <div class="input-icon eye-btn" onclick="togglePass()">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                </div>
            </div>

            <div class="form-group">
                <input type="password" id="confirm" class="input-field" placeholder="Повторите пароль">
                <div class="input-icon">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
            </div>

            <div class="terms">
                Регистрируясь, вы принимаете <span>правила сервиса</span>.
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span id="btnText">ЗАРЕГИСТРИРОВАТЬСЯ</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <a href="login.html" class="footer-link">Уже есть аккаунт? <b>Войти</b></a>
    </div>

    <script>
        // 1. КОНФИГУРАЦИЯ SUPABASE
        const SUPABASE_URL = 'https://cmoeirxugwapvvcdkwjs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. ФРАЗЫ УСПЕХА
        const SUCCESS_PHRASES = [
            "Добро пожаловать в элиту!",
            "Твой аккаунт создан. Врывайся!",
            "Регистрация успешна. Время побеждать.",
            "Ты теперь часть STAVOK.NET!",
            "Успех! Твоя игра начинается."
        ];

        // 3. ЛОГИКА UI
        function togglePass() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function showToast(msg, type = 'error') {
            const t = document.getElementById('toast');
            t.className = `toast show ${type}`;
            t.innerHTML = type === 'error' 
                ? `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${msg}`
                : `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg> ${msg}`;
            
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // 4. ЛОГИКА РЕГИСТРАЦИИ
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');

            if(!username || !email || !password) return showToast('Заполните все поля');
            if(password !== confirm) return showToast('Пароли не совпадают');
            if(password.length < 6) return showToast('Пароль минимум 6 символов');

            // Анимация загрузки
            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';

            try {
                // Регистрируем в Auth. 
                // Важно: передаем username в options.data.
                // Триггер в SQL подхватит это и сам создаст запись в public.users.
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { 
                            username: username,
                            display_name: username 
                        }
                    }
                });

                if (error) throw error;

                // Успех!
                const phrase = SUCCESS_PHRASES[Math.floor(Math.random() * SUCCESS_PHRASES.length)];
                showToast(phrase, 'success');

                setTimeout(() => {
                    if (data.session) {
                        window.location.href = 'index.html';
                    } else {
                        alert('Подтвердите Email (ссылка отправлена на почту)!');
                        window.location.href = 'login.html';
                    }
                }, 2000);

            } catch (err) {
                let msg = err.message;
                if(msg.includes('already registered')) msg = 'Этот Email уже занят';
                showToast(msg);
                
                // Возвращаем кнопку
                btn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        });

        // 5. FON (CANVAS PARTICLES)
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function resize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
        window.addEventListener('resize', () => { resize(); init(); });

        function init() {
            particles = [];
            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * w, y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2, alpha: Math.random() * 0.5 + 0.2
                });
            }
        }

        function anim() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0) p.x = w; if(p.x > w) p.x = 0;
                if(p.y < 0) p.y = h; if(p.y > h) p.y = 0;
                ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            // Линии
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            for(let i=0; i<particles.length; i++) {
                for(let j=i+1; j<particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 100) {
                        ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(anim);
        }

        resize(); init(); anim();

    </script>
</body>
</html>
