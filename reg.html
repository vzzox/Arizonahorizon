<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Регистрация | STAVOK.NET</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Unbounded:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ========================================================================
           1. CORE VARIABLES
           ======================================================================== */
        :root {
            --bg-deep: #050505;
            --bg-panel: rgba(20, 20, 20, 0.6);
            --bg-input: rgba(255, 255, 255, 0.05);
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --accent-error: #FF4B4B;
            --accent-success: #00E096;
            --border-light: rgba(255, 255, 255, 0.1);
            --border-focus: rgba(255, 255, 255, 0.4);
            --font-display: 'Unbounded', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%; min-height: 100vh;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* ========================================================================
           2. BACKGROUND
           ======================================================================== */
        .bg-fixed-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -5; pointer-events: none; }
        
        .bg-grid {
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
        }

        .bg-orb {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            border-radius: 50%; filter: blur(80px); top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: -3;
        }

        #particlesCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; }

        /* ========================================================================
           3. CARD & FORM
           ======================================================================== */
        .reg-card {
            width: 100%; max-width: 460px;
            background: var(--bg-panel);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 24px; padding: 40px;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.8);
            position: relative; z-index: 10;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { text-align: center; margin-bottom: 30px; }
        .logo-text { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: white; letter-spacing: -0.5px; margin-bottom: 8px; display: block; text-decoration: none; }
        .card-header p { color: var(--text-muted); font-size: 14px; }

        /* Inputs */
        .form-group { margin-bottom: 16px; position: relative; }
        .form-input {
            width: 100%; height: 52px;
            background: var(--bg-input); border: 1px solid var(--border-light);
            border-radius: 12px; color: white; padding: 0 16px; font-size: 15px;
            transition: 0.3s;
        }
        .form-input:focus { border-color: var(--border-focus); background: rgba(255,255,255,0.08); }
        .form-input::placeholder { color: rgba(255,255,255,0.3); }

        /* Checkbox (Fix) */
        .checkbox-container {
            display: flex; align-items: flex-start; gap: 12px;
            margin: 24px 0; cursor: pointer; user-select: none;
        }
        .custom-checkbox {
            width: 22px; height: 22px; min-width: 22px;
            background: var(--bg-input); border: 1px solid var(--border-light);
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .custom-checkbox svg { width: 14px; height: 14px; stroke: black; stroke-width: 3; stroke-dasharray: 20; stroke-dashoffset: 20; transition: 0.3s; }
        
        /* Active State for Checkbox */
        .checkbox-container.active .custom-checkbox { background: white; border-color: white; }
        .checkbox-container.active .custom-checkbox svg { stroke-dashoffset: 0; }
        
        .checkbox-text { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
        .link { color: white; text-decoration: underline; }

        /* Button */
        .btn-submit {
            width: 100%; height: 56px;
            background: white; color: black; border: none; border-radius: 12px;
            font-family: var(--font-display); font-size: 16px; font-weight: 700; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,255,255,0.15); }
        .btn-submit:disabled { opacity: 0.5; cursor: wait; }

        /* Toast */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: #1a1a1a; border: 1px solid #333; padding: 12px 24px; border-radius: 50px;
            display: flex; align-items: center; gap: 10px; z-index: 1000; transition: 0.5s; opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.error { border-color: var(--accent-error); color: var(--accent-error); }
        .toast.success { border-color: var(--accent-success); color: var(--accent-success); }
        
        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box { background: #111; border: 1px solid #333; padding: 30px; border-radius: 20px; max-width: 500px; color: #ccc; }
        .modal-btn { margin-top: 20px; padding: 10px 20px; background: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

    </style>
</head>
<body>

    <div class="bg-fixed-layer bg-grid"></div>
    <div class="bg-orb"></div>
    <canvas id="particlesCanvas"></canvas>

    <div class="reg-card">
        <div class="card-header">
            <a href="index.html" class="logo-text">STAVOK.NET</a>
            <p>Создай аккаунт и начни побеждать</p>
        </div>

        <form id="regForm">
            <div class="form-group">
                <input type="text" id="username" class="form-input" placeholder="Никнейм" autocomplete="off">
            </div>
            <div class="form-group">
                <input type="email" id="email" class="form-input" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="password" id="password" class="form-input" placeholder="Пароль (минимум 6 символов)">
            </div>
            <div class="form-group">
                <input type="password" id="confirm" class="form-input" placeholder="Повтори пароль">
            </div>

            <div class="checkbox-container" id="termsBox" onclick="toggleTerms()">
                <div class="custom-checkbox">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 6L9 17l-5-5"></path></svg>
                </div>
                <div class="checkbox-text">
                    Я принимаю <span class="link" onclick="event.stopPropagation(); openModal()">правила сервиса</span> и политику конфиденциальности.
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Зарегистрироваться</button>
        </form>

        <div style="text-align: center; margin-top: 20px; font-size: 14px; color: #666;">
            Уже есть аккаунт? <a href="login.html" style="color: white;">Войти</a>
        </div>
    </div>

    <div id="toast" class="toast">
        <span id="toastMsg">Сообщение</span>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <h3>Правила</h3>
            <p style="margin-top: 10px; font-size: 13px; line-height: 1.5;">
                1. Мультиаккаунты запрещены.<br>
                2. Валюта сайта виртуальная (x2 выплата).<br>
                3. Администрация всегда права.<br>
                4. Данные защищены.
            </p>
            <button class="modal-btn" onclick="closeModal()">Понятно</button>
        </div>
    </div>

    <script>
        // 1. SUPABASE SETUP
        const SUPABASE_URL = 'https://cmoeirxugwapvvcdkwjs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. CHECKBOX LOGIC (FIXED)
        let isTermsAccepted = false;
        function toggleTerms() {
            isTermsAccepted = !isTermsAccepted;
            const box = document.getElementById('termsBox');
            if(isTermsAccepted) box.classList.add('active');
            else box.classList.remove('active');
        }

        function openModal() { document.getElementById('modal').classList.add('open'); }
        function closeModal() { document.getElementById('modal').classList.remove('open'); }

        // 3. TOAST LOGIC
        function showToast(msg, type = 'error') {
            const t = document.getElementById('toast');
            t.className = 'toast show ' + type;
            document.getElementById('toastMsg').innerText = msg;
            setTimeout(() => t.className = 'toast', 3000);
        }

        // 4. REGISTRATION LOGIC
        const form = document.getElementById('regForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            // Валидация
            if(!username || !email || !password) return showToast('Заполни все поля');
            if(password !== confirm) return showToast('Пароли не совпадают');
            if(password.length < 6) return showToast('Пароль слишком короткий');
            if(!isTermsAccepted) return showToast('Прими правила сервиса');

            btn.disabled = true;
            btn.innerText = "Создание...";

            try {
                // А. Создаем пользователя в Auth
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { username: username } // Сохраняем ник в метаданных
                    }
                });

                if (error) throw error;

                // Б. Проверяем, создался ли юзер
                if (data.user) {
                    
                    // В. Создаем запись в твоей таблице 'users'
                    // ВАЖНО: Это сработает, только если в Supabase отключен RLS для INSERT 
                    // или настроена политика. Если не сработает - ничего страшного, 
                    // пользователь все равно создан в Auth.
                    const { error: dbError } = await supabase
                        .from('users')
                        .insert([{ 
                            id: data.user.id,
                            username: username,
                            email: email,
                            role: 'user',
                            balance: 0
                        }]);

                    if (dbError) {
                        console.warn("Ошибка БД (не критично для входа):", dbError);
                    }

                    // Г. Успех
                    showToast('Аккаунт создан! Входим...', 'success');
                    
                    setTimeout(() => {
                        // Если сессии нет, значит нужно подтверждение почты
                        if (!data.session) {
                            alert('Аккаунт создан! Проверь свою почту для подтверждения.');
                            window.location.href = 'login.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1500);
                }

            } catch (err) {
                console.error(err);
                let msg = "Ошибка регистрации";
                if(err.message.includes("registered")) msg = "Этот Email уже занят";
                if(err.message.includes("rate limit")) msg = "Слишком много попыток. Жди.";
                showToast(msg);
            } finally {
                btn.disabled = false;
                btn.innerText = "ЗАРЕГИСТРИРОВАТЬСЯ";
            }
        });

        // 5. PARTICLES (ФОН)
        const canvas = document.getElementById('particlesCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, p = [];
        function resize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
        window.addEventListener('resize', () => { resize(); init(); });
        function init() { p = []; for(let i=0; i<40; i++) p.push({x:Math.random()*w, y:Math.random()*h, vx:(Math.random()-.5)*.5, vy:(Math.random()-.5)*.5, s:Math.random()*2}); }
        function anim() {
            ctx.clearRect(0,0,w,h);
            p.forEach(e=>{ e.x+=e.vx; e.y+=e.vy; if(e.x<0)e.x=w; if(e.x>w)e.x=0; if(e.y<0)e.y=h; if(e.y>h)e.y=0; ctx.beginPath(); ctx.arc(e.x,e.y,e.s,0,7); ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fill(); });
            requestAnimationFrame(anim);
        }
        resize(); init(); anim();

    </script>
</body>
</html>
