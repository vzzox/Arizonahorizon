    <style>
        /* =========================================
           CORE VARIABLES
           ========================================= */
        :root {
            --bg-body: #050505;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --font-display: 'Unbounded', sans-serif; /* Wide Font */
            --font-body: 'Inter', sans-serif;
            --accent-glow: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* =========================================
           BACKGROUND
           ========================================= */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            mask-image: radial-gradient(circle at center, black 40%, transparent 95%);
        }

        .canvas-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }

        /* =========================================
           HEADER & LOGO
           ========================================= */
        header {
            padding: 30px 5%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 22px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        /* Логотип (значок) */
        .logo-symbol {
            width: 30px; height: 30px;
            background: white;
            color: black;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transform: skew(-10deg); /* Наклон для динамики */
        }

        /* =========================================
           HERO SECTION (SPLIT LAYOUT)
           ========================================= */
        .hero-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            gap: 40px;
        }

        /* LEFT SIDE: TEXT */
        .hero-text {
            flex: 1;
            max-width: 600px;
            z-index: 10;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 68px;
            line-height: 1.1;
            font-weight: 900;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .text-gradient {
            background: linear-gradient(135deg, #fff 30%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 18px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 450px;
        }

        /* BUTTONS */
        .cta-group {
            display: flex;
            gap: 16px;
        }

        .btn {
            height: 54px;
            padding: 0 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-primary {
            background: white;
            color: black;
            border: 1px solid white;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,255,255,0.2); }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover { border-color: white; background: rgba(255,255,255,0.05); }

        /* RIGHT SIDE: PHONE MOCKUP */
        .hero-visual {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* CSS IPHONE */
        .iphone {
            width: 300px;
            height: 600px;
            background: #000;
            border-radius: 40px;
            border: 4px solid #333;
            box-shadow: 0 0 0 2px #555, 0 20px 50px -10px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
            transform: rotate(-5deg); /* Легкий наклон */
            transition: transform 0.5s ease;
        }
        
        .iphone:hover {
            transform: rotate(0deg) scale(1.02);
        }

        /* Notch */
        .iphone::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 120px; height: 30px;
            background: #000;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            z-index: 10;
        }

        /* Screen Content (Fake UI) */
        .screen {
            width: 100%; height: 100%;
            background: linear-gradient(180deg, #111 0%, #050505 100%);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .ui-card {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .ui-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .ui-team { width: 30px; height: 30px; border-radius: 50%; background: #333; }
        .ui-score { font-family: var(--font-display); font-size: 18px; font-weight: bold; }
        .ui-badge { font-size: 10px; background: #333; padding: 2px 6px; border-radius: 4px; color: #888; }
        .ui-btn { width: 100%; height: 36px; background: white; border-radius: 8px; margin-top: 10px; }

        /* =========================================
           BRANDS (PARTNERS)
           ========================================= */
        .brands-section {
            padding: 40px 5%;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: auto; /* Push to bottom */
        }

        .brands-grid {
            display: flex;
            align-items: center;
            gap: 50px;
            flex-wrap: wrap;
            opacity: 0.6;
        }

        .brands-grid svg {
            height: 28px;
            fill: white;
            transition: 0.3s;
        }
        .brands-grid svg:hover { opacity: 1; transform: scale(1.05); fill: #fff; }

        .brand-tbank { height: 32px !important; }

        /* =========================================
           MOBILE ADAPTIVE
           ========================================= */
        @media (max-width: 900px) {
            .hero-container {
                flex-direction: column;
                text-align: center;
                padding-top: 40px;
                gap: 60px;
            }

            .hero-text {
                max-width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            h1 { font-size: 42px; margin-bottom: 16px; }
            p.subtitle { font-size: 16px; margin-bottom: 30px; }

            .cta-group { width: 100%; max-width: 320px; flex-direction: column; }
            .btn { width: 100%; }

            .hero-visual { width: 100%; display: flex; justify-content: center; }
            .iphone { 
                width: 260px; height: 520px; 
                transform: rotate(0deg); /* На мобиле прямо */
            }

            .brands-grid { justify-content: center; gap: 30px; }
        }
    </style>
</head>

    <script>
        // Supabase Init
        const SUPABASE_URL = 'https://cmoeirxugwapvvcdkwjs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Stars Animation
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.2;
                this.vy = (Math.random() - 0.5) * 0.2;
                this.size = Math.random() * 1.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.floor(width * height / 20000); 
            for (let i = 0; i < count; i++) { particles.push(new Particle()); }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { resize(); initParticles(); });
        resize(); initParticles(); animate();
    </script>
