<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stavok.net</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. БАЗОВЫЕ НАСТРОЙКИ (Стиль Dark Premium)
           ========================================= */
        :root {
            --bg-body: #050505;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --accent-glow: rgba(255, 255, 255, 0.15);
            --font-main: 'Inter', sans-serif;
            --grid-color: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh; /* На весь экран */
            overflow: hidden; /* Убираем скролл, так как контента мало */
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* =========================================
           2. ФОНОВЫЕ ЭФФЕКТЫ (Сетка и Звезды)
           ========================================= */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -2;
            pointer-events: none;
            mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
        }

        .canvas-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.5;
            pointer-events: none;
        }

        /* =========================================
           3. HEADER (Логотип)
           ========================================= */
        header {
            padding: 30px 40px;
            width: 100%;
            z-index: 100;
            display: flex;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px; height: 32px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: bold;
            font-size: 18px;
        }

        /* =========================================
           4. HERO SECTION (Центральный блок)
           ========================================= */
        .hero-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
            margin-top: -40px; /* Чуть выше визуально */
            position: relative;
        }

        /* Свечение за текстом */
        .hero-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
        }

        h1 {
            font-size: 80px;
            line-height: 1.05;
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 24px;
            color: white;
        }

        .text-gradient {
            background: linear-gradient(180deg, #FFFFFF 20%, #666666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 18px;
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto 48px auto;
            line-height: 1.6;
        }

        /* =========================================
           5. КНОПКИ (CTA)
           ========================================= */
        .cta-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 80px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 32px;
            height: 56px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
        }

        .btn-primary {
            background: white;
            color: black;
            border: 1px solid white;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.2);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* =========================================
           6. БЛОК ПАРТНЕРОВ (Вместо графика)
           ========================================= */
        .brands-container {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 40px;
            width: 100%;
            max-width: 800px;
        }

        .brands-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .brands-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .brand-logo {
            opacity: 0.3;
            transition: 0.3s;
            height: 28px;
            fill: white;
        }

        .brand-logo:hover {
            opacity: 1;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
        }

        /* Адаптив под мобилки */
        @media (max-width: 768px) {
            h1 { font-size: 48px; }
            .cta-group { flex-direction: column; width: 100%; max-width: 300px; }
            .btn { width: 100%; }
            .brands-row { justify-content: center; gap: 30px; }
            header { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <canvas id="starsCanvas" class="canvas-overlay"></canvas>

    <header>
        <a href="#" class="logo">
            <div class="logo-icon">S</div>
            stavok.net
        </a>
    </header>

    <div class="hero-wrapper">
        <div class="hero-glow"></div>

        <h1>
            Побеждай.<br>
            <span class="text-gradient">Забирай своё.</span>
        </h1>

        <p class="subtitle">
            Премиальная платформа для футбольных прогнозов. 
            Делай выбор, угадывай счет и получай удвоенный выигрыш.
        </p>

        <div class="cta-group">
            <a href="reg.html" class="btn btn-primary">Регистрация</a>
            <a href="login.html" class="btn btn-secondary">Вход в аккаунт</a>
        </div>

        <div class="brands-container">
            <p class="brands-title">Нас поддерживают</p>
            <div class="brands-row">
                <svg class="brand-logo" viewBox="0 0 24 24" style="height: 40px;">
                    <path d="M21 8.25c-6.85 0-11.5 5.5-14.5 10.5C5.5 17.5 3 14.5 3 14.5s2.5 5.5 7.5 5.5c6.5 0 12.5-11.75 12.5-11.75H21z"/>
                </svg>

                <svg class="brand-logo" viewBox="0 0 24 24" style="height: 35px;">
                    <path d="M18 4l3 1-8 15-3-1 8-15zM12 7l3 1-6 12-3-1 6-12zM6 10l3 1-4.5 9-3-1 4.5-9z"/>
                </svg>

                <svg class="brand-logo" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9v-2h2v2zm0-4H9V8h2v4z"/>
                </svg>

                <svg class="brand-logo" viewBox="0 0 100 24">
                    <text x="0" y="20" fill="currentColor" font-family="Arial" font-weight="bold" font-size="20">BETBOOM</text>
                </svg>
                
                <svg class="brand-logo" viewBox="0 0 80 24">
                     <text x="0" y="20" fill="currentColor" font-family="Arial" font-weight="bold" font-size="20">WINLINE</text>
                </svg>
            </div>
        </div>
    </div>

    <script>
        // 1. SUPABASE
        const SUPABASE_URL = 'https://cmoeirxugwapvvcdkwjs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtb2Vpcnh1Z3dhcHZ2Y2Rrd2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDQ1NzUsImV4cCI6MjA4NjY4MDU3NX0.UchZU_itRYdOEAUpJ1p-G06RjpRam3rLhQnoQnpu3YE';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. ANIMATION
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.3; // Медленнее для элегантности
                this.vy = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 1.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.floor(width * height / 20000); 
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { resize(); initParticles(); });
        resize();
        initParticles();
        animate();
    </script>
</body>
</html>
